body:
  text: 亦玉堂稿别集類五明提要臣等謹案亦玉堂稿十卷明沈鯉撰鯉有文雅社約已著録鯉常輯其詩文為亦玉堂稿十卷續稿八卷明末板燬不存王士禎古夫于亭雜録載其家有鯉正續兩集三復其文嘆其經術湛深議論正大然士禎沒後池北書庫所藏散佚皆盡今亦未見其本此本乃康熙庚午劉榛裒輯殘闕所重刻集中有文無詩蓋已非原稿之舊矣鯉在神宗時立朝侃直稱為名臣晚入政府毅然特立與沈一貫相齗齗一貫借妖書事以傾之幾至不免然天下知為正人也雖沮于姦邪不獲盡究其用而集中所載如諫止礦稅一疏實國脈民生之所繫其功甚偉他如議復建文年號改景帝實録停取麒麟請並封恭妃詩宥議禮諸臣以及正文體阻秦王服內請封釋詔獄官犯諸事皆關朝廷大體知無不言至于封還成命不憚再三削牘以冀一悟懇欵惻怛之意至今猶可想見之文章之工拙抑其末矣惟亦玉堂之名頗不可解推求其意蓋鯉嘗為翰林掌院學士歸里之後欲以廊廟山林視為一致若曰此亦玉堂云爾然考沈括夢溪筆談稱唐翰林院在禁中乃人主燕居之所玉堂承明金鑾殿皆在其間則玉堂乃宫殿之名非私家所可稱鯉蓋考之未審也乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6ea729dc80064288a5b8aa9e24644b33857f28fef856fbfc13a31ff9db9adab4
