body:
  text: 亦玉堂稿卷二明沈鯉撰論戚畹鄭承憲乞恤典第二疏近該錦衣衛帶俸都指揮使鄭承憲為父鄭福奏乞恤典內諭祭一節係該臣等職掌已於本月十六日據例駁奏伏蒙聖斷特賜停寢但給與墳銀五千兩臣等知聖意之所重在禮而不以財賄之多寡為重輕也然與之過多亦自有不合於禮者臣等請據禮而論之蓋禮莫大於分分莫大於名故凡臣子乞恩有所比例必求其職事吻合情理至當者方敢上聞誠慎之也承憲以帶俸都指揮使而引永年伯以為例可謂禮乎蓋即據彼所奏已云名分之不一而又妄自援比以為事體之相同臣等不知其解矣此而可與孰不可與承憲欲之人孰不欲竊恐後有效尤者皆將萌心於非望之福而僭擬蔓引僥幸萬一不至於潰禮之坊不止也帑藏有限戚里至繁人人而遂其欲不知將何以給之適今國有大役所費不資為承憲計宜受少以榮君上之賜而辭多以明亷讓之節則君恩臣禮庶乎兩盡臣等待罪禮官頃見河南撫按官奏稱本省貧宗值嵗大荒不給半菽方議賑恤計無所出承憲能舉而輸之於國則可活宗室之貧者千餘人是能體朝廷睦族之意而以報上德於萬一也語云嬰兒之病常傷於飽貴戚之患常傷於寵伏願皇上之有以全之也議秦王服內乞封疏臣看得秦靖王妃吳氏奏稱嫡第一子秦敬王誼澏薨無嗣嫡第三子紫陽王誼漶係敬王親弟未承封典難以鎮護藩邦乞將誼漶賜封秦王安人韓氏為秦王妃照例遣官册封一節為照宗藩要例襲封王爵者必於免喪之日而又有服內陳乞之禁無非嚴典禮之防示畫一之法也今敬王誼澏故於十四年四月十八日誼漶至十五年四月十八日服制方滿乃於三月內遂己請封而計其具請之日則又早矣謂不為服內陳乞可乎倫理之重名教所關數月間轉眼可至有何不得已而汲汲若是也即據所奏不過謂地臨邊境難以鎮護竊計秦之封國去邊尚遠昨年已奉敕管理府事矣綸言有赫自足以懾服內外亦有何鎮護之難乎臣等嚮曾以宗藩要例進呈已蒙嘉納頃之又纂入會典屢奉明旨不許紛更今楮墨猶新而阻撓若是竊恐此風一啓人皆效尤如紫陽王者期之喪猶可言也自是必有忘哀於三年者矣服滿襲封服內陳乞猶可言也久之又必有襲封於服內者矣臣等慮其終不敢不虔其始伏望皇上暫收前旨仍令誼漶俟服滿日另行具奏臣等與照例題請如以宫眷衆多養贍不敷合無特沛恩施且預給常祿一年以充嵗用亦無不可何至圖一日之便以亂朝廷之法早數月之封而蹈終身之悔乎臣等職掌所在義不容默輒敢不避煩瑣以瀆天聽倘蒙允納不但法紀可一亦於禮教有禆也議秦府進封第二疏萬厯十三年十月內秦王誼澏奏稱將弟奉國中尉誼𣴖誼漶加封郡爵及將靖王一女賜郡主封號等因臣等謹遵節次欽定事例及我皇上不許越例陳乞明旨與分剖例前例後之説覆議上請奉聖旨近因宗祿不繼立例甚嚴但王以例前為詞屢奏懇切朕特念首藩懿親王嫡弟誼漶準封郡爵庶弟誼𣴖鎮國將軍仍支中尉祿以後子孫只照世次各王府亦不許援例女封罷欽此臣等恭誦綸音仰惟我皇上日月之明固已洞燭其違例之非矣然猶特念首藩懿親不忍直拒其請臣等雖至愚豈不知承命之為恭哉惟事關重大而臣等之職守係焉有不容不披瀝直陳者蓋例之立也惟宗藩為最難及其已定而相與守之使不敢千典犯禁亦無如宗藩之難者我世宗皇帝以天潢之派日增而四方之干請無極也始大集廷議定為約束曰宗藩條例垂示不刋逮我皇上又更定要例纂入會典而加封之禁視昔益嚴宗藩始無敢違制干請者乃其心未嘗無非分之冀蓋立例之難如此也若一旦而潰堤決防滔滔不止將由今以後欲以回既倒之瀾而使無四溢也其將能乎誼𣴖誼漶之為中尉也以萬厯九年十年此皇上所親授封也今輒加之郡王將軍之爵其不許益封也尤近在萬厯十一年亦奉我皇上明旨也今又輒從其違例之請雖睦族宜厚而詔旨屢易豈所以示信於天下乎且郡王之進封親藩也猶不得以嗣其原爵以中尉進封而加又加焉是卑而可以踰尊也敬􅀈之先是請封也亦不過中尉再傳及姪反得以越次加封焉是疏而可以踰戚也借曰祿仍中尉於國用無加損乃條例所陳犂然具備不容有毫髮僭越者豈皆以祿乎抑亦以名器之重有不可假人者也秦為首藩論分封之序則然耳若以世次之久近而辨親疏宗藩之為秦者豈少乎微獨王自將軍以下欲有所請而非其分之所當得也將無曰彼郡爵猶可假曽是區區者而不余畀乎開前此未開之例加前此未加之恩幸端一啓衆各效尤人人欲遂其私事事欲更其制朝廷之所以布大信而立紀綱者何所恃諸司之所以慎管鑰而服人心者何所守乎在明旨固不許援例而日後陳乞者則又不以例為例而以不為例者為例也兹所關豈細故而其漸可復長乎伏望皇上以大道為公轉圜納諫始雖念懿親當重而欲施法外之恩已又思祖制難更而裁以應得之分收回成命示不得已仍諭本藩無復瀆奏此大聖人之作為出於尋常萬萬也惟聖明裁察焉議秦府進封第三疏近該秦王誼澏為弟中尉誼𣴖誼漶乞加封郡王將軍及女封郡主各一節隨該臣等據例覆奏極言其不可加封之狀仰荷聖慈念首藩懿親特允所請續該臣等復據例執奏伏奉聖諭特恩原不為例著遵前旨行欽此臣等竊惟君有成命則臣下自宜欽承又何敢再三瀆奏以輕犯天威惟人臣以守官為義亦以盡言為忠考之前代固亦有牽裾綴牘卒以得請者傳之後世以為明主盛節臣等幸逢極辨之朝冀此風之復見於今日也故敢申三諫之義以畢其欵欵之愚惟皇上垂察焉竊聞王者有至仁無私恩如以懿親之誼不論功不詔德徒念其請求之懇重拂其情而姑破格以徇之雖特恩亦私恩也雖不為例亦一例也古者帝王敦睦九族豈不欲恩施無窮顧見夫人情之不可饜而度吾恩之必有所竭也於是不得不限之法制以平其不一之情而示以各足之分使崇卑有定尺寸不踰上曰有法在吾不受私下亦曰有法在不敢言私上下相維以法而子孫保之世世無極此所謂至仁無恩恩之至也我國家宗藩條例實鑒於此若此例一弛則請乞紛至各自為説朝廷無畫一之法而所司議覆者亦得以高下其手議不與則曰特恩不為例議與則曰先年有事例蓋均一帝派均一懿親彼可請此亦可請與則恩不與則怨是今日之特恩為他日徵怨之端也不可也此猶其小者也效尤者衆則違犯者多及抵於禁然後裁之以一切之法使王室懿親有欲曲全之而不可得者是今日之特恩為諸宗削奪之囮也不可也此猶其或然者也今宗人窮困甚多而嵗祿不繼藉能安分循理保其所有猶不貽主計之憂如恩可幸承則姦徒之誑惑愚宗者謂非分之福必屢邀而後可得也於是使人絡繹於道途囊槖盡輸於厮𨽻吏胥之夤緣為姦者亦得以肆其漁獵則諸藩之窮困日益而東平之為善益鮮者亦自此始也兹特恩之所宜慎施也臣等非不知再三之瀆無所逃罪顧謂聖明在上不靳轉圜倘幸蒙采納特賜停止使臣等得守其官以不廢祖宗之法而益以彰皇上從諫如流之美傳之萬世豈不有光於前史哉復秦府進封第四疏儀制清史司案呈刑部看得秦府奉國中尉誼𣴖誼漶各進封一節臣等既奉有明旨及該司查案前來不敢不具例題請至其與宗藩條例原自不合臣等亦不敢中變其説蓋君有成命而臣子必委曲承順以為恭敬者此臣等之本心也知其不可而又為隱忍題覆以轉移其説則內自欺其本心而上干祖宗之良法美意可垂之萬年不刋者一旦而有所不行是臣之謬為恭敬以亂法也不敢也頃者魯王頤坦之為子壽錥請封也似與例合皇上猶恐其庶封之濫而下部議覆移檄查核終不以懿親之故而廢法蓋主上之德意如此臣等顧不能於例所不合者而明正其罪以將順德意於職掌謂何且恩出於例則人以為正而法紀歸一恩出於幸則人以為疑而蹊徑浸二此亦其漸之不可長者惟聖明酌量施行臣等不勝懇切之至議慶成王乞封繼妃疏臣等看得慶成王慎鍾始為長孫該先王代奏選張氏為內助承受祖命已正妾二之名繼襲郡爵該本王自奏進張氏為次妃荷蒙聖恩復有畫一之議本部當時題覆明白詳悉似有預為之防者已經奉有欽依昭如日月誰敢作偽欺罔且次妃進封繼妃原無此例若以萬厯七年之例則得受次妃已屬厚幸乃本王不知感恩輒敢隱下內助詐稱繼室妄援選繼要例及西河王表相等前繼夫人進封繼妃事例混行奏擾不惟於要例大不相合亦復悖違祖命孤負聖恩欺誑君父而略無顧忌者矣臣等查據玉册慶成王生九子俱未請封一子敏􅠩二子敏漻乃二妾王氏所生三子敏溙次妃張氏所生張氏得封繼妃則敏溙即稱嫡出可為異日奪長之地其邪謀詭計實在於此殊不思綱常法制繼世大坊本王欲進內助為繼妃是以妾為妻而有乖夫婦之倫欲使庶子冒嫡是以少凌長而有失兄弟之序溺愛縱情劫奪示教是父不父子不子而有傷父子之恩即使百方求情獲遂所圖而三綱淪九法斁其何以行之哉我皇上中天地為綱常之主方俾九族惇睦五品順遜以普同倫之化宗室中豈宜有此况郡王諸子嫡庶長次封爵懸絶必其恪遵定制庶幾不生亂階語云千人逐一人先得貪者自止分定故也使張氏止於妾妃敏溙定於庶次則王者無失其王將軍中尉無失其將軍中尉兄弟安而妃妾和慶澤之及於苗裔者何窮不然僭嫡不祥犯長不順骨肉自相殘害其禍不知所終矣彼姦人唆誘止以幸一時之寵利而危於人國害於人家有如此者恐亦非本王之福也且同一嗣子鳲鳩之愛何分彼此特未之深思耳臣等欽奉明旨再四詳議質之法例揆之天倫酌之事理無一可者故斷斷乎其不可從也本王違例妄干委應罰治但係郡爵臣等未敢定議至於該府教授等官平時不能以禮啓迪臨事不能據法諫阻輔導之職誠為曠缺合候命下移咨都察院轉行山西巡按御史將各官行提問罪再照各處宗室生長不諳法體姦人乘機誘引實繁有徒合無並行山西巡按御史將屢次賫本總旗提拿究審照例發遣庶姦徒知銅墨之警而宗室有磐石之安廟享事宜疏臣按帝王宗廟陵寢之儀至大禮也古人極為嚴重所以考核精詳隨時變易必協諸義而無弗安斯可以肇禋祀而仁祖考矣我國家開創之初建立陵廟盡制盡倫詎不欲垂之萬世而無弊哉第相沿二百年餘中間因革損益不無可議者蓋先是諸臣己曾建議及之竟以議論不同而止臣等待罪禮官乃其職掌心所未安久矣而太常寺卿裴應章復有此議誠於祀典有禆臣等謹將所陳四事逐一議擬上請伏乞聖明裁定一曰太廟侑享之禮臣等謹查得國初建四親廟歲凡五享以親王從祀於東廡功臣配享於西廡各遣官分獻洪武九年進親王於殿內東壁功臣西壁嘉靖間仍序列東西兩廡二十四年新建太廟成復進列東西兩壁罷分獻及考儀禮諸書與前代故事無親王祔享之儀我太祖高皇帝特以義起之意若以展親報功皆至情之不容己者乃該寺則據禮而論謂諸王本從祖祔食今四祖之廟已祧而諸王無所於祔則議罷禮也但欲祔之祧廟似猶有未安焉蓋祧以藏毁廟之主為祖也非為孫也禮有祧不聞有配祧者當諸王之侑享於廟也故事特以紙為位祭畢而焚之已矣必且祔之於遷祖之廟將更為設主乎不乎不為之主何據而祧為之主是本無而反益之也宗廟之享祫為重故禮稱彌遠而彌尊夫既以時享不可預而顧以預於祫此臣等之所以為未安也蓋據禮則當以墳墓之近皇陵者祔享於皇陵之廟近祖陵者祔享於祖陵之廟而後於禮為無嫌亦可以不失太祖之遺意但考洪武元年初享十五王之文則有曰朕念親親之道無間存歿凡我伯考兄姪悉追封為王伯妣先嫂皆為王夫人列祀家廟著為常典臣等莊誦聖謨而深惟太祖之意以酌於情禮之間有不敢輕議罷享者無已則仍遵初制序列東廡猶為近禮乎至於功臣配享彜章具在而該寺復為此議者謂廟中有列后在上則異姓之臣禮當别嫌而至尊拜俯於下於諸臣之靈亦必有蹙然不寧者宜照舊於西廡配享仍各於東西兩廡遣官分獻始為合禮伏乞聖裁一曰內殿祭告之規臣等看得朝廷建奉先殿於大內凡車駕出告反面日月上膳薦新及册封朔望諸禮皆於是行之蓋於太廟五享之外又以是而廣其如在之思也夫曰大內則非外廷可得而與者以故祭品辦自光祿寺告文及執事人員俱取自內庭太常寺雖職専祀事而此實不與焉及至嘉靖以來册封諸藩有遣官例於時始用該寺人員執事而祭品祝文則仍舊取之於內也萬厯元年該寺照例以遣官請復奉旨親自行禮二年又申明舊例以執事人員請則奉旨仍自內庭供事自是該寺止先期以册封祭告題請而己而其他無與也乃近年以來斯稍有不同者遇上親行則照例於內庭供事或遣官則凡執事人員及祝文祭品俱取辦該寺矣然猶可先期預備於遵守亦未嘗不便也惟近者皇貴妃册封祭告奉先殿祝文執事皆出內庭而祭品又取之該寺於是始事體不一遵守未便倘或有奉旨親行忽臨期而遣代者則事出倉卒備辦尤難故該寺復有此議委宜酌為定規以便遵守臣等謹議得該寺職掌専主祀事而光祿則専主膳羞之官其內殿祭告則猶取象於生時上食之義也且大內禁地外人出入有干明禁合無查照舊例凡遇祭告內殿無論親行及先期臨時遣官其祭品俱由光祿寺備辦惟告文及執事人員遇親行則辦之內庭或遣官則暫用該寺庶內外各官無推諉誤事之弊而奉遣行禮者亦無僭用內執事之嫌禮得中而可行事畫一而易守矣伏乞聖裁一曰諸妃祔陵之祭臣等看得陵寢之祭與宗廟之制不同廟祭止於正后而陵寢之祭則諸后妃皆與焉先是長獻景裕茂康六陵諸妃祔葬者祭於陵寢而葬金山諸處者祭於本墳逮嘉靖十七年秋六陵妃俱配享各陵殿罷本墳祭所以明萃渙之義篤宮闈之親者真可為萬世法程矣乃世廟諸妃安厝於金山等處者至今已二十餘年曽無一祔享於陵殿何先後之不一若此也今該寺欲比照前例奉世廟諸妃墳所神主俱升之永陵之殿一體配享而罷其本墳之祭深為有見相應依擬一併舉行庶乎事體歸一而善制之遵行可久矣臣等又查得每嵗清明霜降各遣官五員行禮其中有専祀一陵者有一人而兼祀二三陵者各衙門陪祀諸臣亦各隨遣官行禮據初意豈不以陵寢相近則禮可攝行而不必専官乎乃其中殊多有未便者蓋諸臣既至陵所必候長陵舉事方敢行禮今専祀者行禮已畢而兼祀者尚在趨蹌昏夜茂林疾馳山徑卒遇風雨尤屬倉黃故有主祭已至而陪祭未至者有行禮將半而至者亦有卒不及至者即有監禮諸臣時當昏夜何從認識蓋不但繼以倦怠而已合無自今以後除遣官行禮仍舊五員其陪祀諸臣則各照陵所寧少無兼斯可以竭誠將事而感格神明矣伏乞聖裁一曰陵祭品物之式臣等查得各陵寢歲時之祭祝文牲帛無弗同者惟元旦為加隆顧九陵恭讓恭仁之陵止於酒果而越靖等及諸王妃則又有牲帛祝文反從其厚此該寺所以有畫一之議也然以臣等度之似亦有謂蓋先是九陵帝后嵗暮已祫祭於廟矣旬日內且復有孟春之享故元旦之祭在陵殿止用酒果者非儉也禮也若諸王諸妃則祫享春祭既皆不與若元旦一祭更復從簡不幾於疏乎其特用牲帛祝文者非過為豐也亦禮也稱情立文在當時議禮之意原自有在所未盡者特恭讓恭仁既不與祫享於廟中又不設牲帛於陵殿是亦禮文之缺而議者偶未之及耳臣等謂宜增二陵之祭而補其所未備其餘則仍舊典庶幾為安至於祝享有文所以達致祭之意而冀神之聽之也今諸王及諸妃墳所祝文俱係安厝時所用逮今薨逝既久世代屢更而祝享之文猶復仍舊揆之於義多有未協如永清太長公主俱稱曰爾者在當時以尊臨卑之詞也自今用之得無有不宜乎祭廢后吳氏之文曰惟靈仙逝日月不居英妃魏氏曰惟靈仙逝冬至倐臨諸如此類難以枚舉總之皆初時祝告之祠也今年運己往矣尚猶不可變乎合無敕下太常寺通查各項祝文凡有未妥如此類者俱開送翰林院改撰通用祭文一道但敘歲時遣官之意盡削去傷悼餘詞仍分别王妃夫人各從其類共為一祝後有增入者掩壙之初撰一次其以後節序之祭不必别撰庶乎情順禮安祝告之際神居然歆之矣伏乞聖裁壽宫相視疏八月二十一日內閣傳奉該文書房口傳聖旨大峪山開穵玄宫處所據張邦垣進圖西北角微有石塊欲往前少移著禮部帶同張邦垣等審定可否來説欽此臣等祇奉明旨謹於二十七日前往大峪山會同國公徐文璧大學士申時行司禮監太監張誠及總理工程太監張禎工科給事中王敬民等並原相擇工部主事閻邦及各預事諸臣及於玄宫極中之處引繩四周度以尋丈看得有石之處橫互頗長不止西北一隅微有石塊但玄宫後界至石前邊相離頗遠其中隔一丈三尺左角隔三丈三尺右角無石俱於作用無妨似以不移為便若寶城方牆規制之外似應從其所擬但一移則前薄溪徑而後漸遠於主山恐於來脈稍脫規制不易展布也此據該監所言為之折衷有如此者若以臣等據理而論則禮有曰卜其宅兆夫曰卜之為云誠慎之矣豈其不擇顧禮之所貴於擇者惟曰幽遠間曠無有他虞草木蕃殖無有潟鹵大勢嚴正無有傾欹風氣完淑無有粗惡如是而已豈如術家所言因是以規福利耶蓋術之難憑不若德之可恃土有五色不若民無二心我皇上之愛民深而格天至矣天保萬年時斂五福自當有在豈在土壤故臣等於張邦垣之所稱引不能深究其義惟據實以聞如此伏候聖明裁定施行議改北嶽疏祠祭清吏司案呈奉本部送禮科抄出巡撫大同地方贊理軍務都察院右副都御史胡來貢題奉聖旨恆嶽祀典著禮部查明定議來説欽此臣等謹查得渾源州志內開恆山在州南二十里古北嶽也上有嶽廟陶唐氏所建舜時北巡狩至於北嶽值大雪遙祀之忽飛一石墜帝前名曰安王石乃建廟於大戎山又五載再巡狩其石又飛於曲陽復建廟於曲陽今州之恆山有觀乃唐武德中道士高明素所建也又有洪武十二年重修古北嶽廟碑文內載渾源恆山為古北嶽自有虞氏嵗十二月北巡狩躬行望祀後飛石東遷卒建祠於曲陽歷代因之而恆山之祠廢不復舉是則北嶽之紀於渾源州志者如此及考得尚書禹貢冀州恆衛既從注云恆水出常山郡上曲陽縣恆山北谷在今定州曲陽縣西北恆山也周禮職方氏正北曰并州其山鎮曰恆注云在上曲陽縣蓋職方并州即禹貢冀州所分也史記趙簡子藏寶符於恆山曰從常山上臨代代可取也注又云在上曲陽西北通典及文獻通考皆云定州曲陽縣北嶽常山在焉而通鑑地理通釋亦云常山在定州曲陽西北百四十里常水出焉蓋漢置恆山郡避文帝諱改曰常山皆今真定也宣帝神爵元年詔太常寺祀五嶽四瀆而北嶽在常山之陽即常山郡之屬縣也唐武德貞觀之際祭北嶽恆山於定州蓋至唐復置恆山郡宋初緣舊制亦祭北嶽於定州漢碑不存無所於考唐宋碑刻具載北嶽祠事則曲陽之祀北嶽不始於五代之際明矣元起朔漠正宜祀於渾源乃代祀碑記仍在曲陽逮至國朝洪武二年二月奉太祖高皇帝之命肇祀北嶽及三年六月降詔正名定為常典列聖繼統遵行無斁是則北嶽之著於曲陽縣者如此及考曲陽縣在隋為恆陽縣恆山在縣西北一百四十里渾源州元初為恆陰縣恆山在州南二十里山南曰陽山北曰陰或曰皆指恆山而名未可知也後魏立五嶽四瀆廟於桑乾水之陰考之北史蓋其時建都平城因總祭嶽瀆於此非因北嶽所在而専祀也又查得𢎞治六年七月內該太子少保兵部尚書馬文升有釐正祀典之題本部覆北嶽恆山之神祀於曲陽自漢唐宋以至國朝上下幾二千年未之有改其渾源州雖有恆山亦名北嶽然祀典不聞碑志無考禮云凡祭有其廢之莫敢舉也有其舉之莫敢廢也今一旦廢此舉彼恐有窒礙孝宗皇帝可其奏今案呈到部看得巡撫大同都御史胡來貢題請改祀北嶽於渾源州恆山即命大臣出關祭告各一節除今次祭告已經題奉欽依無容别議外照得改嶽事體關係重大據今所查反復參詳竊謂載籍雖博必折衷於經傳典禮至重難輕信乎傳聞今據本官所請固非無據第其引虞書魏史之文亦止言祭於恆山而未見恆山所在至禹貢恆水出常山郡上曲陽縣恆山北谷即今定州曲陽縣則恆山之在曲陽既已明著於經文而漢神爵元年祠北嶽上曲陽唐武德貞觀祀北嶽定州則曲陽之祀恆山又非肇始於五代蓋歷二千餘年而明禋如一日誠考據精確非漫然沿襲也其謂五代之後祭於曲陽者蓋因宋失幽并遙祭北鎮醫巫閭山於定州北嶽祠中遂誤以為望祭北嶽耳至於渾源之稱北嶽止見於州志碑文而稽之經傳茫無可考想其紀載之辭亦出傳聞之誤即志內飛石等語在本官亦謂其不經矣而可據其文以改祀乎大抵恆山自太行柬來綿亘千里同一分野在南在北皆可取名即以山之向背而言則祀於陰者終不若祀於陽者之為正也昔金世宗時議者以都燕請别議五嶽太常卿范洪力言其不可而止則改嶽之事自昔重之况我太祖高皇帝神聖開天極重祀典當時山川地里無不圖上而曲陽之祀仍舊即今大明集禮所載漢唐宋北嶽之祭皆在定州曲陽與史俱合可見當時考核已自精詳二百餘年國有大事必行遣告豐碑巨刻林立祠下則今恆山實為畿內重鎮孕靈已久一旦毁廟貌廢碑刻舉而改建於邊徼之地竊恐未可輕易也而况在彼無稽在此有據又彰彰如是乎臣等再三酌議委應遵依憲典仍祀北嶽於曲陽縣其渾源州恆山既洪武年間重修廟宇合無查照𢎞治中原題行該鎮巡撫衙門轉行彼處官司量加修葺用存古迹庶為兩全但事關典禮臣等未敢擅便伏候聖裁亦玉堂稿卷二
