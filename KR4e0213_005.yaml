body:
  text: 亦玉堂稿卷五明沈鯉撰請罷礦稅疏臣頃以瞻仰至情疏請面見伏䝉聖諭令候㫖行且朂以閣務繁重宜與元輔同寅協恭臣仰奉綸言默自循省皇上以腹心任臣臣亦以腹心事主則今日所謂協恭者寧有外平生所學勿欺二字乎蓋腹心之臣當言不言與有言不盡固欺也即掇拾微細與過為激切亦欺也臣內盟幽獨仰體聖心苟非懷社稷深憂何敢為激昻髙論雖諸臣纍言而不聽或老臣萬一之可回故瀝血嘔心進其愚說臣原籍河南當東西南北輻輳之衝四方民隱無不與聞而頃者奉詔北來所至皆觀風考俗悉其情狀乃知當今時政最稱不便者無如礦稅二事蓋採𣙜之始皇上本以權宜濟乏不欲重征其分遣內臣亦以區畫下情便於上逹乃內臣不能仰承德意濫用羣小布滿州閭窮搜遠獵而羣小之中又各有爪牙羽翼虎噬狼吞無端告訐非刑拷訊遂激為臨清之變武昌之變蘇州之變已煩皇上處分而近日廣東遼東陜西雲南尤復紛紛未已臣竊觀天下之勢如沸鼎同煎無一片安樂之地貧富盡傾農商交困流離轉徙賣子拋妻哭泣道途蕭條巷陌雖使至愚之人亦知如此景象必亂無疑乃今市井奸民猶復肆為欺罔皇上祇見其目前所入如此豐盈寧知其私充囊橐十得八九彼假公圖利一旦事生地方固豢豕自屠獨使朝廷當百姓之怨耳夫自古天下之亂階皆始於民心之嗟怨朘削愈甚結怨愈深譬之蓄火未然乘風即熾彼愁苦無聊之衆何事不為而不及早安輯潛消亂萌也皇上豈將謂東征西討宣捷獻俘神武赫赫無復可慮乎以臣愚計則亂生不同有逆而亂者有憤而亂者逆而亂者如寧夏播州彼先據不祥之名而我為仗義之伐故人心用奮天戈所指當即芟滅若憤而亂者則所謂土裂瓦解者也以四海之衆而囂然皆怒一倡萬和雲合景從朝廷之號令必不可行官司之法度必不能制兵於何出餉於何資蓋國家連歲興師行齎居送按丁增調履畝加租瘡痍未瘳呻吟未息更有徴發豈不速亂在昔唐德宗時稅間架除陌錢比涇原變起百姓操白梃逐官吏曰自今敢復稅間架陌錢否此今日懷亂之人心所必至也衛懿公好鶴鶴有乘軒者將與狄戰國人曰君使鶴鶴實有祿位豫焉能戰此他日遭亂之人心所必至也臣不勝杞憂方今亂形雖成禍機未發必欲速弭大亂莫先收拾人心必欲收拾人心莫先停止採𣙜徴還中使繫治棍徒曠然與天下更新此大聖作為太平景象海內人心所日籲天而求者也上也即不然而改畀撫按代與征輸則賦額既可無虧窮民亦得蘇息目前救弊亦其次之在皇上一轉移間耳夫財貨之聚珍寶之玩縱為可欲比之於四海萬邦祖宗之所埀金甌大業孰寡孰多往中使未至則賦有常經藏有恆積夫孰非皇上之財也而今則商旅不行貨物不聚私槖盡滿公帑盡虛朝取其三暮失其四孰損孰益礦額非取諸山澤稅額非得之貿易皆有司加派於民以包賠之也有司既加之而使者又攫之加征者有數攫取者無極一林衆搜所餘幾何割股實腹詎能安飽曰包曰賠何以示後若反是而君不獨富民不獨貧上下相安公私兩利熙熙乎好義終事矣孰利孰害泉貨本流行不滯之物有乘除消長之數夫既拂民情而聚之又不收民心而守之一朝有變瓊林大盈豈能不發及今而止猶國之財也孰得孰失臣老悖誠不知國家大計皇上試以今時之事而徐察當世之人心凡為士為農為工為商與宦游畿服內外者無小無大有不如臣所言者乎即道路往來之人室廬居處之衆入而巷議出而偶語者有不如臣所言者乎封疆之臣介胄之士或邊腹憂守憂戰者有不如臣所言者乎微獨是即礦稅內使如浙江孫隆湖廣杜茂者彼皆不昧其本心而稱賢者也有不如臣所言者乎夫以當今時勢舉天下皆知之而亦皆私慮之其烏可以不寒心也而猶可泄泄乎雖然此諸臣餘唾也臣何故又言之蓋諸臣有言責而言者憂在其耳目者也有官守而言者憂在其肢體者也猶在外者也臣腹心親密之臣也則憂在內矣惟在內故分猷分念而媚兹一人者其情為獨切惟情切故凡可集衆思廣忠益以宣其抑鬱而效之主上者自不得不詳不必皆出諸臣口也此前所謂勿欺之指也惟皇上裁察乞免逮咸陽知縣宋時際第三疏前月二十四日二十七日臣等為咸陽縣知縣宋時際奉旨被逮兩具揭帖為之申救到今兩旬未奉明旨遂已不敢瀆奏顧見都下人情為此一事比前景象頓覺不同臣等叨備股肱義關休戚心殊不能自安敢復掇拾前語以瀆天聽蓋一國之人心可以覘天下之人心今都內人心如此若以傳之天下有不人人解體者乎誠恐為有司者必皆以宋時際為戒而不肯護庇小民為監司者亦皆恐禍之及身而不敢約束下吏則今兹之舉祇為闒茸罷軟者樹赤幟耳况此風一倡各處稅監無不效梁永之所為而參官參吏其為稅監牙爪者亦無不效梁永之牙爪而如虎如狼儻復有臨清之變湖廣之變悔將何及夫自罷礦分稅以來海宇清明神人悅懌朝端方宴然無事止為永有此疏遂多一畨章奏一畨擾攘若不早賜區處誠恐言者愈多而朝廷之上紛然聚訟不免有煩聖裁且非清靜寧一之體矣蓋民惟感上恩德如其父母故平居而好義終事臨難而出力報效不愛其死此事行則民心一散不可復收海內將不免多事矣臣等心知其然安忍不為我皇上明言之論語云見志不從又敬不違禮云三諫不聽則號泣而隨之蓋忠臣事君孝子事親義當如此臣等惟知有忠孝之理而已不知其他伏乞我皇上俯鑒愚衷毅然收回成命特免宋時際械繫則普天之下皆仰大聖人之作為與成湯之改過不吝者古今同一盛事而頃繫逮一旨不足為聖德纍反足為轉圜納諫之一美談也不然則恩詔在途而械繫者亦在途南來北往道路喧傳人將謂何臣等惟揆之心膂之義大有不安故不得不煩瀆至此實非敢沽名市恩也臣等不勝懇切祈望之至乞處分楊榮疏臣等在閣辦事接得雲南撫按總鎮等官陳用賔等揭帖知有內官楊榮被殺之變臣等不勝驚嘆竊照自有礦稅以來激變地方如湖廣臨清等處亦時有之然未至於戕殺內使焚其尸骨如楊榮之極慘者也以皇上之命使而敢於如此豈非古今一大變哉其主謀下手之人並宜明正典刑以昭國法不待言矣惟是楊榮播惡地方業已滿貫其非刑拷死指揮千百户則皇上之世臣也其殘虐民命劫奪民財立斃於杖下者數千人則皇上之赤子也所建府第僭擬宫室稱曰千歲僭擬宗親其心已不知有朝廷法紀久矣全滇之人怨入骨髓思食其肉不願與同生而願與同死人情至此豈復顧朝廷三尺法哉天道好還假手賀世勳韓光大等為匹夫匹婦復讐以事論之謂之變以理論之謂之常可也此番處分國家法紀之修廢四海人心之從違皆係於此可不愼歟覆請皇上稍霽天威速行乾斷發下撫按總鎮本章令兵部㑹同三法司詳看將見獲首惡賀世勳等十人依律擬罪行撫按總鎮官再加覆訊即於彼處明正刑章以昭朝廷有必不赦之法其餘官民人等量開一面之網以明朝廷有不盡法之仁倘十人之中更有迫於脅從可矜疑者不妨暫行監候再與具奏請旨定奪庶無寃濫蓋天子撫有萬方所以馭衆安民者不越德威二字而德可過威不可過書曰殲厥渠魁脅從罔治自古帝王戡亂之道不出於此在寇賊猶然而况吾民乎滇南在萬里之外一往返經三四月恐彼中亂民日增疑懼或生他變尤須急為裁決一了百了仍歷數楊榮罪惡以見皇上至公之心以慰滇人切齒之恨以服四海觀望之志今日撥亂反正之急務也伏乞聖明照鑒乞聽言納諫疏臣一足殘廢已成痼疾非倩人扶掖寸步不能自致乃頃再䝉聖恩遣官宣諭趣令即出臣敬天之威不違咫尺義不敢不出戴主之恩等於髙厚情不忍不出今固將齊戒沐浴扶病出矣顧乂惟臣空空鄙夫耳其出不出如滄海乘鴈豈足為有無多寡而諭旨之所期奬有非臣鄙劣能當者臣將何以塞明詔以不致隕越於下故及今欲出未出之間而先述犬馬下情仰干天聽俯鑒臣愚可幸無罪蓋臣前疏中已言矣臣老年廢疾之人而朝夕踸踔出入於大體甚不雅觀恐長安道中十目十手以臣為不顧大體也以臣為老不知止也以臣為貪位慕祿也此一議也有如我皇上假臣餘光俾臣得隨二輔後粗有建明少賜采納則前之議臣者必且輒更其品題以為臣雖不良於行乎而其言行矣其志行矣其忍恥以就此者非不顧大體者也非老不知止而貪位慕祿者也此又一議也夫由前言之則為虛君命為負國而臣為具臣為天下後世之所輕鄙由後言之則為祇君命為體國而臣為良臣為當世士林之所孚信二者之相去懸矣而其機則决於上之聽不聽而用不用也夫使諫而行言而聽也此臣之遇也敢自謂能天光下濟有為之接引者也其或有不行不聽也敢云不遇臣積誠未至而天聽九重有不易昭格者也兹所關非細故也往時臣辦事閣中見百司庶府應行事務有曽奉明旨者俱登記考成簿內逐一查考逐一銷算矧絲綸之地名曰政本如人身之有咽喉也咽喉通則百脈榮不通則百脈悴其所係何等重要而閣臣所上揭奏可槩從中格乎其何以行天下又何以考成於百司庶府也臣衰廢極矣亦曠職久矣所恃以舍舊圖新少酬知遇者僅存此一線之脈非是無可以盡職矣皇上不罷臣而留臣將徒以位乎以身乎或亦以心乎夫惟有所以立乎其位者而後心可安心安而身可安也身安而位可安也此其機殊不在臣也不然則臣有尸位素餐焉爾矣有局蹐不寧焉爾矣豈復能遵奉明旨身肩國是安其位而行其志哉昔唐太宗虛懷納諫一時藎臣如魏徴諸人乃得展布其四體以弼成貞觀之治至今猶侈為美談以皇上聰明聖神但一虛心采納便是都俞吁咈為堯為舜臣雖不才從二輔後濫竽竊吹亦得佐下風與臯䕫同列又何有於唐之君臣哉書曰任賢勿二孟子曰大舜有大焉舍已從人信斯言也明主馭下無務以蓄疑為神明也無務以豫知自賢而卑視深山野人為無足取也如是焉已矣惟皇上憫臣愚昧明示以留臣隆指使知向方幸甚考察自陳不職疏該吏部題奉欽依京官考察四品以上例當自陳臣待罪輔弼敢不具列其不職之狀以俟幽黜而彰明主之紀法除六年以前者不敢瀆陳外惟是萬厯三十年七月奉召至京備員密勿諸所為曠官溺職而扞考功之文網者則已有三事臣不敢不明言蓋閣臣之職有在正君心弼主德澄化源於穆清之上者有在備顧問擬批答視草誥敕誕宣綸綍為國家政教號令之所從出者其大端若此矣然非學術足以備獻納精誠足以徹穹昊斡旋轉移有足回下濟之光而成泰交者不能辦此也又非夫才優經濟而發謀出慮適中乎機宜學有淵源而掞藻摛辭深得乎體要者不能辦此也臣豈其人乎豈曾有一於是乎不惟是也閣臣雖不有相名實默有相道則上而節宣寒燠以不纍三光之明下而調適酸醎以不咈萬民之性者亦自其本業而非可他諉也臣在事以來不能識大體及此顧徒見閭閻之苦征求者無虛日四方之報水旱者無虛月星官之陳灾變者無虛時潢池之弄兵革者無虛歲海內舉紛紛憂亂焉此非臣溺職而誰也夫鼎足三列而公餗不覆鼇極四柱而方隅以奠天下之事類非一人之所能為也故曰舜有臣五人而天下治今二臣俱克振舉其職矣臣不能有所助而二臣復為臣彌補其闕失此臣之溺職者一也而律之以考功之法為不及臣顓䝉人也居之以斗筲之器既不能有醖藉及遇事有不可輒不勝紛紜倉卒而不知主之以深沈出之以鎮定以求其委曲濟事即臣亦自知為褊心為浮氣於藥物臭味中為佐使之材不可以當國老之任也此臣之溺職者二也而律之以考功之法為浮躁且臣既老憊若此矣又時有陰陽之患狗馬之疾以耳目則不聰不明以行動則為顛為蹶以心思知慮則朝聞夕忘夕見朝忘過此以往將崦嵫日以迫膏肓日以深伐檀荷戈之議且日有招延之者矣往者不可諫來者猶可追胡為乎役役之弗休營營而不知止乎此臣之溺職者三也而律之以考功之法為老疾夫國家懸功令以澄肅在廷之臣僅疏為六事而臣已有三焉此即在銅墨之吏管鑰之司不可幸免也矧其膺股肱心膂之寄乎矧其處巖瞻之地為士林表儀乎矧復以帷蓋䝉恩弓旌赴召為千古之罕遇乎易一榱不若易一棟察乎邇乃能見乎逺皇上如欲為山藪藏納以寬庶寮乎則臣不敢知必且徹旒黈審衡鑑使朝無幸冒國有紀綱大臣法而小臣廉非先罷免臣不可臣無任悚息待命之至時政疏臣屢疏乞休未䝉俞允柴然一軀病伏牀榻感時觸事不勝憂國之念將終藴而不言則恐一旦長畢目且不瞑故昧死一言然猶囁嚅纍日而後敢出諸口也何以故臣老臣也事在可緩必不敢輕易進言以自取周章之議又帷幄親密之臣也言在可已尤不敢激昻立論以輕擾君父之心惟臣今所處之地乃關係民生休戚國家理亂而又適中流急渡之時夫是以寧逆人主之顔而不敢緘默取容為燕雀處堂之安也請敬陳之臣聞治天下者貴審勢今天下時勢何如哉天變於上人離於下駸駸乎有亂之形矣不及今尚可為之時而主臣一意百倍勵精將朝廷號令政事力加整頓必不可易危而為安轉亂而為治譬諸醫之治病而遇十分虛損之人非以十全大補之劑不能有起死回生之效也乃今猶泄泄然視之而徐徐焉圖之者豈以天下本無事而臣言不足信乎臣老悖誠不足與慮天下事其言誠無足采取也而在朝則文武諸官亦盡懷杞人漆室之憂不但臣也在國則農工商賈與庠序學校之士出議於巷入議於室者又不止朝臣也即如採𣙜中使亦尚有五六老臣不忍見民間疾苦者茲所謂左右近臣不比於外廷疏遠也在勳貴戚畹與國同休其憂國於常人更切也在藩服則又有天潢之派以山河帶礪之盟而欲傳百千萬世與天壤無極者茲所謂同姓一家又不比於勳戚異姓也皇上試以其兼聽並觀之心而倣古設鐸建鞀之意或顯詔以求直言或密察以觀輿論詎不皆憂臣之憂道臣之辭乎即口語不能皆一直婉或有不同其孰敢保天下終無事乎夫內外臣民人人皆有憂亂之心而備亂猶可不亟乎猶可不申嚴號令以振作積玩之人心猶可持諸司章奏留中不發發而不以常期乎猶可使諸司當事之臣日有補牘之繁人有掣肘之苦而不得自舉其職乎猶可使中外衙門無處不有缺官無官不是權管而因以慢令致期誤民誤事乎猶可使海內賢才一一皆老死林下而見謂無仁賢之國乎猶可不照常行取補足臺諫以自廣大其聰明乎猶可使天地不交股肱失職如日行陰霧中而不見陽光如常處嚴冬時而不行春令乎蓋自古憂國之臣未亂而言無其形也常苦於言之不聽既亂而言形已成矣又苦於聽之無及夫與其聽之無及也則寧備而不用乎昔唐德宗時海內殷富天下宴然過今遠甚一朝變起遂至於乘輿播遷幾不保其宗社此建中四年十月幸奉天事及廣德元年十月幸陜州事也一展卷可知矣唐以前宋以後覆轍相尋有甚於此者臣不敢歷歷言之矣夫天下皆知其將亂而至尊居九重之上不見不聞臣實有不忍者故輒敢盡言之語云賜不幸言而中臣惟願所言之不中不願其多言而偶中也蓋臣既不能借青蒲一膝之地以吐其一腔忠赤又不能剖心自明而所慿惟紙上陳言倘天鑒終不可回臣終亦無目可瞑矣臣不勝仰天瀝血戰栗恐懼之至請釋詔獄官犯疏臣等於本月二十一日具揭為鎮撫司見監諸犯請命伏候數日未䝉允發恩威出於主上臣等安敢隨衆激聒但念諸人死者十之三四病者十之八九中有一二老病者危在旦夕秋氣凛烈黑獄如冰繼此而冬勢必相繼斃盡是諸人本無可死之罪而立受不待時之决也匹婦含寃猶足以干天地之和而况諸人皆皇上甄陶辟舉之士類能不避權璫為皇上保釐赤子而乃以區區財貨使之駢首就斃皇上其忍之乎皇上視此數人之命不過草菅而不知傳之四方士心因而解體書之史册聖德不無少虧所關殊不小也臣等備員輔臣與有匡救之責安忍坐視不言昨各衙門大小諸臣皆來責備臣等謂臣一貫去年親承綸音釋放復官而不能執奏以成主德之美又謂臣鯉臣賡數千里召來何等恩遇而不能竭忠盡言奚取伴食臣等聞之惟有局天蹐地惶恐流汗垂首伏罪而已為此不避斧鉞再瀆天聽伏望皇上擴天覆地容之量𢎞赦過宥罪之仁早渙德音即與疏釋或付法司酌量重輕擬罪上請則恩威總出於宸斷而福壽永歸於一人臣等不勝顒仰待命之至乞免發私宅擬票疏竊惟內閣之為密勿者豈不以軍國大事運籌帷幄機宜密而不宜泄故因而有是名乎先朝懸榜閣門一應官員人等不許擅入夫外者固不可擅入也內者其獨可擅出乎臣鯉於嘉靖年間改庶吉士臣賡於隆慶年間改庶吉士先後中祕肄業猶及見內閣輔臣辰入申出辦事閣中擬票旨意所得預聞者獨寫票中書而已其於諸司章奏誰敢攜之以出而越閣門一步者後不知起自何年內閣輔臣偶然患病不能進閣遂將本發於私寓權一擬票自是以後乃遂相沿為常一往一來十手十目始不能無漏泄矣夫公事而議於私室大政而决於委巷固已非朝廷之體矣又况機事不密而有害乎且臣等亦因是有不能盡職者何以故中使臨門銜命守催則不得從容審處以竭其心思二三寮友各自為寓復不得相聚商確以資其謀斷故率有進呈甫畢而旋即後悔以為不當者兹所為不能盡職也夫首輔平章軍國臣等同平章事今姑為首輔代庖耳乃遂亦因循故事擬票私家寬之則見謂苟且急之則指為專擅或以為髙下其手者亦安可獨任一見而居之不疑也若至於時當暮夜然燈秉燭衰朽之人眼目昏花連篇纍牘微茫細字欲逼近則懼有疏虞不逼近則不能了了其進呈甫畢而旋即後悔者此固亦一端也抑更有可虞者印在閣中臨時開用用畢封鎖亦宜慎密今祇因用印無時印不能隨官出入遂預印封筒常至三五十副付之直票中書使得隨便使用幸今中書皆其循謹守法可保無他者安知異日無不肖之人與意外之事出其間乎臣等亦不得不為是凛凛矣伏望皇上深惟遠慮仍復先朝舊規發本閣中公同擬票以上尊朝廷之體統下盡臣子之職分旁塞窺伺之孔隙亦革故鼎新之一事也臣等不勝懇切祈望之至辭軍功加恩疏頃䝉皇上叙録皮林功次推恩閣臣加臣太子太保廕一子入監讀書賞銀四十兩綵段三表裏給與應得誥命臣不勝驚惕謹從二輔後聨疏控辭不䝉俞允臣竊惟朝廷礪世惟是賞罰兩端人臣立身惟是辭受一節顧豫之自上必度其所可受而賜不虛受之自下必承其所當豫而心無愧是以君制命臣制義皆非可貿然為之也皮林之捷本天威震蕩王靈赫濯底茲宏烈皇上乃遜謝不居而加恩帷幄之臣夷考其時則身在密勿而運籌决䇿者惟有今元輔一貫始終其事臣無預也臣詔起田間遡惟師期方在草莽邈不相聞謀於何有不當其時而論功不在其位而行賞彼被堅執鋭出萬死不顧一生者其視臣必不心服也此臣之所以不敢拜命也抑又有大焉者今天下懷才抱德之士或以一眚而見斥或以株連而被謫其伏在巖穴不得進用者不知其若干人其久次待擢屢推不報前壅後滯上鬱下堙者不知其若干人其內外官聨久缺不補以至於庶職叢脞而牧民守疆承流宣化無與任事者又不知其若干人以臣區區者而在此若干人之中則豫章之一朽株也乃叨在此地既不能為朝廷進一人而徒多躐取避賢謂何以人事君者謂何竊位負乘世所滋詬此臣之所以不敢拜命也抑又有急焉者今天下百姓或以饑饉或以工役或以軍旅或以征𣙜以致其父兄子弟鰥寡孤獨流離困苦者所在而是臣不能運一籌出一力以厝之安全乃一夕而䝉恩四世既顯其身且逮其先復延其後其視彼饑溺由已者抑何其自為厚而為人薄也此臣之所以不敢拜命也抑又有關於君臣大義者主上方怵於陵園之變誓修實政日昃不遑臣備員補弼不能分猷念以共助憂勤而乃於此特拜新命又為非望之福得無與泄泄沓沓者類耶應天以實不以文夫既有明詔痛加修省不引咎自責而訑然自是豈其視天變為不足畏耶主憂臣辱豈宜若是此臣之所以不敢拜命也夫以礪世之賞罰與立身之辭受揆之於義皆有不可故臣今再有瀆陳者匪專為身亦以為朝廷重名器也惟聖慈俯鑒臣愚悉收回恩命使臣得以義自安不辱君命不勝幸甚乞休第二疏臣前具疏乞休伏奉溫旨慰留臣仰惟聖眷加意愚臣優厚若此敢忘圖報顧臣思其反也思其復也則自知有不能者不敢不哀鳴於君父之前蓋臣子立身大節不過一忠其事君而能為忠臣也則天下之至榮也其不忠則天下之至辱也所謂忠不必皆龍逄比干也其遠而宣猷效力近而責難陳善尊主庇民有造於天下國家者皆是也其不忠不必皆奸回諛佞也凡力有不竭於已心有不盡於君而委之無可如何以任其自成自敗者皆是也二者之相去霄壤矣而出乎此則入乎彼其間不能以寸臣當斯際則旦暮之人而啓手足之日也敢不量度能否以望全歸而猶尸位素餐悠悠卒歲斃而後已乎夫使臣年力强盛而無他危症也猶可舍舊而新是圖也乃今則老若斯病若斯矣一旦長逝徒見為鐘鳴漏盡不知止足何能有桑榆之收者此臣所自量一也又使臣應詔以來曾有建明即不幸身先朝露則以其已試之功而掩其不忠之罪臣目亦猶可瞑也乃今則待罪密勿三載於兹上不能分毫弼主德下不能涓滴恤民隱中外大失所望謂上弓旌盛舉何異夢卜形求而所得之人僅僅若此固已虧堯舜知人之明矣若猶復倔强於牀褥淟涊乎祿位進退不關其忠職任不行其術豈不亦容容保位為當世增詬侮乎此臣所自量二也縱不然而海內清明與天下相安於無事臣亦可藏拙匿瑕不嫌於碌碌伴食也今環視四境之內在在民心已離處處土崩可畏其時難其勢難猶厝火積薪之下火雖未然而煙雲已滃然四出一發而不可撲滅矣倘及於亂為股肱者死足贖乎此臣所自量三也夫是三者皆所謂不忠之類自處之辱也一之已甚再其何堪記有之曰事君者量而後入不入而後量臣昔應召之時義在行與不行彼一時也固一大出處也今之日則在止與不止此一時也亦一大去就也臣安敢不審求其是而自甘於不忠之辱也雖然用壯者以力用老者以言諫行言聽即力已效矣力效即所以為致身也臣在野猶在朝也諫不行言不聽則無所見功無所宣力臣雖備員左右不過血氣之軀而一籌未展竟亦何裨其在朝猶在野也由斯以談言用為上身用次焉故古之英君誼辟遇有衰老篤疾之臣不能受官則使人受言於家或當去國之日亦諄諄叩所欲言而聽其人之自去蓋言在則即其人在也臣老矣篤矣且就木矣必不能儋爵受祿以苟富貴惟有此一得之餘為可申犬馬之戀惟聖慈允賜骸骨臣不勝幸甚乞休第三疏臣仰誦綸言感激泣下實不忍再疏言去惟臣自筮仕至今四十餘年雖不能有所建明而道義物身兢兢業業實不敢苟乃今晚節末路則易簀正纓之日也顧獨可苟焉而已乎蓋從來論大臣有三上焉者得時行道致主澤民濟世運於平康著功名於竹帛此儒者分內事幼學壯行所汲汲望而赴之者惟此蓋三公不為貴而萬鍾不言富也臣白首應召豈尚有富貴之心哉亦過望及此耳乃自濫密勿以來大工肇興征𣙜四出雖目覩生民塗炭禍亂將萌而臣誠不足以格天才不足以興治上不能弼吾君於堯舜下不能拯斯世之艱虞詎惟有愧於莘耕版築之遺即漢唐而下諸所稱名世勳猷者亦不得追隨其步武之萬一是上焉者臣已不能矣若所謂下焉者則富貴利逹之流君可則欣然而從之君否則頽然而順之旅進旅退姑委重負於他肩無咎無譽聊以苟且而塞責此在臣今日亦不能諱也夫燕雀處堂非不可苟一時之安倘人心已渙以至於不可收拾而身冒誤國之罪當此之際臣之肉其足食乎蓋羝羊觸藩本臣今所處之勢而舉大義以讓臣者必且曰惟鵜在梁不濡其咮然則下焉者又臣所不屑也必不得已而思其次其周任所謂陳力就列不能者止孔子所謂以道事君不可則止乎臣所欲奉以周旋以求悔過如是而已蓋皇上往常論相嘗遲回數年不决一旦拔臣於隴畝授以國政何其斷也乃今待命纍期不得窺青蒲一膝之地陳言纍牘不能轉重瞳一盻之榮而頓令當日弓旌黯然無色故鄉猿鶴憐而望歸有足悲矣矧復役役不休棲棲弗決一何集詬無恥至此也昔既無所聞而誤徴之今又無所見而誤留之豈不傷堯舜知人之明䙝朝廷置輔之體哉古人云廉遠地則堂髙臣及今一息尚存求歸正首丘者蓋不得其上思其次雖自為出處亦猶為國家計也惟聖慈容臣歸里使得為碌碌無聞之人而一洗荷戈與祋之恥無令天下後世謂聖主勤思枚卜僅得一貪位慕祿之臣而卒齎志以歿也臣不勝幸甚乞休第七疏臣當衰殘之候而有篤廢之疾連月以來乞休辭俸俱未䝉允聖恩髙厚何忍固辭獨念臣足已廢矣猶尸位素餐臣寧忍乎名已虧矣猶靦顔就列臣寧忍乎臣為是殊日夜不安而頃所不敢聲言者以奸書一事臣曾被竊鈇之疑而事猶未結不敢冒規避之嫌也今既屢經勘審奉旨裁决與臣無干臣固可以言矣請敬陳之臣非經濟學術可為世用惟恃此一念朴忠或可結主知取信於一二寮友及百執事以相與戮力同心輸誠報國此臣所挾以為質者僅有此區區而已也祇緣臣生平聞望不能孚人又兼之老病昏迷不善涉世故頃奸書事起遂以波及伏荷聖慈以臣叨備輔弼重惜國體深詔執事勿過搜索臣乃得掩其瑕疵不膏斧鉞及至府部等衙門㑹審之時取具招由亦首開輔臣沈鯉已奉明旨無容議臣益得逃於法比不坐深文雖曾有巡徼邏卒陰環臣寓偵伺譏察迄兩月而後解嚴而臣首鼠深藏卒亦無所發覺雖臣原籍地方喧然騰播謂臣已坐奸黨臣舉家驚怖欲死而久亦流言漸息保有室家蓋秋毫皆上恩也臣何敢忘亦何所不愜於心惟是臣親疏內外朝野遠近之間見臣有此一番知其聞望輕鮮不足服人遂無復信臣朴忠者而臣失其質矣臣將安所挾持與在廷諸臣尋往日之盟比肩而事主夫大臣居輔弼之地者必能使天下信其心而後可平章天下亦必能自重其身而後可以重朝廷臣自底不類而至辱國辱寮友詒羞當世之士即噬臍有悔而拾瀋終難欲收之桑榆而已敗之鮮不可以登君俎矣顧猶可參鼎足弼聖主處密勿巖瞻之地耶臣生性懦弱又適跛一足如婁師德即唾而自乾不見為難惟士君子立身行已繩矩有定人品係焉臣雖不才不敢屑越蓋持已與待人異度量之與節槩可兼有而不可偏廢者也度量欲𢎞𢎞則宜含垢納汚犯而不校節槩欲方方則宜章義貞志不容淟涊故待人寬而恕責已重以周道各有攸當也昔宋臣呂䝉正不問朝士訕已者名及論事帝前辨析可否至補牘覆奏而終不變帝亦言其太執豈截然兩人亦惟義所在耳臣非曰能之願學焉不務為休休之度而遂忘硜硜之節也假令臣徒見人不見已一幸及寬政即昻首伸眉日蹩躠兩足前挽後推入長安門每晨焉如是每夕焉如是無論臣自顧其形影堪憐抑道傍觀者寧無指目臣竊笑而曰夫夫也老若此病廢若此又曾擬奸黨而厠名法司獄案矣乃猶揚揚焉于于焉不自知止足若此也豈赤墀金馬之榮有縶之維之者耶居表儀之地而為集詬無恥者張赤幟則士風啙窳實臣倡之臣不應自菲薄至此故臣今病廢乞歸非止為一身進退而實為世道有深長之慮也伏望皇上憐臣苦情特允休致保全朽骨不令臣老眊日益再有罣誤以至於不可赦原臣不勝感荷天恩之至抵家謝恩疏臣以衰朽殘廢屢疏乞休於七月十六日欽䝉聖恩特賜矜允又頒賜路費銀兩表裏臣十七日具疏謝恩二十日具疏辭朝二十一日黎明於私寓門前恭設香案扶掖望闕行五拜三叩頭禮出京隨該行人司行人潘珙沿途護送由真定順德等府至八月二十四日抵家臣原籍河南接壤畿甸計程僅可二十日而臣尫羸之甚不耐馳驅又適經過地方連歲災傷閭里蕭條驛遞夫馬倉卒難辦臣不忍更加趣迫以故其行之遲也臣一入里門自幸骸骨得遂首邱之願如同再世之人仰荷生前不勝感激隨望闕叩頭三祝卜吉於九月初二日具疏陳謝伏念臣備員四載未展一籌愧非舟楫之才每致鼎餗之覆下失民望上負簡求在朝既泯然無聞在野豈恝然忘念惟拾遺補過諸臣之折檻已詳而明目逹聰大聖之轉圜自切雖不能忘去國之懷乂安敢為煩言之瀆獨憶昔濫竽密勿承乏擬票之日曾見得各衙門題奏本章有未奉旨者趣便補牘覆奏名曰催本大都正本一而催本常二三乃頓使文案日增有妨清燕得無於御覽太勞而批答難驟乎蓋四海安危備載於諸臣之纍牘萬幾通塞取裁於皇上之一言朝野望殷軍國事重稽遲尚有叢脞停格豈無憂虞臣在道而惓惓不忘歸田而縈縈繫念者則為其關民社之休戚而恐煩君父之憂勤也伏望於魯論堯曰篇取一敏字以上接帝王相傳之統於周易卦爻內袪一需字以常操聖神無逸之心或更於旃厦時有咨詢黼扆日有臨御於法紀則剔其宿蠧於武備則振其積衰於去冬特降之德音而持之有常於近日兩頒之恩詔而踐之不爽則上下之情通而君逸臣勞海宇之生遂而民安事治吾君並堯舜而三斯世與唐虞無二矣故敢因陳謝之餘而併伸芹曝之獻臣不勝感刻祈祝之至病危遺疏臣本章句腐儒遭逢盛世誤䝉簡用謬陟綸闈伴食雖逾數年分毫曾無裨補歸田之後復䝉特賜存問朽骨可銷鴻恩難報今臣之病亟矣不能復生矣臣聞古大臣有遺疏雖死不敢忘君也臣一息尚在敢憚昏憒而不思自效乎臣從幼善病未老而衰今且老死於藥裹中無日不檢方延醫臣聞之醫家云治已病不若治未病保衰年不如保壯年臣竊繹其義幾於保泰之說夫泰之一卦前三爻致泰也後三爻保泰也不言所以享泰者聖人之意微矣我皇上乘乾御宇四十餘年紀度修明中外寧謐不可曰非泰顧泰之對即否乘除理數相循若環更無住足之地我皇上邇來葆光穆清使羣臣不得一覩天顔雖神明洞鑒無微不周然獨知之契終不若與衆共見之之為公且大也易曰天地交而萬物通也交而後通天地不能違也而况於人乎今上下之情釡鬲而不交矣伏願我皇上轉圜納諫虛已用人朝廷大政事大機宜一循萬厯初年故事聚精㑹神敕幾綜務振其頽惰抉其壅鬱閣臣必親曰是豫一人之心膂也大柄懼其潛移矣大臣必補曰是豫一人之股肱也事權懼其旁落矣臺諫諸臣號曰耳目何為吝惜一官而不自開發其聰明也內外諸司猶之百骸何為久曠庶官而不使各效其拮据也法宫邃閟清蹕不傳所藉以通上下之情者惟兹章奏一線是國之脈絡也見為當下而或經年不下見為不下而有時特下待命者如籲天祈帝恍乎其不可必也以是不下者疑於煬竈下者疑於營窟而朝端紛紛之疑起矣則胡不明示可否而塞其疑竇也廢棄諸臣强項骨鯁曾藉以持天下之正論者於今僅存數人是國之紀也見為迂狂而其言各有當見為明棄而或陰用其言主爵者雖補牘屢請寂然其無聞也以是生者甘白駒於空谷死者抱赤臆以長終而國家謇謇之用鮮矣則胡不𢎞其茹納而速為簡拔也國孰與立惟兹蒼黎是國家之元氣也元氣壯則國勢强元氣衰則國勢弱今江之南北山之東西朘削椎剝十室九空民貧思亂蓋脊脊然臣謂宜罷𣙜採之令減贍藩之田愼守令之選積逋可蠲者急蠲之饑荒可賑者急賑之使四方萬民曉然知聖天子恤民德意庶可以培我元氣而綰結其既渙之人心也至於國家之根本所關最切者又莫如儲教東宫講筵不御久矣光陰如駛胡可再遲雖睿質天成而人情物理備載典墳非學胡以聚之皇長孫年逾十齡天真內韞瑩然如未琢之玉養正聖功惟在今日語曰心未濫而先諭教其化易成也臣竊謂蠲吉陳經親賢贊道不可不汲汲已此又萬世燕翼之鴻圖也夫是數事者皆諸臣所已言所常言且人人言之不憚其煩者臣病中尋繹國家急務實無逾此臣亦何敢舍要言而支蔓以陳也伏願俯鑒臣愚幡然易慮無曰已治已安而恆若厲若惕以諸臣之常言為藥石以愚臣之緒語為導使是所謂治之未病保之未危者也宣鬱疏滯合千萬人之心思為一人之心思合千萬人之意氣為一人之意氣淪洽蒸盎天宇暢然家國天下情無不通宗廟社稷福以類應泰寧盛治可以保之永永而臣之犬馬微軀雖死猶生也臣伏簀涕零不知所云亦玉堂稿卷五
