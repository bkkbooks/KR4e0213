body:
  text: 亦玉堂稿巻一明沈鯉撰請復建文年號立景泰實錄疏竊惟人君有位號則有紀年有政令則有實錄此春秋不易之法自古及今無有以興亡隆替而因革予奪其間者我朝自太祖開基列聖相承金匱石室之藏具在乃建文以革除而槩稱洪武景泰以分附而幷系英宗則皆為我朝闕典矣所據司業王祖嫡有循史職修缺典之奏臣等請先述其畧而後及所以當正之故為皇上陳之我太祖高皇帝在位懿文太子先薨至洪武三十一年太孫嗣位改元建文在位四年成祖文皇帝靖難踐位乃削去建文年號仍以洪武紀年及重修高廟實錄遂將建文實厯附作洪武虚數此則革除之大畧也正統十四年北㓂入犯英宗睿皇帝躬馭六師自行天討至土木北狩景皇帝時為郕王奉皇太后命監國旋正大位次年八月英廟囘鑾後七年復辟是為天順元年其時奸臣石亨輩奏將景皇帝廢為郕王加諡曰戾成化元年修英廟實錄遂以景泰事蹟附於正統之後天順之前注曰郕戾附至成化十一年憲宗純皇帝追體英宗本意始勅廷臣復景帝位號上恭仁康定尊諡改修陵寢景泰七年事蹟未及釐正此則附錄之大畧也因循以至於今非謂其不可而遂已之也夫位號既復則實錄自當改正許其大不許其細是未體夫英廟之心而已矣伏讀成祖登極詔書不過以建文四年為洪武三十五年然猶稱為少主未聞降削位號是在成祖親親之心亦必有不忍絶者而一時宣力歸命諸臣或務張功伐或苟存形迹遂贊成革除之事其亦未達夫成祖之心耳夫成祖奉天靖難再造邦家正使年號不除何損萬一而曲為掩諱若此且天下後世各有耳目安可盡泯稗官野史各有紀載安可盡革此不但無益於事適足示人以疑故議復革除者非為建文為成祖也議更附錄者非為景帝為英宗也兹皆所不必諱者也方今聖明在上修遺舉墜以𢎞先徳正在此時臣等不敢為更張之議惟將英廟實錄中間七年事蹟名曰恭仁康定景皇帝實錄無相混淆如是而已至於建文位號詔書中原無降削之文今亦無憑議復亦惟於高廟實錄之末摘出四年事蹟復稱建文年號如斯而已夫以我太祖甫定天下即首命儒臣纂修元史又追諡其主為順帝淵哉聖心至公至厚矣成祖英宗之心同符太祖而建文景泰又非勝國之君之比也元主可諡何忍沒其號於建文元史且修何可闕其錄於景泰且景帝之位號既可復則建文年號亦可復建文之死事諸臣且䝉我皇上之卹錄而况其君乎况其為太祖之嫡𦙍乎慰祖宗在天之靈伸寰海久抑之意彰微顯闡幽之烈寓興滅繼絶之仁斯舉也實聖徳聖政之第一事也獨可稱昭代之信史而已耶惟鉅典湮於累朝而一旦頓復公論關乎萬世而傳信無窮皆出自人主獨斷非臣等所敢擅擬伏候聖明裁定乞停取麒麟疏該文書房口傳聖㫖聞河南産有麒麟撫按官如何不奏著禮部傳與他速進來看欽此臣等仰惟我皇上之意不過以麟為異物世所未見欲取而觀之以知夫麟之所以為麟者之狀如何非有貴竒好異之意也為臣子者承君之命奔走不遑豈暇有言以及他事惟麟産河南光山縣而臣鯉河南人也知之頗詳不及今預言其狀或奏進之後無所可觀則臣為緘黙取容而陛下有誤舉之悔臣等雖九死不足以贖罪故敢據實為皇上言之蓋麟之生本自於牛故其形猶在乎麟與牛之間初生雖有鱗甲不甚顯著非如圖畫所傳出於好事者之手而楚楚可觀也踰日而斃至於今又復數月竊意其形已枮槁必不如其初之猶有麟之狀也陛下方軫念元元整飭吏治日勤思於三皇五帝之業如將不及忽渙發大號布於下國以徵一既槁之麟無乃駭人觀聽乎夫人主之有所好尚舉動以昭示於天下也其端甚微而及其樹之風聲傳播於四海九州之外使天下皆耳而目之則其究有不可勝言者故一物之微而責以不奏則四方之奏竒異者且紛至焉督以速進則四方之進竒異者又且紛至焉此尋常之所謂無妨而登三邁五如我皇上則一舉一動有不可不慎焉者也夫物固有以祥稱者迨其斃也則已為不祥之物不祥之物所宜用桃茢以祓除之而奈何敢達於至尊之前臣等竊意撫按官之不敢奏進及臣之不敢遽有徵取亦惟以慎重其事而非敢拒違也惟陛下俯鑒臣愚特賜停止幸甚議孔廟從祀疏臣等仰惟皇上以聰明睿知之資膺治敎君師之任於兹從祀一事虚懷茹納博采羣議真舍已從人之度而聖不自聖之心也臣等亦何敢不仰承徳意審於鑒别以少禆皇上右文之治謹遵奉明旨於本月十五日㑹同九卿科道儒臣齊赴闕下裒集衆論較量其間與廷議者共四十一人除註有原疏外内註胡居仁從祀者二十五人註王守仁陳獻章者俱十五人蔡清五人羅倫二人呂柟一人惟居仁則仍有専舉且無疵議在石星則議王守仁陳獻章不宜立門戸講學在丘橓則議守仁乃禪家宗旨在吏部右侍郎王家屛則乂謂從祀重典非真能信今傳後者未可輕議非真見其能信今傳後者亦未可輕議若使今日議入他日議黜恐反為盛典之累故未敢遽擬其人也臣等反覆叅詳看得從祀一事持久不決必煩廷議者則以在廷之臣可以盡天下之公議而衆言僉同人品自定所以要之於歸一之論也今與議諸臣舉從祀者莫不以胡居仁第一即有次及居仁與其不舉者亦毫無異議臣等考其平生與其論著亦大都淵源孔孟純粹篤實一時名儒如羅倫張吉婁統周瑛賀欽羅欽順張元禎之類皆極口稱可比於薛瑄而以其論著與瑄之讀書錄並傳焉斯其不愧孔子之徒已大彰明矣如䝉采納容今臣等以居仁行實撰次上覽特允從祀自足以増重儒林豈必求多蓋我明道化翔洽人文輩出二百年間侑食孔廟者僅薛瑄一人誠慎之矣今距祀瑄之後未二十年而又得居仁與之並祀亦所謂旦暮遇之比肩而立者雖一人不可謂少也至於守仁之學在致良知獻章之學在主靜皆所謂豪傑之士但與議諸臣與之者僅十三四不與者已十六七甲可乙否臣等亦何敢輕議查得嘉靖十九年亦曾廷議薛瑄彼其時固毫無間言也而庶子童承叙贊善浦應麒猶以為事體重大莫若少緩竟以報罷至隆慶元年復下廷議則在議諸臣或挽或推惟恐其不預於澤宫尸祝者何人心之同也夫惟人無異議故盛典一舉至今為俎豆之光今守仁獻章既不能毫無間言又一時與議之臣亦多有耆舊老成直諒多聞之士而不皆為二臣左袒者是輿論未協而事久論定尚非其時也臣等有感於承叙應麒之言故敢亦請緩之以俟公論之定而徐議於後似亦未晚蓋事可垂千萬年而不朽者即遲囘數載而不為逾時禮有垂千百世而示法者即詳審再三而不為過慎與其祀也而有議豈若議定而後祀乎蓋可祀不祀者其失怠怠猶可補於將來米可祀而祀者其失誣誣則貽譏於後世拾瀋反汗勢豈能及是不可不為深計也昔孟軻告君以進賢之道至於左右皆曰賢諸大夫皆曰賢而猶未敢信必至國人皆賢也而後察又親見其賢也而後用彼固一人之進退一時之是非耳而猶然若是矧是舉也在朝廷則象賢崇徳見道揆法紀之公在天下則章軌作人為俗易風移之漸所關甚鉅可嘗試而漫為之耶如皇上以我朝人文遠軼前代不宜寥寥若是臣等謂隆古以還士之以行誼道徳令聞長世者非託之於顯位則託之於門閥非託之於文章則託之於勲業順風疾呼聲聞易達所藉然耳如居仁固深山窮谷之士而布衣韋帶之夫自非實徳過人足以取重於當世雖擇地而趨噦心而語其誰為傾耳而聽正目而視者惟皇上超然遠覽拔之於儔伍之中榮之以宗祝之位則日月之光賁及豐蔀雖在齊民無不興起比于祀瑄尤為盛事兹臣等之所謂一不為少也至如蔡清羅倫章懋黄仲昭陳真晟吕柟羅欽順鄒守益中間或未有専祀者乃望推廣徳意専祀于鄉通候論定之日另議則仁至義盡斯可為天下萬世之法而薪槱之道以光蘋藻之禮不濫一舉而二物具矣再照講學為致知之事聖門之所謂條理之始也夫學亦安可不講也顧六經孔孟之道既昭如日星而漢宋諸儒之書又發明殆盡後雖有述何以復加所貴乎學者亦守其師説慎思明辨如何為格致誠正如何為齊治均平隨事精察敦行不怠雖暗室無愧必白首一節如是焉而已世之學者不務為平易而厭薄古訓欲自名家至為續鳧頸以見長添蛇足以工畫於子臣弟友日用常行之道仄視為弁髦不講焉其又有竒者則片言單詞樹之赤幟而天下之喜為名高者亦苟見前茅之所在遂靡然趨之口耳一言反復論辨至窮年不能殫其説其流之弊將有内棄其心而外棄其事之弊以釀成清談之俗者此不可不為早辨也伏願皇上既慎簡可祀之人又渙發徳音使天下知朝廷之所以崇祀者意在此不在彼則世道人心不勝幸甚諡法疏臣聞帝王之所以勸懲天下者莫大乎爵賞刑威帝王之所以不賞而勸不威而懲者莫大乎諡法是諡也父不得以私其子君不得以私其臣者也得失一朝榮辱千載雖以褒貶既往實以激勸將來是以自古重之也國朝稽古右文尤嚴斯典祖宗時文臣得諡者不過數人雖以中書省之尊六卿之貴文章功徳有可紀者亦不得輒諡無他重之也宣正成𢎞之間文臣雖往往得諡然名義甚美者或不輕畀以文學直内閣者不皆諡文則慎重之意猶有存者浸淫自正嘉以來以至於今則濫觴甚矣夫京堂三品以上子孫得自陳乞例也而人有醇疵行有巨細乃一切加以美名則是皆善而無惡也生前有未盡之善則改而更諡厚也而行玷縉紳名汚青史者獨因仍而不易則是有進而無退也此皆臣之所未解也昔我太祖之諡其子也於魯王而曰厲於伊王而曰荒夫荒厲之非美諡亦明矣我太祖豈不愛其子哉示天下公也不以父子之情而廢國家之法也父不得以假其子而君乃以諛其臣竊以為過矣臣又嘗考李唐時許敬宗諡繆蕭瑀諡褊繆與褊之為諡人所惡也不敢貸也又嘗考趙宋時司馬光斥夏竦之邪不許文正韓維定陳執中之議必諡榮靈光與維在當日仕同朝也不敢私也今日諸臣之諡豈無許敬宗蕭瑀其人者乎當其時能為司馬光韓維之直者誰乎國朝人物之盛遠邁唐宋而諡法予奪反太輕疎何以垂訓將來光昭前古似不可不亟正也至於文之一諡尤重且大非道徳學問則忠信惠禮必唐儒如韓愈宋儒如朱熹始可無愧即不能然亦必其一節足以當之今不目其善狀不耳其風聲一經翰苑莫不諡文彼其真文者既無以表其賢而不文者又有所溷其不肖是勸與懲兩失也且如先臣禮部尚書霍韜新建伯王守仁非文學職也而得文之一節與之誠是也如吏部尚書某兵部尚書劉大夏不以文名也而有文之實用獨靳之何也可文則文何嫌於庶僚不可文則不文何有於翰苑蓋古者生無爵則死無諡是故凡有爵者皆得諡惟其當而已矣臣願皇上遠法隆古近鑒唐宋念褒貶之㫖不可偏廢思名義之重不可輕假慨然獨㫁特下所司一洗冒濫之風永翊清平之治臣愚幸甚世教幸甚請建儲第二疏萬厯十四年二月初三日該大學士申時行等一本為懇乞宸㫁册東宫以重國本事奉聖㫖卿等以册立元子請朕兒嬰弱少俟二三年舉行欽此臣等仰惟皇上既留心宗社之大計又慎重國家之大禮訏謨定命㫁自宸衷亦既明示之期矣臣等愚不及此乃於昨年正月復有凟陳伏奉聖㫖還候㫖行欽此臣等屏息待命又復數月矣竊以管窺仰惟聖意似欲不爽其三年之約而姑徐徐以至於今者凡以重綸言而示大信於天下也今計明歳已逾三年元子亦且八歲以聖功則正當䝉養之候以睿姿則非復嬰弱之期皇上之所以慎重大禮而有待舉行者此其時矣臣等備位禮官職掌攸係方擬遵奉明旨諏吉上請乃今兩直十三省大小文武衙門及天下王府藩國四夷朝貢之使凡以入賀萬壽聖節到京者俱言其境内臣民亦皆延頸舉踵以望册立之日久矣蓋皇上以深仁厚澤感結天下之人心天下之仰戴吾君者亦各欲快覩盛典為宗社萬年之慶固宜有如是其切者乃臣等猶膠執前㫖以待三年之期拘泥舊聞以避閏餘之歲者不已迂乎且過此則履端將届適萬國述職之辰盛徳在木又三陽啟泰之日震宫鼎建允謂元吉巽命渙頒禮宜預定臣等敢因四方入賀人員鱗集闕下而具述華夷中外同情以申前情蓋以為天下請也伏望皇上循累朝之令典承二聖之歡心重大號之已敷順羣情之同欲特霈俞音容臣等將册立舊儀查議上請預行各該衙門整飭備辦以待擇日舉行則宗社之大計已定而詔㫖一頒萬方闓懌因之以導迎協氣上迓天休普施慶澤下康兆庶者在兹矣臣等不勝懇切祈望瞻仰歡忭之至請並封恭妃疏近該閤臣及科道等官相繼上疏册皇長子正位儲宫未䝉俞允隨奉聖諭進貴妃為皇貴妃臣等竊意我皇上之為此舉也不過以宫闈之慶加數示優非有他意也乃不意一時之人心妄相忖度或以為建儲宜早或以為恭妃位號不可不因子之貴並陟隆稱而議者紛然矣臣等屬在禮官預有職掌不及此廷議紛紜之時而稍為折衷之論恐自是以後建議益煩不免凟天聽而傷國體也夫立子以嫡立庶以齒自古已然今者皇長子既稱元子則主鬯有歸而天下之人心係屬久矣即使母妃位號無所増益其孰能違之者而豈藉此以重耶但臣之愚則以為舉大慶者貴和豫交通稽典禮者宜徵諸故實而帝王之化始閨閫以御家邦有不可不慎其微者查得嘉靖十九年貴妃王氏沈氏同日進封為皇貴妃此其已事可徵在世宗皇帝之時固稽諸典禮而協也今中外人心既以係屬元子者欲崇其母妃之號臣等亦伏望皇上俯循輿議率由舊章因遂以元子之貴貴其所生而並錫渙號以重國本似亦禮制之宜者也伏乞勅下臣等一併具儀上請册封則禮達分定言順事成而協氣普於宫闈浮議息於道路矣乞宥議禮諸臣疏先該閤臣及科道等官請册皇長子為太子隨又欽奉聖諭進貴妃為皇貴妃惟時大小臣工翕然望蚤建元良以定國本並封恭妃以正名分而臣等叨為禮官顧不能明正典禮有畫一之議以厭衆心而致姜應麟沈璟孫如法先後以言得罪且至今紛然未已也夫禮官而不能正禮則曠官以其所不能者而貽之於人以代已受譴則不恕皇上方日隆唐虞三代之徳為是舉也而使人有疑於天地之量此明旨所謂致君於有過之地也則不忠如是而不與三臣同罰皇上之寛仁至矣顧臣等猶可靦然以居此位乎伏乞罷臣職以重典禮之任仍勅下吏部將姜應麟等照常遷轉以開其自新之路則黜陟明而人心以勸斯稱從諫聖后矣抑臣等反覆思之聖明之世甚不可使人心蓄疑而訛言繁興也皇上之欲建元子而姑以待年也明㫖屢下豈不推赤心於人腹中乃羣疑未釋而道路之言有不敢以達天聽者此其故何也蓋元子天下之所繫心也而為元子以上封事者則動有貶謫之罰恭妃元子之所自出也而為恭妃以祈並封者則不䝉俞允之命故人心易疑而訛言相煽如此耳臣等前以並封請今兹為三臣請正有鑒於此而欲以弭之於將來也頃緣貢舉方殷不能自陳求罷今三臣之悔悟已深天威已霽矣故敢歴述其不職之狀而為三臣者明之伏惟聖明裁察焉正文體疏儀制清吏司案呈照得近年以來科場文字漸趨竒詭而坊間所刻及各處士子之所肄業者更益怪異不經致悞初學轉相視效及今不為嚴禁恐益灌漬人心浸尋世道其為患害甚於異端蓋人惟一心方其科舉之時既可用之以詭遇獲禽逮其機括已熟服役在官苟可得志何所不為是其所壞者不止文體一節而亦於世道人心大有關係相應題請申飭以遏狂瀾等因到部臣等看得言者心之聲而文者言之華也其心坦夷者其文必平正典實其心光明者其文必通達爽暢其不然者反是是文章之有驗於性術也唐初尚靡麗而士趨浮薄宋初尚鈎棘而人習險誦是文章之有關於世教也憲宗諭詹事黎淳曰出題刋文務依經按傳文理純正者為式故今鄉㑹試進呈錄文必曰中式則典雅切實文理純正者祖宗之式也今士子之為文何式乎自臣等初習舉業見有用六經語者其後引用左傳國語矣又數年而引用史記漢書矣史漢窮而用諸子諸子窮而用百家甚至取佛經道藏摘其句法口語而用之鑿朴散淳離經叛道文章之流弊至是極矣其文體尤恥循矩矱喜創新格以清虛不實講為妙以艱澁不可讀為工用眼底不常見之字謂為博聞道人間不必有之言謂為𤣥解苟竒矣理不必通苟新矣題不必合斷聖賢語脈以就己之鋪叙出自已意見以亂道之經常白日青天之下為杳㝠魍魎之談此世間一怪異事也夫出險僻竒怪之言而謂其為正大光明之士作𤣥虛浮蔓之語而謂其為典雅篤實之人也可乎如謂人自人而言自言則以文取士者獨以其文而已乎抑孟子之所謂生於其心害於其政者豈為無稽之言乎臣等不以文為重而為世道人心計心竊憂之嘗謂古今書籍有益於身心治道如四書五經性理司馬光通鑑真徳秀大學衍義丘濬衍義補大明律㑹典文獻通考諸書已經頒行學宫及著在令甲皆諸生所宜講誦其間寒素之士不能徧讀者臣等不能强博雅之士涉獵羣書臣等不敢禁但使官師所訓迪提學所課試鄉㑹試所舉進者非是不得旁及焉仍乞容臣等㑹同翰林院掌印官將𢎞治正徳及嘉靖初年一二三場中式文字取其純正典雅者或百餘篇或十數篇刋布學宫以為凖則非是不得錄取焉除鄉㑹試已經臣等題定有犯前禁者隨即指名叅處外其省直提學官各持一方文衡品題高下人皆嚮風轉移士習尤為𦂳切如使膠庠之所作養者皆務為險僻竒怪之文而鄉㑹之場欲合乎平正通達之式臣知無是理也乃往時止於科舉年分稍一申飭其各省直小考則任其變亂程式置之不問是謂濁其源而求其流之清也不可得已合無恭候命下容臣等咨都察院行兩直𨽻提學御史及各省巡按御史轉行各該提學憲臣務仰體朝廷徳意相率以正文體端士習轉移乎世道而不得厭常喜新標竒攬異如復有前項險僻竒怪決裂繩尺及於經義之中引用莊列釋老書語者即使文采可觀亦摘其甚者痛加懲抑以示法程仍將解部考巻容臣等逐一閲驗咨送吏部以為提調學政官殿最伏乞聖裁亦玉堂稿巻一
