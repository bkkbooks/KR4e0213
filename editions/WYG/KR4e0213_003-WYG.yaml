body:
  text: 亦玉堂稿巻三明沈鯉撰學政條陳疏竊惟世運汙隆本乎人才風俗而人才之登耗風俗之美惡又皆自學校以出蓋學政之所關綦重矣乃今為教職者既徒取備員而有司又漫不加意以致學政日以陵夷民俗遠不如古此其故非小也臣等叨典風教不敢不身任其責謹條所當修舉者八事除議處教職事宜己經題奉明㫖外其餘七欵謹開上請如䝉俯賜采納容令臣等刋成書冊咨都察院轉行各省直巡按御史及兩直𨽻提學御史通行所屬衙門一體施行以責實效其於世道民風未必無小補也一曰明大義以覺人心夫為學不知大義而徒以條教約束之猶之行道之人不知其所適之處而責之邁往無益也夫國家養士以學校而取士以科目者何為乎蓋鄉舉里選之制既不可復不得已而觀人於語言文字之間即其言之理以期其行之篤而為國家經濟之用其大義本如是也今之士不復知此久矣童而習之惟曰吾勤學取科第可以榮吾身榮吾家也父兄之教其子弟師友之相為勸勉者亦曰惟勤學取科第可以榮爾身榮爾家也必且明體適用修已治人以畢吾性分之事如古人之所謂學者其誰乎夫出處行藏本無二道世未有窮之所養惟専以身家為念而達之所施能卓以民社為憂者故吏治之不飭不在其服官之日而自其藏修已非矣頃者我皇上軫念民艱綜核吏治至於再三臣等因是以深求弊源欲備舉國家養賢之意及古人為學之指申告多士使知向方而啟其久迷之心志仍以勅内條欵𦂳切士習者與臥碑一並刻石使士子朝夕諷誦則大義以明而學政科條可漸次修舉矣伏乞聖裁二曰頒制書以儲真才夫學不通當世之務者雖多識前言往行終不免有生今反古之失臣等伏覩國朝制書皆列聖之精神心術政教紀綱所寓於宦學最為親切者也惟其籍在天府士雖居輦轂之下有終身不知其名者况遐方遠裔者乎伏乞勅下本部轉行各省直提學衙門查照先年頒降制書其或未經刋布或刋布未廣或已刋中廢者各酌量工費大小行令所屬府州縣衙門分工刋行以資士習如大明律大明令大誥三編諸司職掌洪武正韻皇明祖訓孝慈錄洪武禮制禮儀定式稽古定制資世通訓教民榜文學校格式憲綱事宜等書所在府縣俱宜刻之至於先臣丘濬所進大學衍義補及國朝名臣有纂其行實為錄者雖不敢與制書比亦昭代文獻可為士子矜式似宜比照前件以其工費稍多者刻之藩司費簡者刻之各府使人知景師先哲以明習當世之務亦儲養真才一事也伏乞聖裁三曰嚴保結以崇行誼竊惟國家以辭章取士未嘗以辭章盡人也蓋於科舉之中寓里選之意里選者何今之保結是已夫保者甘與同罪結者要以終身式曰依奉奉事例也曰實保得某人身家並無違礙如虚甘罪示連坐也夫違者違悖於禮法礙者曾入於過犯不獨此身無違礙而曰身家並無如此乎責士之詳也始以里老隣佑之甘結謂居相近者知之必真繼以師生之互結謂學同庠者信之必審又繼以司府州縣官吏之印結謂干係重者勘之必嚴如此乎責保之宻也祖宗取士亦何嘗専辭章哉而今也失之矣覈實者久無其人與結者不知所謂雖有行不齒於家邦人可投之豺虎一試高等衆皆刮目苟工鉛槧即謂賢才保結故紙耳夫舉士不尚行士何慕而修行哉臣等為今之計不敢遠引古人鄉舉里選之法惟責其有保結之實而已亦不敢遽求士以六徳六行之詳惟望之無大過而已夫大過有十其一曰奉養有缺語言忤逆為不孝之過二曰陵侮尊長殘薄骨肉為不友之過三曰酗酒敗徳攜妓宣淫為不恥之過四曰强買田宅私債準折為不睦之過五曰出入公門為人請託為不守之過六曰賭博營利唆訟害人為不端之過七曰結黨挾官恃才慢長為不遜之過八曰營私舉惡挾讎阻善為不恭之過九曰攬包差糧武斷鄉曲為不謹之過十曰雜處下流卑汚苟賤為不重之過此十過者齊民有之謹厚者羞與交焉而况於士乎臣等請立為條格刋布學宮徧及閭巷以為保結之式使士子平日因此警省知所自重凡有童生入學生員科舉考貢舉人㑹試及舉監起選者本提調官俱取里老隣佑及本學廪増附生員各連名結狀一紙務遵照條格於各欵項下從公填註有無字親筆僉名其保結有礙與無人保結者童生不許送考舉監生員人等不許起送保結無礙者提調官研審是否真確印結送府府官亦如前審實印結類送布政司各不許虚應故事而數行之中科舉生員尤不可不嚴加查核者蓋生員一得中式即為蒼生禍福所係且人數不多於品藻亦易為力慎不可故容應試以致僥倖出身為他日民社之憂蓋科場試士本選賢才既知其不賢不才矣則亦何試之有乎有如吾姑試之而彼得文君子之辭以混入賢才之網是為國家崇冦讎而為生民聚螟螣矣一省應試生員多至四千餘人少亦不下二千中間豈無行檢不修之士何得以俱無違礙借口也如有具結生員及隣佑人等扶同隠匿或仇讎陷誣以圖報復事發連坐若提調官教官有徇情避怨容隠匪人者撫按官指實叅奏如此則有司之關涉也重所以察士者不得不詳士之科條也嚴所以律身者不敢不慎以之布列有位知其不為民害明矣伏乞聖裁四曰議考校以變士風查得近年提學奬率士類未嘗不諄諄以徳行為言而考藝論業亦未嘗不孜孜於窮經明理敦本尚實之務乃士習卒不可變而尚徳之風未有先之者則真意所在有不能喻之於人人亦以文具應之也夫天下之事言不能喻者則在以真意轉移之據今提學官按臨地方考試士子必先校藝校藝畢而賞罰行焉士子知如是之為榮辱如是之足勸戒而已矣彼其心志耳目已有定向而吾始舉其行優行劣者或一二人或三五人以示勸懲終不過舉行故事未見為尚行何如者而徒諄諄命之曰校士先行檢而後文藝其誰能信之矧當校藝之時士即有行如桀跖者倘其文在高等便已視如拱璧不忍釋手萬不得已薄罰示懲亦不過舉行故事未見為尚行何如者而徒諄諄命之曰校士先行檢而後文藝其誰能信之此真意所在有不能喻之於人而人亦以文具應之者也合無自今以後凡提學出巡一到地方即將所訪行優劣生員公同提調等官多方叅問於闔學諸生舉其與公論符合毫無可疑者各量其善惡輕重分别賞罰務俾羣情快愜的然可示勸懲不得虚應故事使人以為口實如是已畢方另日考校文藝蓋一先後之間而意指輕重已昭然明示於人人皆知朝廷之作養人才不専在詞章記誦之末必且争自濯磨以求副於公論似亦激勸鼓舞之一機也如賞過行優生員以文藝考居劣等者免其降黜罰過行劣生員有年未弱冠姑容肄業者雖文字考居優等不准補廪幫増如是以低昻文行則吾之真意可以明示於人人庶幾不以文具應之也至於較文亦自有敦本尚實之道不専在詞章記誦之未者邇來士子雖皆以經書為本業而務明理淹貫者鮮矣高者工藻繢下者習剽竊巧者務摘題拙者専記誦即有孳孳矻矻以窮年佼佼錚錚稱雋才者猶或家不蓄史鑑目不睹性理而已裒然與計偕預廷對及問以他事則茫不能知焉直至登第後始幡然有意學古亦晚矣臣等有慨於斯欲稍於成法之内矯其故習竊謂考童生者除經書二藝外必試以論論必以通鑑性理命題使其知古人行事與為學之法此外仍黙寫小學或曲禮一段以責其䝉養非俱能通曉者不得取充肄業生員除二藝一論外必加策一道策必以時務發問此外仍於朱熹家禮内命題一道使黙寫大意非俱能通曉者不得寘高等蓋禮為立身之大閑禮明則徳性堅定而忠孝節義胥從此出若有於本經之外能黙寫别經起止四條者是其學為有本即經書文論未必過人亦與優敘又或有條答時務可備采擇者是其學為有用即經書文論未必過人尤宜亟與優敘蓋國家設科取士本欲得其實用非徒取其空文而五經在人如飲食有五味繪事有五色聲律有五音皆缺一不可者也今士子各占一經雖其専門之業若能移其記誦時文者以誦讀别經通曉大義三年之内不可卒業乎即以資舉業之用孰與誦時文為多乎乃士方吾伊佔畢之初即以其一鼓之氣而敝之於章句殫其平生之力而僅為一日芻狗之用脣腐齒脫終於面牆亦可惜也矧今文體已正無雕刻組繪之勞若以専治本經諉曰未遑臣等不信矣故士専一經則學有餘力而記誦時文日多兼誦别經則不遑他及而記誦時文者自少此不但廣聞見亦可正士習焉故臣等欲懸徙木之賞以誘其進惟不為一切之法以强人之所不能也科舉而試之五策也蓋設之以事使謀而行之欲其通當世之務也乃今中式者第主經書義五策疣贅耳時務一策以居最後則又疣贅中之疣贅矣如是亦奚以䇿為竊意場屋欲得真材必首發時務策三問如有言中肯窽通達世務或博極羣書淹貫六籍者即一二場不甚優異亦與中式此所謂尚實敦本之道也夫論行既如彼而校藝又如此則考校科場不出乎祖宗成法之外而可以得真材為國家効實用矣伏乞聖裁五曰議嵗貢以儲教職夫貢士之除授教職者十常八九蓋朝廷既専藉此途以修明學政長養人材則其所關係亦重矣乃今既輕而與之又輕而棄之使師道不立人才鮮育此不可不為深計也查歴年嵗貢生員除願就教職者移咨吏部聽選外餘該分送兩京國子監肄業乃諸生俱自以年老為詞不願入監紛紛告擾不已及騐其年貌果已衰頽考其學業委多荒廢者夫以旦暮之人而强之鼓篋以待用於十年之後則不近人情也甚矣於荒廢之餘而使為師模以望其作人之功則不堪適用也審矣知其不堪而猶復以是官畀之使師道不立而人才無所成就教化日以陵夷者孰執其咎此不可不變而通之也查得萬厯五年該大學士張居正題准生員考貢一正五陪從優選取一時起貢到部者多年富力强文理成章之士乃人情不安而行之未久旋復報罷則廢棄者衆而仁厚之意鮮也臣等就中斟酌竊惟國家之養士以厚故於其出身之路宜稍從寛朝廷之用人以才故於其任職之時當更加慎今既題復舊例取食廪年深者一貢一陪固己寛矣若復於考貢之時不論其文理通否年齒老少一槩起送赴部則非國家用人之意也合無行令各省直提學官凡遇該貢年分預行各提調官將起送應貢生員各進學補廪年月除造册外仍明開卷面用印鈐葢類集㑹城嚴加考試凡文理不通者徑給與儒官劄付優免終身其文理未荒而年齒衰邁及廢疾不堪任職者止准以貢士出身行令有司照常禮待其當年起貢公費亦准盡數給與但不給公據赴部各省由布政司總造一冊兩直𨽻由各府造冊類申本部與題訓導職銜咨過吏部各給劄付致仕其貢缺不必再補如臨當考貢之時正貢遇有事故不及預考者即以陪貢為正品校如前其到部廷試文理不通者亦准照前例與題訓導職銜致仕不必更發學肄業再行起送以滋煩擾如就中有博古通今竒才異能之士翰林院題准送過本部轉送吏部再加考騐得實即除兩京國子監相應職任以示鼔舞按國朝廷試舊規止經書義各一篇判一道即有異才無從見之合無照廷試敎職例加䇿論二道而廷試之日宜申明舊規勅下巡視御史及錦衣衞巡綽官校嚴加防範凡文卷未畢兩掖門不許容人徃來以絶奸弊夫人皆有所成就則國家養士常不失仁厚之意官不至於倖冒則朝廷用人又特極遴選之公似與人情相安而法行可久也伏乞聖裁六曰明職掌以督提調竊聞循良之政教養為先故曰守令者民之師率也今之守令率視作人為末務漫不講求者比比矣上焉者考取門生以植日後之恩私苟且者到任下學緘口聽講一次而已通學諸生勤惰任其升沈善惡任其行止風化任其陵夷紀綱任其頽壞安所貴提調之責哉而兩院不以此為舉劾提學不以此問修廢無怪乎學政頽敝而風化日流一至此極也臣等嘗莊誦太祖高皇帝聖諭曰致治在於善俗善俗本於教化教化行則閭閻可以為君子教化廢則中材或墮於小人又查得洪武九年有莒州日照縣知縣馬亮考滿吏部據本州考語奏本官長於督運髙皇帝曰農桑衣食之本學校風化之原此守令先務不知循此而曰長於督運是棄本而務末豈任職者宜黜降之使有所懲葢國家之重教化不但於諸司職掌開載甚明乃聖謨洋洋昭如日星固臣子之所宜奉為章程者也奈何獨役役於簿書期㑹而於所謂風俗人心之大反弁髦視之耶臣等請申飭府州縣掌印正官凡提調諸生宜設置善惡勤惰簿四扇除訪察十過有無己紀於善惡二簿外朔望下學之日將國朝制書四禮儀節曽刋布學宮者舉以問難諸生驗其勤惰以行賞罰且因而分别登記待嵗終之日類申提學衙門拔其註勤獨多者再加奬賞累惰不悛者候按臨之日另行開報其文課則聽從諸生取便立㑹有司惟據其㑹所若干編為名號不時取閲㑹文抜其有進者量與作興因以正其文體使合頒降程式不得更為險僻竒怪以壞士習至如文廟學宮不宜汚穢傾圮簠簋几案不宜塵垢損缺先賢祠塜不宜樵採荒廢道釋庵院不宜私創増修教民榜文宜舉其節要以揭示於通衢聖諭六言宜設為木鐸以日徇於道路鄉飲酒禮本貴徳而尚齒也不宜虚應故事且濫及罷閒有過之人旌表節義本微顯而闡幽也不宜久為沈抑且畧於寒賤孤㣲之輩祉學宜隨在布設教讀宜加意遴選申明旌善之亭不宜以年少者為老人下流者為有徳名宦鄉賢之祠不宜以爵位而掩公評因子孫而及祖父山谷有懷才隠逸之人宜加禮遇先賢有衰微不振之裔宜與卹錄服舍違式婚喪踰制者宜一裁正左道惑人淫詞亂經者宜一禁止俗尚奢靡宜矯之以趨於儉朴風㑹澆漓宜挽之以歸於淳厚諸如此類皆關係世道隆汙民生休戚其得之而釀為福也如日之加長而人不見也其失之而鍾為亂也如火之銷膏而人不見也及其勢之已成機之已㑹則或為太山之安或為累卵之危葢皆有漸以致之而人乃聽之以為迂視之以為緩詎非以目前之事為吾事而他日之利害吾可不預其責乎夫帝王之治天下也不過治教養三事臣子行君令而致之民承流宣化顧可舉此廢彼以為盡職哉合無行令撫按提學官將前項事件著為條格嚴行所屬有司加意修舉即以治教養三事及操守一節分為四項以注屬官考語雖有别項政蹟不得一槩薦舉伏乞聖裁七曰重提學以便責成夫提調學校之官乃一方風化所係今之提學所自任者第校文一事而已矣豈凡一切風俗紀綱禮樂教化之務俱非所當身承者乎所謂稱職者亦不過校文不爽考試無私而已矣豈凡勅書臥碑及近年之所申飭者俱非所當究心者乎先朝提學山東薛瑄南畿陳選江西邵寶諸臣率能身先徳化訓迪生儒一省翕然向風當時號稱得人今士不興行化不及民未必皆士之罪也請自今㑹推提學務求文行兼優之士卓然可為師表者不許浮慕文名一槩推用其提學職任除校士一節已備陳前欵至於學政風化凡係于提調職掌者宜遵照前項欵目於校士事畢將提調各官一一考察要見某項曽否舉行某項是否合式有廢墜則與議修復有差違則與之裁正某留意教化雅稱賢能某怠廢職業應該議處各開註賢否俟巡歴一府己週則類送撫按一省己週及陞轉離任則開送吏部朝覲之年則揭送吏部都察院以備考察其餘俱遵照勅書便宜行事以稱風紀之任斯提調各官知所警畏而不視教化為末務矣蓋提學之督課有司者當如此至於教官其文藝雖不必皆賢於弟子若以身範物先矯輕儆惰主持清議彰善癉惡則人皆可勉而能也今宜以所能者求之論其行誼之優劣職業之勤惰舉報之公私才力之長短蓋儒官祿雖薄而其所與者皆天下之英才其胷襟宜富位雖卑而其所膺者乃師模之重任其體貌宜莊若其濡足於有司之門輕身於富民之家逞私忿而謾罵諸生修小嫌而傲忤僚友或放子錢以求息或耽麴糵而忘反斯皆有累大徳不堪型範宜即遵照勅書挐送按察司問革輕者戒飭此所以考驗其徳行者也以職業言之宜専責訓導訓導於本齋諸生耳濡目染其賢否易知也人數不多其提撕易徧也提學官履任之初宜預行各學訓導將本齋諸生除肄習舉業外其限定國朝制書及家禮儀節内各立程限督令諸生一一講習而掌教總率之候案臨下學之日分齋掣籖聽其講貫中間有以勤䝉賞者查係某齋獨多即將本齋訓導一併行賞以惰受罰者查係某齋獨多亦將本齋訓導面加詰問掌印教官則總論分數多寡奬戒如前此所以考驗其勤惰者近年提學凡考校生員行誼者率不由教官舉報則以其徇情好惡而毁譽失真也臣等竊以為欲考教官賢否者正在於此顧獨可因噎而廢食哉今後提學官遇將案臨之日宜先令訓導各開註本齋生員孰為行劣務要指據實跡不得舍糊漫應掌教官再加評覈宻封類送如各官所開與其所訪者或此夷彼跖一可一否以叅問闔學生員必有歸一之論則各官之有無徇情是否毁譽固亦不得而掩也而賢否據此可知矣如於鄉飲酒禮鄉賢名宦及節義旌表之類舉報不公致干物議者亦查其有無他故分别不謹不及與註劣考此所以考驗公私者也至於閭巷小民與儒學教官雖無統理之責亦宜協贊有司分行教化如縣學訓導二人則一任治城之東自某里以至某里一任治城之西自某里以至某里毎月巡行一次其間社學師生則驗其肄業之當否民間鄉約則驗其舉行之得失而與之講説校正此不但職分之當然亦可以觀其才幹之優劣蓋提學之督課教官者當如此夫有司教職俱能分理於下而提督憲臣又能總率於上猶曰學政不舉而教化不行者無是理也伏乞聖裁因災陳言疏伏自祖陵災變諸臣以憂時言事者既章滿公車矣臣何敢復贅惟諸臣言人人殊臣恐勞皇上省覽且未易徹也謹叅衆論撮其大指申以一言惟幸垂察臣仰惟皇上尊祖敬宗盡倫盡制所崇奉則列聖陵寢也所尊親則慈聖太后也所詒謀燕翼則太子諸王也所欲傳萬世者大寶也所欲與堯舜比隆者令名也所欲使薄海内外盡入版圖者土地也所欲隆堂構者三殿也所欲使充牣露積者内帑也宜皆可必得必遂矣顧所與共圖之而共守之者其誰乎則在民心之無失而已矣夫民至眇眇也而不得丘民不可為天子亦至蠢蠢也而不得其心不可以得民故曰有人此有土有土此有財又曰民惟邦本本固邦寜又曰撫我則后虐我則仇由是以觀則君之於民也龍憑雲水載舟不得則不可行也今天下人心何如哉蓋自礦税興而中使徧天下中使出而四方無藉之徒隨以為爪牙耳目者或分布鄉村城市或把持關津渡口或武㫁於商賈凑泊所在乃無不樹黄旗揭聖旨都輿從張氣燄以稱名内監者而内監不能盡知也其吮人之血吸人之髓孤人之子寡人之妻者如䖟集牛如蟻附羶内監亦不能别真偽而使不假借也又非如此而已也前方征後復𣙜既征𣙜復告訐或誣為㫁截皇摃或誣執容隱罪人或以為曽發古塜而得竒珍或以為曽開古窖而致鉅富或云某宅有礦也壞其宅某墓有礦也掘其墓其毒惡如梟獍其吞噬如虎狼在在不聊其生人人莫必其命一林之内而縱數百鷹犬以蒐之不盡其卵鷇不止也一池之中而下十數網罟以漁之不盡其鯤鮞不止也故總計天下之財十分為率皇上之所得十二内監之所得十三羣小之所得十五利乃分於衆手怨總歸於一人民安得不窮而心安得不離也夫君民一體也割股實腹詎能安飽皮之不存毛將安附君門萬里如斯景象何由得知皇上第一覽祖陵松栢為蟲所食若彼濯濯者即可知民間剝削之苦矣夫民心離散所謂土崩其勢必反反則必至於用兵國家當用兵之時而祖陵得無震驚乎聖母得無妨燕喜乎九重得無旰食乎令名得無少虧損乎諸王之分茅錫土者得無憂屏翰乎土宇得無有離析乎三殿落成得無後時乎内帑累年之積得無且發為軍興之用乎欲益而反損何如知止而知足猶可為善守一策也夫燕雀處堂未可為安也臣不能見遠境逆將來惟據臣原籍一隅則大河以南長江以北方數百里之内僅六七月之間已擒獲巨冦數十輩乂安知四海之廣九州之衆無伺釁觀變而起者特相視莫敢先發耳一發則四方響應臣懼其撲滅之難也何也民間苦征𣙜久矣父老子弟之流亡轉徙者衆矣尺籍半虚誰與為兵郡邑之府庫皆空閭閻之囊槖如洗公私俱困孰與為餉地方官自撫按以下知府而上十缺其九孰與為料理之人即有兵有餉而又有人也當衆口嗷嗷之時兵家勝負亦尚有難必者何也昔寜夏之變播州之變彼為冦我除冦也為除其所以害已也故人皆用命師有成功今所虞蠢動者良民也非有意欲反也以逼之朘削也而反以驅之水火也而反則反者之與捕反者固一丘之貉也死狐悲臣恐其反戈而助之矣顧肯捐軀命而盡忠於所厲已者哉臣故曰勝負猶未可知也朝廷之法可行於尊君親上之人不可必行於疾首蹙額之衆曽子曰戒之戒之出乎爾者反乎爾者也即是以觀則一朝之忿發於顔面者易釋積時之怨鍥於心骨者難平也故民心不可失而尤不可久失也今民心之失已久矣故其收之也宜亟蓋天下大物也亦有脚能運之物也人主鎮之以静而馭得其道也則長為我有東西南北皆吾外府四海九州難致之物皆吾享用苟失其馭雖漢桓靈之西邸唐徳宗之瓊林大盈於我何有哉臣稽覽載籍則自漢以後元以前失馭之君何可勝數也有衆叛而孤立於上者有宗祧不守而倉卒出奔者有䝉塵於荆棘霜露而不得息踵者有三軍擁衆不行而出語怨懟者有日中嘗膳不供而野人獻麥飯豆粥者有皇子皇孫手掬粗糲而一霎已盡者有分天下為江南江北者有身陷敵庭窘辱備至者諸如此類俱堪令人扼腕當彼其時豈財不足用哉惟其失人心至此也皇上覽前史鑒往事幡然改圖鎮之以静必不肯以天下大物易阿堵無用之物也方今税監中亦自有亷静不擾者臣安敢盡誣以無人惟礦税不止必䑛糠及米且至於盡民何以蘇故必須停礦税盡撤還中使乃可臣昔備員講帷曽進講外本内末争民施奪與發財發身之義悖入悖出之理而皇上未嘗不虚已以聽也今豈遽忘之耶人皆知一飽一煖外為長物皆知多積財於子孫為貽害皆知泉貨流行無居而不散之理豈聰明睿智之神聖乃見不及此耶始臣應詔北來年七十有二矣所不憚風中之燭不恤止足之戒與間關跋渉之苦者惟眼見礦税害人欲為百姓請命耳豈猶有富貴之心哉乃今書笏待命者兩朞矣猶未窺青蒲一膝之地有納約自牖之益徒日見天災民怨紛紜滿眼中夜攬衣徬徨歩屋如芒刺在背時顔頸發赤拊膺自語此來謂何危而不持焉用彼相臣老矣又宻勿近臣也何忍以煩言憂君父惟興衰理亂近在眉睫有不得不垂涕泣而道者實出於無可奈何也惟聖明垂察焉亦玉堂稿卷三
