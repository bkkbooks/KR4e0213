body:
  text: 亦玉堂稿卷六明沈鯉撰明宗録序聖學無宗有宗其學聖者乎尼父之生好古敏求而已後世異端與吾儒角始有辨而吾儒又與吾儒角亦復有辨夫辨以明自得可也辨而標一勝以冀天下之從已或不能也夫一技之士精悟之極亦有𤣥解故解牛可以得養生舞劒可以得筆法然得之者無來徑傳之者無定門其有神焉與假令羣養生學書之士而詔之曰爾必解牛如我舞劒如我鮮不瞀矣君子之學亦惟是凝一不二體驗不遺身心融而事幾合於是隨所參證皆可以見道皆可以覺人所貴善學者契之於言前而勿為株守耳試觀近代名儒學成而鳴其所得曰敬曰靜曰良知指不襲前人而功皆光洙泗乃知非好為異也聖道猶海然江淮河漢同歸而不必同派也頃豫讀匡嶽徐公明宗録而有感焉公師事李見羅氏奉修身為本之訓亹亹不倦夫人參三才止有此身修身之外復有何事公所謂修身者蓋修之而後言者也非言之而後修者也其於明親至善之理終身以之有獨得而默成者故録之大指若曰吾以此宗聖而有得亦猶昔人之得於敬靜良知者也夫江淮河漢亦既朝宗矣若不窺其流而不息之神但以疆域町畦為向背不幾為海若所笑乎故聖學無不可入也惟視其造詣不視其言說有欲明徐公所宗者亦務得公之所自得而已矣此精悟之極亦或敏求遺意也沈氏家訓序前代勸學詩文如富家不用買良田書中自有千鍾粟安居不用架高堂書中自有黃金屋諸語皆出自明主御製流傳至久比户吟哦信如蓍龜凡父兄之教其子弟師友之相為勸勉者率不外是以故後學小生當其䝉養未雕未琢已先以富貴利逹榮身飽家之計薰漬其心胸肺腑由斯以往何所不至吾固知吾家子弟亦必有受其鴆毒者已今欲前此痼疾亦不必為一切高論惟以士君子立身大間關係緊切者反而考之各著為訓語一篇以示為君臣子弟之鵠其所稱述亦不必則古昔稱先王談耳目所不及聞睹之事使後生小子無徴不信惟舉吾祖父以來日用常行可為家範者每篇之中各舉數事其無者不求備焉於乎凡人之情語之以他人之善行則有聽有不聽語吾祖則聽之及吾父則傾耳而聽之蓋其情愈切故其言尤易入也况吾之身祖父之身也身不修則祖父辱自古明王哲后所稱引修身之要無不以法祖為急豈士庶之家有異乎吾兹庭訓不敢舍祖父而言他亦不敢為飾說以誣吾祖父惟求吾子弟之可信而已訓語凡七篇一曰嚴二曰孝三曰弟四曰睦五曰義六曰亷七曰慈其猶有不盡者引而伸之觸類而長之可也應天府鄉試録序萬歷十年秋八月應天府復當鄉試士士遴於提學御史臣某暨諸曹六館者總四千五百有竒而府尹臣某府丞臣某職在提調先期以請上命贊善臣某修撰臣某往持衡蒞之臣某惟留都為國家豐鎬建首善其人士嫺於文文所好尚而四方操觚之士影慕響臻體為一變蓋天下所視為前茅也臣且為天下樹之抑何敢不辨乃今之為文者則辨之難矣當嘉靖末季文尚繁縟繁縟之不為先進易省也今之文簡簡固所以從先進也而乃託之乎竒詭空幻者以飾其所不能蓋襲先進之似也而非其真也夫淄澠合而雅鄭之音雜陳之一簴夫豈不難辨哉兹臣之所為兢兢也臣拜命入闈與臣某集諸同事者歃血而盟務力汰文之似以求其真者而御史臣某亦肅將乃役防檢闑內外惟謹既三試遵制拔百三十有五人次第其名里與其文以獻臣某竊自幸文體可由兹一變庶幾有先進之遺乎真也而非其似乎乃臣所望於諸士者不惟文體之變而止也蓋天下之習而為似也詎惟文即人亦有之何者人道正正焉爾矣悃悃欵欵焉爾矣今之人固有謂蕩蕩平平為不足見長取譽而鏗鍧震耀以炫人耳目者乃其中實不然非嚮之為文而竒詭者乎抑又有畫綵為舟不可以濟苴土為轅不可以駕者非嚮之為文而空幻者乎習此於文而文稱先進習此於人而人稱賢人君子也皆假似以亂真者也臣故曰天下之習而為似者不獨文即人亦有之也夫文之難辨不若人難辨之甚也不正人之為害不若似人者之甚也何也射干烏喙足以惎人人遇而投之耳鈎吻黃精質雅相肖一為所誤則其害不可勝言矣故孔子惡似是而非其品士即小人硜硜猶取也而忠信亷潔有其似之者則謂為賊德焉而不列於士何外之深也他日曰君子貴玉賤珉也非多寡之謂也謂玉真而珉似也臣為是懼故欲諸士之為賢人君子也為其真無為其似也夫所謂真者非必盡瑚璉為快也譬之器為玉為石石非玉也而可砥可錯未為無益惟不為珉而似玉也即玉也而世不我以寧被褐懷之以待有用無艷彼珉而玉者之嘗有幸也而為彼珉而似玉也珉而似玉者曾不可為砥錯而詎能亂玉乎淄澠合不能欺易牙雅俗陳不能混師曠鈎吻黃精雖相肖世豈無俞扁之鑒哉故臣願諸士為其真毋為其似也今諸士之於文不珉矣異日以其人為國家用能銷其竒詭空幻者而正正而悃悃欵欵而力去其似以求真也其所樹前茅於天下者獨文焉爾哉送張滸東歸省序張公宰高平治行稱當時第一已徴拜給諌歷奉常典納言之司諸所表樹炳炳麟麟載人睹聽矣一夕以瞻雲動念歔欷而嘆曰嗟乎自辭吾母大人宦京師也心未嘗不時時在側徒以上恩未有報故忍而逮今也今殫不肖之力既六年於兹庶幾少有稱塞而倚門懷我者獨忍不一慰乎於是即日上書乞歸覲詞甚懇天子嘉其意許之行之日士大夫之為公里人者相率觴之都門之外沈子言曰嘻華哉公此行人子之辭親而遊也親望其來猶望能所事而來暨其歸也為親者悅而又能所事則大悅人情大抵皆然也故夫以賈遊者挾資而歸而其親悅矣以儒遊者挾術而歸而其親悅矣仕者辭親而起家齎躬而事主其所為事與親之所望其子者固冝何如也公今入里門拜太夫人堂下夫人宜有問而公且前對曰始兒為給諫遇國有大事輒以言言嘗批逆鱗忤貴近弗恤也而他所歷官亦勉自夙夜以無貽母大人之辱於時太夫人聞必大喜且為公進一觴如良賈之出其所藏學士之談其所得即其母未有不灑然快之也公所謂榮親之躬不以組繡腴親之口不以珍旨者非耶豫稽覽往籍綜古人出處之概大都急進取者不遑內顧而愛日誠微戀子舍者薄視勛名而國罔攸賴君子所為嘆完德之難也公之報主也如彼而其為親也若此蓋一行而二物具矣豫是以華公之行也雖然詩送山甫曰式遄其歸吾又知公不能忘君也夫田都諌疏草序往余備員史局預修國史檢諸司章奏而知有貴竹田公云公當肅皇帝朝給事掖垣所條上國家便利連篇纍牘不可勝紀今感時事怛焉傷心則憶公曽諌言開礦非便言諸路鎮守中官宜罷歸各監局供乃常役俱見采納夫自肅皇帝至今歷三朝且七十餘年公所陳前二事垂休於蒼生社稷者人能忘所自耶乃今榷采之使交騖於道而閭閻雞犬不寧公言益令人思矣夫言有出口可聽而奉以奔走則迂當事能補隙苴漏事過為已陳芻狗者其言非訏謨至計也公隨事納忠如俞扁發藥應手輒起歷事滋久而所遺方書猶得循襲而用之而無有不售亦庶乎立言不朽已始公釋褐真定理以平允著稱及徴拜諌垣適肅皇帝建南北郊議徙置民冡數百叢斥郊堧餘壤公諫言不可月令聞掩骼薶胔不聞夷人之丘壟事乃罷余往讀公疏至此而知公仁心為質閔然起白骨而肉之也公立言有本哉有本哉頃者公曾孫珍之司理吾郡亦大有真定聲輯公諫垣草二卷屬余為序猶恨其有散逸者余曰公三疏侈矣又何求多之與有贈黑丹渠判山東鹽運序黑君之先以武起家而世官於鄧至君用儒顯君少為諸生有竒負顧數舉弗第已乃遊太學除上林署丞徙光祿所至以幹濟稱當途者器之擢判山東鹽運事鄉之士大夫圖所為贈君者而授簡於豫豫聞管子相齊謹正鹽策齊以富强君所履非其地耶今煮海猶故何以國不益冨竊嘗求之蓋今之通商馭吏非國初法已國初中鹽之商歲惟輸粟芻塞下亦至微鮮耳其時國不輸挽而糗糒有餘商之利即吾利也後人見不出此以為商專國利遂攘臂而侵之額增未已更以納鍰夫是以塞下不屯國疲於餉士始有脫巾待哺者蓋商既告困而國家亦由兹多事矣此與割股實腹者何異耶故曰今之通商之法非法也國初置都轉運鹽使司貴之金紫秩亞上大夫隆顯矣即其下倅二亦各專印綬假之事權詎非以職屬劇要任之特重乎後之迂濶不逹者至比之桑孔之𣙜算諱言之而持衡於上者亦視為樗散詘其遷次以故仕宦至此者即紆金拖紫猶惘惘有不樂之色此何以鼓舞人心而使之盡力也故曰今之馭吏之法非法也夫國有鹽利猶富人之有良田也商猶農也主𣙜之吏家督是也農之弗恤斯田有汙萊矣家督弗任斯農有惰體矣比其不熟始四出稱貸而營營求足食之策亦何貴有良田哉今之通商馭吏之法久而不更其流弊固將至此也君往矣意亦循管子之迹禀國初之令試以豫區區之見謀之其長以為何如如可聞之當事稍一變通豫斯說也不直告君爾矣沈氏家譜序歸德沈氏出自蘇州府崑山縣一保鄉元之末季有諱道興者世居縣城北七里許王燒橋迤北石將軍廟邉配蔣氏生子曰福一福二明興洪武四年大臣有平章潘氏者括取僞吳張士誠麾下舊軍蔓及道興而道興老矣不能行役以次則福一當行福二奮然曰弟子當服其勞吾父既不可以行吾代吾兄行矣乃留其子銘侍父於家獨挈配王氏與其壻范貴渡江而北次揚州興化縣調河南祥符再調歸德衛左所占屯城東南一十五里曰邵家口者闢草萊而居焉時洪武二十二年也先是王氏在祥符以疾卒已葬城東北陳橋之側尋嚙於水不知其塜之所在繼李氏生女一福二年亦漸老不任行役其子銘自崑山來代以洪武三十四年閏三月初十日與靖難之師戰於真定之藁城死焉實建文即位二年也配洪氏其孤子祥是時甫十七即補充行伍至永樂八年十二年二十二年扈文皇帝北征俱隨其主帥渡沙漠犂庭而還配姚氏祥符人生子三曰忠曰英曰傑自是乃分為三派生子十一人一無後其十派相傳者共三十一人而三十一人者四無後其二十七派相傳者共六十一人距始祖福二為七世七世以後源源方來未可數計也而支𣲖固已繁衍矣至其以科名貴顯者則自五世之祖瀚潮始瀚中成化甲辰進士歷任福建建寧府知府潮中成化丙午舉人沈氏始大又二十餘年而建寧公長子桐由太學生任順天府東安縣主薄仲子柚從子棋俱為名諸生正德中建寧公歿潮試南宫卒門户蓋稍稍衰焉逮嘉靖乙丑鯉中進士選庶吉士歷官禮部尚書兼翰林院學士加太子少保照除山西絳縣知縣烈除鴻臚寺署正鱗除鴻臚寺署丞其他以恩例授冠帶與衣冠而儒者又復數十人人以為沈氏中興矣始沈氏徙歸德其屯所不能盡居也正統後有置産於郡城東南七十里曰界溝集者為一聚已又有居城北四十里曰冉站集者為一聚蓋併其屯所而三焉而惟建寧公之子孫則世居城市嗟乎世教既衰骨肉之相殘不少也夫豈其未嘗反觀乎且以吾族論則今之六十一人者其初固三十一人也又其初十一人也又其初三人也又其初一人之身也何前此而骨肉後此而遽為秦越也夫子與孫吾所甚昵也乃其身與吾猶二也其痛癢吾不之覺也其愈適吾亦不覺也其親而昵之若彼者惟知為吾之一氣與吾祖宗一脈也族雖疏其為吾一氣與吾祖宗一脈吾豈遽忘之乎明於近而忽於逺覩其始而不見其終亦何其不廣也夫自吾祖來徙歸德里不過一㕓田不逾百􅒪延及六世猶多艱食吾猶及耳目之其在於今則有連阡陌而田比闤闠以居者此誰之貽也而可忘之乎語有云日中則昃極盛難繼惟德與義可以長久昔吾二世祖死王事四世祖禮部主事公以隱德望當時以孝行䝉旌表而建寧公居官亷為子孝奕世載德不忝前人事各具本傳至語內行則二世祖元配洪氏世父柚元配張氏俱丁年守節以至白首而兄光冡婦王氏以身徇夫年甫二十也亦先後表宅里此非其德義之可為型範而福祚之所由長久乎詩云無念爾祖聿修厥德永言配命自求多福由斯以談吾子姓所篤念不忘者有在矣凡預斯譜牒者幸相與懋勉之曾中丞奏議序臨汝曾公以中丞節鉞來撫吾豫三載於兹諸所嘗規畫便利草奏驛聞者積若干卷存之掌記觀察袁公慮其久而散逸或欲考鏡已事無由也乃謀諸梓人且屬余序余聞揚子云言浮物也豈其然乎夫不有宰之以實者為真意而蹈之以實者為真境乎言蘄有用不屑屑副墨子為政也安可槩浮物視之也中丞出鎮千里仔肩巨重即豫與諸藩固無異也若以論腹心要壤三輔屏翰內拱護神京外管樞天下者則無如豫為最其衆建親藩天潢浩衍與冠蓋之使相望於道而供億日不暇給者豫為最其民俗鮮蓋藏競奢靡歲一不登當事者蒿目而憂之而無可以潤鮒轍者豫為最其人情輕煽易動如異時脫巾於陳弄兵於柘者豫為最其以榷採之役妄意中州樂土烏合無賴子弟假神叢以魚肉我民者豫為最其政體雖自有常式乎抑簡書倚任非一幅員錯乎諸路五方之遊民雜處焉猶復有宜糾宜紓宜巨宜細宜因宜革而紛乎不可窮詰者豫為最由斯以談則撫豫視諸藩尤重已嗟夫以如斯重任而一旦籲九閽為封內請命第憑此盈尺之牘夫豈不兢兢難事哉豈其若文人墨士變化筆端徒以腴人口吻者而可容浮議戔戔也公惟以淵塞之衷運之規畫而當其草奏驛聞不啻乎憂疾切膚俯青蒲而九頓乞哀焉故其言如庖丁解牛羿命中也其煦煦如化日之長也其廣博周遍如淵涵藪納無不有也其感人如陽燧於日方諸於月精通而幽阻弗隔也蓋公之真意真境也夫宇內敷奏之言何限然不皆逹民隱回天聽不鑿鑿可行不斤斤有措置不𢎞濟艱難不傳逺不能使讀吾言者見吾之心而吾言可當於人心者豈繄不文繄鮮實也夫田夫笠叟聚壟畝而話桑麻談歲時雨晹風角占候即學士靡不解頥太𤣥凖易河汾擬洙泗人終不與豈顧出彼下哉真與似之殊耳知此則知公之言矣贈中丞吳公擢南刑部侍郎序天下事亦甚難言矣先事則逆覩之難當機則立斷之難時適其變而從容暇豫則又難故惟有高世之識者而後可覩釁於方萌有濟變之略者而後可决策於倉卒兹兩者靡得而兼也以余所見則吳公韞菴其人焉公以中丞之節來撫吾豫兩歲於兹其諸樹表儀定經制振紀綱厚風俗節浮冗平獄訟詰戎兵旌别亷墨種種德意載人耳目者余不能窮以辭諸所為仁漸義摩舉大河南北百二十城邑之人民而厝之袵席以游於春臺之上者余不能摹其狀惟頃定軍變一事則亦可覩公之槩而知其才與識堪天下大受也其始陳軍吏不能以恩信撫士士脫巾鼓譟者數百人勢固已炎炎矣公一聞變不知其何以運籌乃不踰旬日已逮其渠魁與其激變者朘削者咸次第伏法而其餘黨鳥獸散其事遂平夫數百人亦衆也自陳距㑹城非邇也稱亂者之形狀公未嘗身親見之也而不動聲色以遏其方張之勢於指顧之間使不至燎原不可嚮邇一何其從容暇豫而朗斷若此也余知公才與識兼過人逺矣國家自嘉靖以來士脫巾鼓譟凡數四其始則大同有變白下有變已又有浙鄖之變與安慶遵化之變彼其初亦僅僅萌蘗耳惟睹之不早而處之不能當其機乃卒至老師殫費暴骨原野始平其難其甚者則外假招撫之名而內實隂中其所挾以苟幸目前無事而卒至傷威損重使荷戈守壘之戍頓蔑視朝廷之紀法而至今猶踵為厲階相尋不已識者太息焉公此舉蓋以張天子之威靈於天下以隂讋驕卒悍兵之氣而永遏不靖之萌為國家久逺計甚盛何止戡禍亂於一方為德及大河南北也頃之天子知公名則以擢留都司冦二余竊窺廟堂意豈不以留都為根本重地而掌邦禁明紀法寢暴銷萌奠舊京而鼎吕之者惟公堪大受耶語云觀故步識前路公由斯以往所著績旗常者余安可預知然已事可徴矣故知公堪大受無疑也豫藩臬閫司諸大夫將為公祖道贈而請言於余余不嫺於詞又安能道公之詳乎惟頃寧夏有軍變其始與陳事適相類余因是感焉為具述所嘗戡亂者如此蓋聊舉目前一事也其他則自有輿人之誦焉亦玉堂稿卷六
