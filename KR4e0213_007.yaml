body:
  text: 亦玉堂稿卷七明沈鯉撰歸德府學記歸德舊為州有州學自升州為府遂稱府學太守鄒公來典吾郡乃更飾而新之而俾記之以詔學者郡故宋地史稱其俗近古多溫中篤厚君子而世又傳宋人之愚如所謂守株以待之類相與笑之雖不盡然然侗願不雕之意或相類則謂之愚也亦冝逮今之人好智而矜能恥於為愚而去古益逺惟宋俗不失愚之意故乃近古則學者豈必破愚之為貴哉亦惟不失其愚之意而已矣仲尼稱民之疾曰古之愚直今之愚詐詐者舞智者之所為也何愚稱焉惟直而其愚不鑿學乃可加故及門之徒三千身通六藝者七十豈少聰明才辨之士而獨稱好學者乃如愚之回回沒而傳一貫者惟參之魯列國大夫僑札晏嬰文武臧仲之倫詎不翩翩博物多能而獨稱寧武子之愚不可及則何也愚以學道則篤信愚以謀國則勿欺篤信不欺誠之道也誠自生明明自能覺豈待逆億哉先王設教三物五典離經辨志敬業樂羣不令見異物而遷固惟求不失赤子之心焉耳赤子之心純白完具猶然愚也世乃嗤愚而笑之不知去愚愈逺而俗以不古學愈以不真矣試以往事徴梁園賔客如雲鄒枚諸人文采爛然非不驚愚誇才而無益於實用千載之下與荒臺廢址而俱盡而考文獻之所尊崇不忘者惟微子之齊聖張許之忠節杜衍之相業迄今不磨夫行遁抗節封還內降皆智巧者之所深避而不為而不朽與天壤並則奈何輕去其愚也豫郡人也述郡事志郡俗不敢不以此意與諸君子共勉之以無負太守之盛舉夫學宫敝患其不新故必革故而鼎新學術壞不患其不新而患其喜新故必反新而還舊宋俗舊以愚聞天下矣宋之學者倘不染晚近智巧之習以葆其愚而從事於學庶幾可尋孔門顔曾四勿三省之脈而聞道不騖於支離行誼不薰於功利居則表俗出則匡時擔荷非常肩仔鴻巨實有賴焉諸士獨不聞乎黃帝遺珠赤水使智索之不得而象罔乃得之愚公欲移山至令子若孫世世不忘遂使山靈為之自移通象罔之旨何精微之不徹不在聰明用事也合愚公之力雖鬼神可以動何必巧慧收效也如必不安於愚而逐世之智巧以為新則固陋之説若捧土而障江河得毋賈天下之笑謂真宋之愚人也哉新設商丘縣學記嘉靖乙已歸德既升州為府於是設商丘為首邑而未遑建學也萬歷癸酉中丞朱公直指禇公採學使周楊二公議請設商丘縣儒學制曰可後學使衷公來始布功令置學官弟子明年郡守鄭公邑侯何公築於郡之乾定址矣已賴公繼鄭公為守以乙亥八月工竣為文廟五楹堂三楹别為文昌閣三楹廊廡廨舍皆具後五歲庚辰鄒公繼賴公守郡雅興文治加意毖飭而其僚别駕周公殷公司理陳公及邑呂侯始落成焉故兹學也蓋閲歷多人而其勞均不可無紀於是學博張君許君乃徴余言記之余觀國家久道成化所在廣勵學宫師儒弟子俎豆規條雍容都雅即如我庠創始經營設官備物羣多士而教且養之豈不謂文教翔洽視昔屯蒙之風氣日益開而儲材之途日以閎乎養士不以多寡為盈詘而惟實得其人為足重得人不以科名官閥為軒輊而以實有益於天下國家為足稱昔者平原君嘗慕養士之名而門下客三千人比於諸公子矣及使楚而可與俱者止十九人則十九人之外三千人皆可無養者也毛遂自言處囊中卒以定從而十九人且碌碌無所短長則一遂之外十九人皆可無養者也士之所以為盈為詘豈以人數之多寡較論乎上之重士與士之可為重亦豈在多寡乎何世不深核於名實徒見夫科第比肩膴仕接踵則僉云人才人才而多之不知科第膴仕賢者附之以成其賢不肖者乘之以恣其不肖庸人得之終不失其為庸人則養士羅才之意正在彼而不在此故曰志於道德者功名不足動其心志於功名者富貴不足動其心夫安社稷濟艱難斯之為功名而不澤於道德猶為有道所薄况區區之科第膴仕苟為富貴者耶嘗聞父老言成𢎞時民間子弟不樂為諸生學使者至有司趣其能通章句者被之儒衣冠其時能為文以中甲乙之科者絶少也然而居善俗出適用在鄉鄉重在國國重固不乏人我不敢以為詘也其後人文日勝占畢吾伊之聲遍國中青襟濟濟登賢書第南宫者纍纍輩出然居善俗出適用未必人人皆然而或有羞當世而笑士林者我安敢遂謂盈也然則士品固有在矣淡泊寧靜不染於世氛即布素可稱也而又濟之以旗常之伐鼎鉉之榮得一士且侈為名世而况其多也苟其佻巧浮薄徒志於榮利而鮮克有終即九遷五等不足數也况其鬬捷於蠻觸快意於蕣華者藉令項背相望祇見謂秦無人耳何足多也諸士其相與講於聖賢道德之學而一洗夫後世媒青紫之陋習處則為圭璋出則為霖雨使士不虛養而聖世實收得士之效庶有以酬諸大夫今日之勞哉歸德義學記歸德為俗故稱長厚矣頃歲以來齊民鮮蓋藏幼學子弟則多以貧故廢業者而飭躬力行之夫亦或坐窮困以不卒所志俗乃視古稍間焉為郡長者固宜有補苴勸相之法以助流理化而豫所睹記殊未數數然也屬者滇南邵公來守吾郡其論治尚體要而後聲華緩法比而右文教其他所作人者無具論乃其修社約敷帝訓絃歌澤頖旌别窳良一時人士既喁喁向風矣乃復慨然嘆曰夫治人猶治兵也欲兵之揚在其氣作而鼓舞不可不先欲人興行在感其心而體恤不可不至吾既以興學為事而民有以貧廢不能自植立者吾弗知是猶欲強兵而枵其腹也於是郡西北陬起義學一區待子弟之不能自業於學者置義田千二百畝佐學者費而學之左豎義倉九楹貯郡人以穀來助者而懸之常格以待之工既告成乃問言於沈子沈子曰吁嗟古道哉足以風矣夫人情衆用耳則飾聲衆用目則飾色自上之人貴耳目以輊軒吏治而世之為吏者始務以才相高往往於米鹽毛瑣簿書期會之間炫赫赫名獵大爵位焉以去至語及教化則視為迂濶咸掩耳不願聞也乃公獨雅意文教補苴勸相若此非所謂行古之道耶昔大將投醪於河師衆飲之如醉楚子巡師不忍其寒也撫之三軍如挾纊此兩者豈人人遍之哉義氣之所為感也公之斯舉無論衣食公賜者得恃以卒業不為廢即其他衆有不醉心挾纊以復古長厚之俗乎語曰人之從好也捷於令自是以資雄里中者詎無從所好而甚焉者乎又詎知聖天子不最公之理以風示當世以為今守令者樹赤幟乎審爾則公所錫豫在一方而道且沛宇內有餘也故曰足以風也亦玉堂記俗蓋稱翰林公署為玉堂云雖沿襲前代故事實謂其職主文翰不事事其堂宇清閟如玉也豫往曾歷官此署二十餘年率纍月一至至亦不公座判署惟從容與二三寮友登瀛洲亭流連光景語笑移日䇿馬而歸耳以豫多病簡懶不諳世故非幸而竊吹於此足容吾拙殆也久矣敢望其他乎每念及此未嘗不含戴上德稱榮遘也然文翰非豫所長故身之所居而心恆惴惴焉懼其以伐檀之議疵瑕吾為玉堂之辱也意不能自得焉戊子九月豫解官歸里筮地一㕓於城乾極僻之處明年二月構屋三楹翼以兩側側各室二楹凡閲月告成事則中列琴書外蒔花竹亦稍於田耎垣隙地藝瓜蓏果蔬及禾麻菽麥各一二畦以隔别城市其晨一糞除夕一灌溉必躬親之用以代熊經鳥伸以為常而豫以多病支離感於老氏有被褐懷玉之説不但不語及世事抑悄焉無車轍至門履聲及户非副墨之子洛誦之孫無得有升吾之堂入吾室者蓋往時二三寮友從容語笑以今視之猶覺煩矣莊生云子有大樹患其無用何不樹之無何有之鄉廣漠之野逍遙其下豫所選豈即其處耶嘗於花晨月夕取淵明歸去來辭及仲統樂志論朗吟一晌以佐浮白而鄉者文翰之事無所關心牖下一榻隨意偃仰人莫豫識夢時忽覺猶疑此身蘧蘧然在瀛洲之亭不知其為吾蝸角也豈亦有自得者乎抑非上使我至此耶昔人有對揚君賜者每託之居處器用以識不忘豫既嘗承乏玉署含戴上德今卜築小隱一時情景猶頗相類蓋雖已不在其位而其為清閟如玉者則上已賜我於家矣吾詎可忘乎乃竊倣昔人之意而大書顔於其霤曰亦玉堂用紀吾今兹所遭遘亦不異往昔若此嗚呼玉堂之為玉昭昭也惟人可疵瑕亦可進退則逆旅之舍也吾安得終有之亦玉堂之為玉似之也而非其真也乃敝帚自享不忮不求可終老焉由斯以談則天池非廣榆枋匪陋意所逍遙即為吾廬顧在人自處何如耳夫真似亦何常之有哉存蠧齋記歲辛卯余居室西偏構齋三楹儲古今書籍可數千卷縣額其上曰存蠧云存蠧者何余有書不能讀而蠧乘之以為食邑余弗驅也故以為名嗟乎始豫壯齡力能強記而家故赤貧自舉業章句外則終日兀然面壁耳烏知宇內有書可讀哉及後叨一官薄遊都下有常祿之入得稍購四方之篇籍廣其睫眥乃復以職事縈繫役役奔走雖有書不暇讀今幸解組歸遊神藝圃得肆力學問而髮已種種雙眸已眊轉盼忽忘雖有暇不能讀吾居然書肆一賈也可勝嘆哉今年夏積雨彌旬卷帙之上苔䀶四溢比晴則命兩童子出而曝庭階之下羣蠧縱橫腹皆果然而還視吾腹乃􅑎然也捧而一笑顧見童子之色怒若於蠧有憾者且搜而殲之豫亟止之曰何為其然物成毁有時吾有書不能讀而蠧乘其隙為我一飽吾實使然蠧則何罪假令蠧不蝕而余終束之庋閣以待一再傳之後即不有魚蠧得無有人蠧乎盈虛消長往復有數雖強且智靡得而逃焉故積之太盛者未有不散失者也君子於此有所好不得不求求之得不必皆備苟備矣不必堅執為已有而珍惜之太甚蓋昔右文之主嘗遣輶軒之使分道四出購山藪遺書藏之於金匱石室天祿文昌之署與奎壁並爛今存者幾乎而惜吾一室之儲乎所惜吾有書不能讀蠧雖飽不知味則此書之不遇均也斷簡殘編或有待後人乎亦余所不敢必也莊生云火傳也不知其盡也此言夫六經常道不待儲而自足者也何蠧之虞其非是者蠧與不蠧任之而已殲之何為童子聞余言為斂書還故處而蠧逸者半仍竄處帙中者亦幸俱無恙焉嗚呼人世之積而無用而終不免於人蠧者又何止是編也敦倫書院記士養於學足矣復羣之書院者何曰書院之設所以佐學之所不及也先王之教家有孰黨有庠鄉有序國有學知仁聖義中和之有其德孝友睦姻任恤之有其行而禮樂射御書數之有其藝九年而視其成四十而試之仕流於既溢之餘而發於持滿之末故自公卿大夫下逹牛羊倉廩賤官之選悉中於用當其時上無廢教下無廢學一道同風其效如此周室既衰教化凌替道德禮樂經術之寄不在庠序而在山澤孔子大聖人也不得君師之位而設科洙泗之濵蓋章縫之士從者三千焉自是以來士之抱其器而不得用私相教授於黨閭之間者往往不出户庭而自成黌序後世書院之意其權輿於此乎秦漢以來無可考見宋世理學大明而嵩嶽嶽麓睢陽白鹿四處最為顯著生徒多者至數百人我朝憲章列代治教休明自兩都郡邑逹之蠻陬海徼莫不有學士漸被而興起者彬彬乎羽儀王路宿稱盛矣然而道德禮樂經術之寄其在焉否也先生之所以為教與弟子之所以為學者不過占畢帖括之間屬題比類纂摘攛竊口吻刓於蠧簡之記誦而思慮敝於遊詞之剽綴於是豪傑之士往往病之而相與禔躬繕性時發明其業以教術黨之士講學書院所在有之乃其敝也裒衣博帶百十為羣娓娓談清虛其實孳孳營利欲而又何學之與有萬歷初當事者發憤建議條禁撤毁誠有激乎其言之矣雖然有以涉敗者而廢天下之舟有以噎病者而廢天下之食乎二百年來名公巨儒勃窣理窟成德逹材皆於是出懲末流之弊而併去其成法非通論也今宸居久於在宥崇儒重學嚮來禁毁之議盡格不用而所在有司乃敢復有修葺廢墜者而吾歸德亦始得以復其舊貫云按志書院故在府城西北宋初錫名應天有敕賜碑在舊城內金元為歸德府學本朝因之𢎞治中圯於水於是遷學於府治東而書院中廢自世宗以迄於今蓋圮而修修而復圮矣嚮之為齊為堂為廊為閣為號房為垣為門為坊業已鞠為茂草而蕩為瓦礫矣今悉還其舊觀而閎敞倍焉題曰敦倫書院夫今兩都郡邑之學皆曰明倫而書院易之以敦何與曰明之為言知也敦之為言行也知行相須如車二輪如鳥二翼不行不足以為知也今觀皇祖大誥三篇教民榜文諄諄於五常之訓而他日詔師儒曰正心實學曰崇德重義曰檢身飭行意可知也士不深惟立教之本而卑之入乎口耳高之淪於玄虛畫脂鏤冰落其華而實者鮮矣奚其明兹曰敦倫者正所謂皇極之敷言是訓是行也吾黨之士尚各藏焉修焉大者明君臣敦父子序兄弟經夫婦麗澤於朋友而增修其德而後博學以貫之多方以辨之修文辭以發之亦可以為成人矣不佞雖備員三事而自揣忠不足以結主澤不足以答民形神夢寐皆山中人也古之君子進不能使其君安富尊榮退猶可以使其子弟孝弟忠信是用述今昔斆學之本與諸士共觀鑑焉四鳩巢記豫成亦玉堂之再月旋於其東偏隙地小構一室以為燕寢又閲月告成事方自他所徙居適有鳩一偶亦遂來巢豫異焉謂卜居之初有此物兆吉乎否與不可不詳論之也蓋聞詩鵲巢之説曰鳩性拙顧又云居鵲之成巢何也夫天下無兩而立者也巧則巧拙則拙觀人於清濁之間君子皆不能無疑也鵲雖巧豈能不拮據而成巢而鳩獨口不瘏手不瘃一旦乘所有以居蓋鵲反不如者猶可謂拙乎鳩乎鳩乎豈其拙名而巧實陽外而隂內者乎物如斯吾不欲覯也豈兆之佳者乃亟命涓人驅除之而鳩繞其巢飛且鳴如泣如訴若將止豫者豫感而益異焉而為鳩原之則終亦拙者而已矣蓋大厦成而燕雀相慶此物之巧者也色斯舉矣翔而後集此物之知者也比吾之闤闠為大厦何限鳩不知巢焉而巢於吾室其卵翼可俯而窺也顧非拙而何豫賦性顓蒙不善涉世世之君子方將有討豫之拙而欲覆其巢者既徴諸色矣而鳩顧適吾以居乎是遊於羿之彀中耳知巧者豈如是由斯以談則鳩非拙名而巧實陽外而隂內無惑也兆亦何不佳之有乃更命涓人謹護之而鳩巢始定自是豫讀書其聲吾吾鳩呼雨其鳴呱呱如唱如和如戀如慕與吾有甚相狎者豫不但無疑於鳩且轉自疑也嚮所以來鳩之巢者何耶世嘗言海翁忘機鷗鳥不飛鳩豈為是耶抑睹豫之貌一鳩也而不能辨與或吾室拙且陋遂以為鳩之巢而附居之與抑聲氣有相感者與皆豫所不能知也苐嘗聞善為道者巧欲日損拙欲日益其損其益在所與處矣今以鳩之拙巢於吾室是鳩益一拙也以吾之室有鳩之巢是吾益一拙也鳩乎我乎我乎鳩乎其俱有益之象者乎豫欲賡鵲巢為詩困而未能少頃假寐夢二羽士褐衣斑文儀觀整暇揖豫而前曰幸託君之宇以庇豫翰又借君之譽以白豫心豫既拜君之明賜敢不卒復以所聞詩云靡不有初鮮克有終豫雖拙無似然猶有血氣心知焉君往昔蓋不能無疑今竊見主君之杖有刻豫形者有貌無心比之木雞其德全矣君倘亦有意乎今而後彼扶爾行豫伴爾居相守一拙永不畔去其庶君三益乎豫與若蓋得君而四矣幸主君盟之夢語未畢蘧然而寤開户視之閴其無人顧惟見二鳩之栖吾簷也於是扁吾室為四鳩巢云放鶴記豫性好清尤好觀物其在羽族則形質最清者宜莫如鶴矣豫極心愛之得一偶置吾醉竹之軒豫少有不快則扶杖往觀之飲且食有不甘則對之食飲客詣豫豫不能欵客則指鶴謂曰盍為若羽士留客無不大飲至醉者豫以是愛彌篤焉時遍贊於客曰美哉皓皓乎其衣縞其裳玄其幹頎而頂朱裒然一竹林隱者也吾與若其相共死生矣頃之見一蜣蜋推糞丸轉輪而行逐逐不休豫惡其穢也欲斃之而不忍姑縱而舍之而馴吾鶴一日豫有逺行童子飼鶴者不戒其常餉致鶴餒甚及歸入門忽睹其食穢也則駭而大驚以為吾老且眊也不能審視耶迫視之果穢也豫愴焉神喪茫然如有失嚮對之食飲者欲喀之不出更悔其曩昔之遍贊於客者之甚無當也而耻之欲斃之不可亦縱之而去而嚮之推丸者則化為玄蟬矣方高棲茂樹之林吸風飲露不需乎人世一粒兩翼飄然如霧縠不染乎一塵已復見樹頭黏一殼肢體備具若尸解然者不知其所化圉人告豫曰此所謂蟬蛻即曩時轉丸者之所變化也豫默悔其初幸不使就斃為歎息無已嗚呼吾嚮來好鶴謂其質至清也今若此已惡於轉丸則謂其近穢也今又若此物安可皮相哉豫表而出之為世之持衡者存鑒戒亦因以自警也自適園記余雅性好花竹泉石急於飲食而尤喜農家種植事而不能日狎於田野以為恨則時種禾麻菽麥瓜蓏果蔬之類於客廳兩階下各一行行俱可數本余時亦荷笠秉耒為耕耘收穫如農家所為也以為常而自堂而寢而醉竹扶杏之館亦各有花竹泉石隨宜布列小小成趣地不逾五丈而遨然自適有餘矣因名曰自適園自適之説始見莊子以為自適其適與適人之適不同也世儒乃於斯兩者遂不無軒輊於其間余以為過矣蓋人生宇內如蟻戴一籺日營營於廣庭周除之下而不知所如此適人之適之譬也其又有吸風飲露食稿壤而飲黃泉者雖淡然無求於人世卒亦與彼營營者同歸於盡耳譽此而非彼不如其兩忘之也矧余所為自適者亦未嘗不待人以適乎何以故吾所藝禾麻菽麥瓜蓏果蔬之類以佐吾百畝之所出則可饔可飱可釃可釀而吾廳復幽雅燕間可豆可觴此皆吾自適之具也而樂羣無人則不適吾亦玉之所儲有近古彛鼎水濵浮磬與騷人墨客諸子百家之籍可怡吾心神耳目也閴然無與共披覽則不適吾鳩巢所蓄有一味之甘盈罍之酒與醉竹扶杏之所為春秋花草山池魚鳥可恣吾臨眺也而嘉賔不時至則不適是吾之所為自適者亦無一不待人以適也豈必役役於爵祿軒冕如所謂爰居鐘鼓者而後為適人之適哉吾又何軒輊之有故曰不如其兩忘之也惟忘然後能無不適五愚公同社記宋四周皆河山回環而中蟠奧壤數百里川澤之氣鬱而不宣故土風顓固而其人多愚考諸傳記則有若守株待拔苗助長刻舟求劒襲石為玉者是為古四愚也越數千載及我明萬歷中乃又有今愚公一人其行事與古四愚極相類然以其無不愚故不以一事成名也而第稱今愚公以别於古之愚者而宋有五愚云古四愚先後生田間終其身不離其鄉土其所與皆其曹也故雖愚而無害於世今愚公乃誤羇一宦以北遊帝鄉與四方高明才知之士伍而乃不習其謠俗不能依阿其語言動靜而與之相上下提其耳則弗喻鑿其竅則不通坦途在前而莫之知由伏弩在後而莫之知避如是數年卒以愚取敗而不知所稅駕有蹴而為之謀者曰人各有冝居亦各有宜偶子宋人也則亦復而所求而比德者而與之為偶而庶幾無患而處非其據偶其所非其偶以罹此重困何為也今愚公聞言瞿然覺乃即日徒步歸歸而視其里之人雖顓蒙如故然靡有類已者必比德而偶則惟古四愚乎而四愚公已遐哉邈矣可奈何於是益徙宋城之東荒曰蒙昧之谷者築一室而粉其壁繪古四愚公於上而閉關却掃日回翔徙倚審視之一有所行事必曰古之人古之人復時自語言咿啞若有所質對者食且飲必祭而先焉若與之酬酢或從間窺之未有不竊笑者也今愚公顧自喜益甚而曰此真吾偶乎因自稱五愚公之社嗚呼古今人不相及而何以稱社之同蓋聞諸先民志苟同道苟合雖越千載旦暮遇之也志不同道不合比鄰千里也今愚公之與四愚者雖生不並世乃其鶉居而鷇食有貌而無心則固同調也而且圖其形列其事與共處一室而朝夕目在焉安可謂非偶也然而無血氣心知無得失利害與是非毁譽以生其憎愛而兆起瑕釁也則可全交也彼與高明才知友者不亦相得歡甚乃其臨得失利害與是非毁譽之小小拂意也能使不被以兵乎比是以度則友知不若友愚也友貴不若友賤也友今人不若古人與稽也貌而言貌而笑不若其不言不笑也今愚公求偶若此豈有所懲哉即以稱同社何不可李中丞生祠記蓋自礦稅使出而寰內騷然多故矣其以一境集羣璫虎而翼者實繁有徒則無若徐淮璫挾持天子命與封疆之臣爭黔首勢據監司郡邑長上獨直指得爭是非然不可久所與利害相嘗歲月相持為百姓爭命則無若中丞中丞阿附璫與俱上下者不論其抱咫尺義角立抵牾第以一事爭衡一去明潔於商民何當焉若乃殄厥爪牙剪厥羽翼發大姦除大懟拯民水火而撥亂反治則無若今總漕李中丞蓋中丞始蒞淮也璫暨祿駐真州要吳楚閩越之會陳增駐彭城程守訓佐之暴南北齊宋之關稅餘鹽則有魯保而開礦務稅郡邑帑羡理蘆政則有邢隆虎豹齊來民其餘幾公既以陵寢地脈國家根本感動朝庭已帑羡蘆稅罷礦務而撤邢隆矣乃以簡書懼諸璫璫稍稍輯不敢動而江淮間獲喘息於斯須無何當軸者忌中丞能令回籍去又不令得代凡數閲月而代者無主名於是羣璫之役狐假者以百數璫役之役猴冠者以千數料民而食規利而趨害商不已剝及於民攘富不已剝及於貧噬膚及骨噬骨及髓千金之家旦暮立盡萬夫之命溝壑立轉而呼天乞命於牙纛旗鼓之下者徹霄淵矣公乃作而曰璫第五日我耳故魚爛吾民也吾一日在即朝廷一日之臣民吾一日之民吾能坐視民水火中而焚溺之耶乃出視事催代之疏日上嚴緝之禁日下爰告於璫曰爾司稅爾司鹽其飭爾從事慎爾隄防毋縱強禦剪滅我商民不然者吾請上方三尺劒以戮辱汝乃令於國曰爾巨猾神姦爾無賴亡命毋怙威勢驛騷我境土不然者吾奉三尺法以若等徇其有如狐如鼠憑城倚社以害鹽政者若而人論如法不貸其有如狼如豺吞噬攫攘以傷殘無辜者論如法不貸其有勳臣而盜行率暴子猾僕挾璫脅商因緣上下罔利以干國憲者若而人白簡從之而璫增之私王惟中偕程守訓表裏為姦乾沒攘奪以百萬計則列罪上狀置之法增懼以死璫保之私朱枋假威蟊賊鹺商以數十萬計商不堪命則拘而置之法而保懾焉不敢逞於是徐淮之商若民始有更生之望而父老之借冦臺諌之留賢羣起為兩淮商若民丐中丞天子乃賢中丞進大司農令撫淮總漕政如故也夫蕞爾淮方實稱都會商旅出途於焉輻輳省郡飛挽於焉咽喉九邊餉給於焉儲偫國家陵寢於焉發祥諸璫窮凶煽虐其間中丞抱空名於上萬姓肝腦塗地於下不旬月間行見弱者瘠溝中強者弄兵潢池耳即朝廷其何能淮方之與有公以既去之身當諸璫方張之焰抗雷霆之威而出塗炭之赤子卒之驅除強暴殄戮諸璫黃河以南大江以北鯨鯢息波魑魅匿影如披雲霧而覩天日此其鴻施豐樹於今有兩哉是時當軸者當楚王以妖言而願甘心於郭少宗伯輩公出死力翼而生又復鷹犬臺諌沮壞計典惡直言臣而欲甘心劉司馬郎輩公觸忌諱而翼以歸以故不安其位而以中讒去讒之故難言也毋乃為數璫柄臣甘心哉鳥盡弓藏免死狗烹自古歎之於是義商某某等集衆而謀曰中丞公之去留上為政歲時俎豆以不忘公我為政乃議葺祠祠成議肖像像成走謁不佞文其石余美中丞之功感商民之義傷讒言之害正嘉公道之不泯於是乎為之記亦玉堂稿卷七
