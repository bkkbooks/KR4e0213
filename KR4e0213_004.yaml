body:
  text: 亦玉堂稿卷四明沈鯉撰典禮疏臣聞古昔帝王法天出治置天下於禮樂教化之中而其效至於格天配地後世治多苟簡徒以法術把持天下而大化不可復覩是豈不知禮之可以為國哉非運際亨嘉則不暇非道合明良則不暇非灼見乎流弊之已極頽風之當反若不可一日而苟安則不暇然則禮其有待於時乎恭惟我國家中天起運比迹陶唐列聖繼承重熙纍洽蓋二百餘年於兹矣試觀漢唐宋之盛有足以當此者乎我高皇帝再闢混沌經綸草昧其時痛掃元俗之穢意常患其不文及其既也遞增遞損又不免文而太過所有大經大典微儀微節有未盡合於古及有反失其初者有志之士每每咨嗟嘆惜謂當此聖代際此明主不及反正一洗衰世之陋以復隆古之風則是有司之過而後世尚論者必曰今日有是君無是臣也豈非臣輩之恥哉夫難持而易懈者志也難得而易失者時也及此之時修其禮樂一其制度寓刑政於教化之中使天下不言而信不令而行不賞罰而勸威者此時君世主見謂迂緩而大有為之君所為皇皇汲汲必責其成於三公九卿百執事而後即安者則皇上今日是也臣叨侍從日久而茲又謬膺典禮重任誤受聖明之知愧乏涓埃之補目擊時流圖維風教竊議方今典禮除見行會議及奉旨題覆外所有相應斟酌變通凡一十二事一曰郊社之禮二曰宗廟之禮三曰常祭雜祭之禮四曰宫闈之禮五曰朝廷之禮六曰預教皇子之禮七曰公主下嫁之禮八曰遣官聼獄之禮九曰京師搢紳往來之禮十曰各省郡縣有司士夫往來之禮十一曰議處宗藩之禮十二闕凡臣所言者上之必稽乎祖訓而下之必順乎輿情雖不敢盡流俗之徇而亦不敢為過髙之論伏惟皇上念泰運之難逢明良之難合風頽俗敝之當反千載一時之難再傾然而聼油然而思斷然率大小臣工而酌行之則天下幸甚其一曰郊社之禮夫國之大事在祀而祀之最大在郊自古禮殘缺後儒穿鑿而五帝六天分祀合祀之説迄無定論則以不深考於經而折𠂻於聖也蓋王者父天母地父母以合膳為經故郊社之建雖分為二而地天之饗常合為一合非共饗一壇之謂也地相接祭亦連舉古人大祭必繹類三日而畢事以是故耳唯周禮冬至祀天於圜丘夏至祀地於方澤此以專饗為義而不相侵者又或天神地祗間有專行禱祀而不相濫者故有分而不合之祭其餘或因名山以升中於天或因吉土以饗帝於郊每祭必卜每卜必兼社此不易之禮何以徴之月令天子以元日祈穀於上帝帝牛不吉以為稷牛帝牛必在滌三月稷牛唯具夫五穀生於土者也豈有賽稷神而不賽后土者卜之日王親立於澤宫以聽誓命澤則方澤之澤耳以是知元日郊天之必兼社也天子又以季秋饗上帝於明堂夫季秋之大享慶百物之告成也故合天神地祗人鬼之至尊至親者而齊饗之豈有配及祖考而反遺於地祗者周詩曰昊天有成命二后受之説者以為合祭天地之樂章是也以是知季秋享帝之亦兼社也又不特王畿之郊祭為然即省方之郊祭亦然書曰肆類於上帝禋於六宗望於山川遍於羣神又曰柴望秩於山川又曰柴望大告武成曰類曰柴皆祀天之禮也然必及於六宗山川羣神而獨不及后土則郊必兼社之謂也而類之一言尤當深味凡言帝者主宰之稱也上帝以理言則乾元是已其尊無上理必寄諸神而後靈如以神言則天帝固尊於九天之上后土亦尊於九地之中皆可以稱帝也易象雖以乾父配坤母而后土亦屬象帝非若皇后之專理內事者故曰類於上帝言亦以上帝之饗饗之也道家亦有四皇之號儒者外之而髙皇帝不以為誕也亦頒其教於天下而不廢其享豈亦肆類之遺意耶臣以為四皇並尊之説終非麗於六籍存而不論可矣若后土之合祀於郊此非類祭之義而何中庸篇曰郊社之禮所以事上帝也注之者曰不言后土者省文也竊以為精當曰不言后土者后土即上帝之類也以是知古者郊社二祀雖有分合之期而其常主於合也明矣既主於合然則圜丘方澤之專祀可廢歟曰豈謂其可廢也古者郊社之祭歲凡九舉如冬夏二至之分祭何用卜而合祭則必卜蓋舉一郊則天之百神皆從舉一社則地之百祗皆從唯后土匹於上帝有專尊而坤元亦統於乾元也卜叶則天允而后土以下孰違之合祀之所以不得不卜也蓋分祀者什之二而合祀者什之八矣安可執二裁八以泥古哉然使此禮在成周以前委不嫌於分合並舉唐宋以來天子每歲一郊以為常則奈何不從古人之常舉者而從暫舉者哉况於元日祈歲之郊天子原未嘗不兼社也稽我太祖髙皇帝初即位時亦倣周制為圜丘方澤分祀者數年當此天與人歸之會德且嫓於放勳格天而每臨祭祀風雨時作因而氣序失軌年穀不登聖祖疑之至洪武十年始悟分祀之非爰定合祀之典自是每臨祭祀景霽風和年歲豐登屢昭靈貺載在御製歌可考也此先天而天弗違之證也逮世宗肅皇帝入繼大統鋭於更化善治偶信大學士張璁等八十四人之言而不用尚書方獻夫等二百餘人之説遂使皇祖之深意不明而孔壁所傳郊社事上帝之明文日晦天分地析天後地先天子以頻數之故歲不得一親行事祀既不專神無常享揆之天意豈遠人情夫人君之於天地猶人子之於父母豈有終歲而不一見者是以太祖於洪武九年定議郊社大事雖有三年之喪亦不敢廢誠重之也是故與其再舉而憚煩孰若一行而存禮况原出於髙皇帝之更定而逺符於古帝王之制作孟春卜日合祀南郊每歲親行著為甲令蓋今日之第一義也然則今南北郊之制可革歟曰何可革也冬夏迎氣之説可以兼而行也然則圜丘宜改作歟曰何必改作也太祖之合祀也即圜丘舊址為之禮所謂掃地不壇者是也迎氣之禮從古既簡丘澤之界從今可近於是先禮郊而後禮社即分即合豈不便哉若揆虞書肆類周頌合饗之禮文自有元日之令甲在矣然則郊之日必百神從祀歟曰此雖古禮而今亦毋用太拘也按禮郊之祭也大報天而主日配以月日月統百神者也非必百神悉從祀也舜類上帝而後及於六宗山川百神非必一時盡舉也今南北郊之祭諸神必各以類從朝日夕月之祭又行於春秋分至於社稷山川古今帝王賢聖諸神又各有祭天子或親行或遣官其禮去古未逺也斯亦可以無議也其二曰宗廟之禮夫天子七廟古未有也其起於三王之家天下乎記曰有虞氏五廟夏因之無所據也商七廟見商書曰七世之廟可以觀德當其時商始一再傳也而七廟蓋因夏制官天下者始祖與四親止五廟五廟之外别無祧廟同於侯國之五廟而已祭必及於四親者服盡而後祭盡也逺必追於始祖者有始封而後有世及也廟制無加於侯國也古有世諸侯而無世天子矣又古者人壽百歲以上四世尚在一堂至緦麻乃别為族禮緣人情雖欲不享四親合始祖而立五廟不可得也蓋不特天子之情為然庶人之情亦然故子思述周公上祀先公之禮曰斯禮也逹乎諸侯大夫及士庶人然則士庶亦如天子之願享四親矣曷為制禮者但能盡大夫以上之情而不能盡適士以下之情歟曰此非理也勢也蓋上世有不葬其親者未葬而始導之葬則不封不樹豈其為陋未祭而始導之祭則追考及祖豈曰嗇此官天下者以錫類未盡之餘孝留之後王也若夫家天下者傳世既久親盡當祧何忍一旦遽夷諸壇墠之鬼於是乎有二祧廟祧廟之外尚有壇墠以禱遠祖而後乃去墠為鬼周以忠厚開國即祭法亦一驗也戴記載之備矣天子廟七諸侯五大夫三適士二官師一庶人祭於寢等威之辨也五廟者月祭及於皇考享嘗及於始祖有一壇一墠而無二祧室三廟者享嘗亦及於皇考而顯考祖考無廟有禱焉則為壇祭之二廟者亦有一壇考與王考享諸廟皇考無廟禱諸壇官師有考廟而無王考廟則同無廟之庶人僅合考與王考而祭之夫祭不及於皇考非情也周公何以不推上祀之禮以逹之此匪獨以賤不齊貴之難備禮實以貧不逮富之難備物故也唯我髙皇帝均士大夫以四親之祭特不及於始祖逮世廟兼敕士庶得追始祖而祀之豈非以唯聖盡倫之心立唯王盡制之極超出三代以上者哉然而七廟九廟之辨則迄今之大疑也又當擬議文武二世室之時不酌古何以凖今也據鄭玄所解昭穆世室在七廟之內而王肅駁之謂七廟及於五世六世無服之祖孰是乎曰皆是也然皆知其一未知其二者也今以先儒所考周家一代之制核之不得不從肅議蓋周公未嘗追王之先文王雖稱王九年然而未備七廟文王沒武王既受命矣周公既成文武之德矣於時當祧五世祖髙圉則不但情有所不忍而監於夏殷天子七廟之制亦不合安得不起二祧室以演髙圉享嘗遞遷太王王季焉至於穆王升祔之次文王又當入於祧廟中而文武二王不可祧也然又不可以二祧室待二王蓋祧室但有享嘗而無月祭與始祖四親不同豈所以居不祧之祖乎則安得不另起文武二世室以成九廟也故周自厲王以前天子之廟本七自宣王以後天子之廟始九其議在有其廢之莫敢舉也追王未及之五世祖祭既廢矣安得復舉諸壇墠中而上祀之然天子又不可仍五廟之舊此所以必合二祧廟而成七也有其舉之莫敢廢也上祀已及之七世祖祭既舉矣安得遽廢諸祧廟中而壇墠之然太廟又不可纍四祧之室此所以必更二世室而成九也世室亦何必九哉祖功宗德原無定額武王後倘復有如文武二聖者出烏知二世室之不再加而成十一廟耶臣實為聖朝祝之總核天子之廟制除始祖百世不遷外從髙曾祖考四近親以上合二祧廟而七者祀額之常從二祧二世室四逺親以下合髙曾祖考而九者祀額之變也然變而不失為常者也設以世室從周祧室從夏殷於禮於情更協則我明其獨盛矣我太祖身集大統德業邁於文王一傳即有成祖為昭世室甫數葉而德可宗如孝廟功可祖如世廟者出矣得其一即可以當周家九廟之鴻名七廟之實饗而今且踰之猗歟盛哉其議禮尤有光於前古我太祖初建四廟定享禮未幾又建太廟為同堂異室之制此猶草創之初也逮世宗皇帝倣古禮創九廟始正太祖南面之位而定成祖世室之享歲時序昭穆分可謂大聖人之作為矣惜當時儒臣考禮未精不能無失其一曰德祖當遷而祧之名稍遽也其二曰三昭三穆不當在世室之外而襲唐宋之陋規也何以明其然也德祖乃太祖所立蓋嘗正位南面矣即不得比稷契為商周之始祖而亦未易以議祧若曰仍其原廟而更為太廟以尊太祖則可耳然則仁祖之祧亦非歟曰其失自此始也當太祖時郊祀嘗以仁祖配天矣孰謂配天之祖可祧也豈惟二祖即四親之廟而皆不可祧也雖然業已祧矣將如之何曰今之祧廟在寢殿後仍之而更其額為原廟可也其太祖以後有應祧之祖則當祔於寢殿之夾室而不可同於四祖四祖者太祖所立也如何而可以下同於子孫也然又不必别立廟即以今廟改題是亦猶今孔廟有啓聖先賢廟之意也每祭必先原廟而後太廟禮有隆殺祭無逺邇四祖之心安則太祖之心亦安臣前覆太常寺祧廟之説而不及言其非者正有所待也乃若九廟之是非則當求端於五世而斬之理廟至五而盈矣夏因虞不得已而益以二祧廟周因殷又不得已而益以二世室皆其時然也我朝正復古之會則反周季之九廟以還夏初之七廟也何難而非開天如聖祖詎能獨斷及此今則時已過矣要之二昭廟不祧之主則歸之昭世室二穆廟不祧之主則歸之穆世室是即三昭三穆與太祖之廟而七也若謂總世室四親與太祖之廟不止於七世則太祖與三昭三穆亦豈止於七世哉書稱觀德之義舉其槩則然耳稽古制三昭三穆畢竟當在世室之內也然則今日同堂異室亦有可議者乎曰有昭穆之位未正也禘祫之義無聞也何以言昭穆之位未正也父子昭穆異兄弟昭穆同禮也昭穆以父子為别而不以傳位為世禮也是故孝睿二廟一世者也武世二廟一世者也其五世祖為英廟六世祖為宣廟必如王肅所言七廟則宣廟尚在未祧之列若如鄭玄所言七廟則英廟亦在所祧之中臣以為斷斷當從肅説是在皇上淵籌而毅斷之臣又惟七廟九廟同堂異室之未定猶可言也昭穆世次之不正不可言也是故為九廟七廟則二廟一世者當同坐而異位此不易之典即唐宋以來亦未有謬悮如今日之甚者也是故不可以不正也何以言禘祫之義無聞也曰禮有時禘時祫有大禘大祫大祫三年諸侯所同也大禘五年天子所獨也時禘時祫非所以論於貴賤也今大祫之祭行於歲除則猶時祫也大禘之擬於丙辛孟夏止嘉靖間一行而罷則無大禘也大禘不行猶以不得初祖為解當宋時君臣嘗有譜系不明大禘可罷之説不得謂之缺典至於舉大祫而棄之則何以示等威之别而備一王之典此臣之所未解也必也時祫止於祧廟而以太祖居中成祖以下列昭穆之次大祫及於原廟而以德祖居中懿祖以下列昭穆之次其親王在兩壁功臣在兩廡各得配享則一代之憲章備矣至於大禘似當别論冉有之對孔子曰如其禮樂以俟君子况大禘之禮何禮也而臣敢輕論之哉則唯聖主加之意耳或又曰國朝有三大禮至今有遺論焉建文君之革除也景皇帝之削號也獻皇帝之祔廟也其在當日亦既詳乎其議矣而終無以服天下之心塞忠義之口何也曰固然也是當時儒臣之失也方建文君之遜國也誤以為自焚矣成祖問葬禮於侍講王景景對曰當葬以天子之禮遂備天子禮葬建文君遣官致祭輟朝三日何者痛其非有亡國之罪也他日成祖又曰吾之來效周公輔成王耳夫成王賢主也夫其生也有成王之賢其沒也享天子之葬使當時廷臣執此以諍必有以開悟聖心葬以天子則必祭以天子有一日之成王則有一日之年號廟祀國史焉得而廢之今者廟祀已矣世代祧矣可以無議矣惟是年號當復一向因仍無以體成祖厚葬不忍之心成國家一代光明之制臣故曰儒臣之失也方英廟之復辟也欽天監奏革除景泰年號上曰朕心有所不忍仍舊書之至憲宗皇帝復諭羣臣曰朕叔踐阼戡難保邦奠安宗社亦既有年姦臣讒搆請去帝號先帝尋知誣枉深懷悔恨以次抵法朕承大統用成先志遂上尊諡復位號孝哉憲宗善成先德使當時廷臣以廟祀為請宜無有不從者卒使戡難保邦之主曽不得享太廟一席之榮臣故曰儒臣之失也惟是獻皇帝祔廟之説則稍異於是此亦當以二帝三王之舊章裁之蓋獻皇之當稱帝而不止稱王當饗帝祭而不止王祭也此於虞舜尊親養親及成周追王上祀之禮可徴睿皇之可建原廟而不必序七廟可以宗德特享而不必以祖功配郊也此於虞夏郊嚳宗堯郊鯀宗舜及成周祖文王而宗武王之禮可徴前一議者當時大學士楊廷和等未察而誤執為人後者為之子一句禮文以蔽孔孟追王上祀大孝尊親之旨則張桂方霍諸臣言之詳矣獨後一議闡揚未透故僅能點出繼統不繼嗣之説以動帝𠂻而印諸有虞氏之所以尊瞍而宗堯夏后氏之所以郊鯀而宗舜周公之所以上祀先公而祖文宗武處終未帖然蓋自古從藩服陟帝位者但當以其親並繼統者之尊不能以其親入繼嗣者之序終與上祀之先公稍殊雖舜禹亦莫之違也然舜宗堯禹宗舜雖不為堯舜之後猶後也堯舜既無後而有後矣瞍若鯀無乃有後而無後耶非也凡古之官天下者生則一代而兩宗歿則一帝而兩祀其義互起於尊親之間堯舜為禪天位之大宗尊而親之也今之帝王廟祖之瞍鯀為傳國祚之小宗尊而親之也今之奉先殿祖之而世廟之入繼武廟又與舜禹稍殊其事情酷似放勳氏帝嚳之子帝摯之弟亦繼統而不繼嗣者也大同中尚有兩小異焉一則起於黎獻推戴一則起於中朝迎立一則帝摯有嗣而姪遜叔興一則武宗無嗣而兄終弟及故廟議别焉而以舜禹成王之所宗所祖推之則堯嗣之必宗帝嚳何疑也唯堯之當年祭法與今世廟亦難混帝嚳除有虞氏之郊祭外尚有帝摯本圉之子孫沿官天下時之遺法而以五廟之祭祭之獻皇之嗣則唯肅皇一人耳其主不入太廟則奚入然而究堯舜之接帝統宗有德則皆不能無議也故廷和等得執為人後之一説以格之畢竟睿皇當祔何廟此當從漢文原廟之例亦無疑親盡亦當議祧則不嫌從世次併入太廟二祧室中矣夫然則其事興獻也既有光於舜禹之尊養二親其宗孝皇也又無違於虞夏之上宗堯舜豈不仁之至義之盡哉我世宗言必稱堯舜亦唯孔孟之彛訓是程使在廷有納牖之規則當寧豈無轉圜之聽而惜無一人及此者今則有其舉之莫敢廢矣無已則主鄭玄昭穆論世之説而折衷於議祧議祔之期合孝睿二廟為一堂而還獻皇侍享之座其可乎然終不若正之於始之為得也臣故曰是亦儒臣之失也去此三失一復古禮妥祖宗之靈舒忠義之氣惟在一轉移之間顧皇上斷與不斷耳乃若祭位而設冠裳非生前之裳衣當照依郊祀而設主作樂而用教坊傷聖代之風化宜特詔有司而講求此皆今日宗廟之急務而不可視為粉飾太平之靡文也其三曰常祭雜祭之禮夫山陵之祭非古也以義起者也而其道不可廢則仁人孝子之心也人臣有勳勞得祀古所謂記功宗者也而或止於本代或責之有司則尊卑隆殺之體也禮當祭則當敬禮當殺則當略義也禮以義起者也至於本一神而仍祀於兩處本尊神而致褻於非類本邪神而反崇於王國此則皆禮之所必裁矣以今日山陵言之乃聖駕當親行者也而不得不遣官者勢也孔子曰吾不與祭如不祭即專官猶未盡聖意之精誠况一官而遣之兩祭或三祭乎此其誠意不足姑未暇論乃其行禮之時已近二更每陵相去各一里許山徑﨑嶇林木叢蔚馬僕奔馳燈火互混有主祭官已到而陪祭官不到者有行禮將及半而班儀尚未整者雖有臺省糾儀諸臣昏黑之間孰得而辨如遇風雨失禮猶多似宜每陵各遣主祭官一員其陪祀官亦各照衙門預先分定庶諸臣之誠意可觀而皇上之委用無沗此所謂禮當祭則當敬者也以勳臣言之本朝開國諸臣與後來守成將相臣已見於覆太常寺之疏矣惟是靈濟宫所祀真君者起自永樂年間查得二真君乃五代時徐知證知諤兄弟也以其禱疾有應遂寵之以祀典褒封臣謂此亦或出於一時之偶爾而未可以為常祀也自古帝王疾病有禱見於尚書金縢乃其所禱者太王王季文王皆周之先王而非民間所得奔走奉事者也天子為天地神人之主一念所至百鬼效靈縱有應驗何足為異藉使生前精爽能為福利何如髙皇在天之靈藉使愛國與君及於後代何如祖考之於子孫其應崇信與否宜不待辨况二真君閩人也該地方已有奉敕之祭每六歲織造袍服挂换此其優禮報之亦已至矣而又有京師之祭不已過耶况葬日止於五祭而今以每月朔望俱行事增至三十餘祭是亦不可以已乎或曰今之北極佑聖真君祀於靈明顯佑宫猶是也何可無議也曰北極者天神而非人鬼也惟天子祀之而郡國不得干也古者一歲之內祀天凡幾於義頗近二祖所定當有所稽是故未可輕議也然舊唯兩祭而今亦以朔望增之且至二十七祭黷祀弗欽禮煩則亂復其舊焉可矣此所謂禮當殺則當略者也何以言本一神而仍祀於兩處也帝王廟既已專祭三皇矣太常之祀又何為乎隆慶間該本部左侍郎王希烈具題可以查而行也何以言本尊神而致褻於非類也太山載在祀典曾有遣官之祭矣玉妃之號行宫之修民間進香所在而是毋乃瀆乎况乃婦女羣遊嶺上經宿而歸男婦雜居恬不為恥敗化傷倫褻神瀆禮莫此為甚可不速令禁止之乎何以言本邪神而反崇於王國也頃歲兵部尚書王遴建言毀在京及天下寺觀非無所本蓋太祖髙皇帝鑒元之溺於二氏而亡國故洪武五年有詔歸併天下僧道庵院永樂以後禁乃漸弛而邇年為甚不但傷財耗民害流軍國而聚羣破戒其壞本教亦深矣是以廷論及之荷蒙皇上允行已而恐人情不便只嚴行巡緝衙門不許增修而已明旨昭昭在人耳目曽幾何時皇上偶忘之耶龍泉之上甫畢而卧佛之寺又興及言官以停不急之務為請則諭以內帑之費不預有司臣揣聖意蓋欲借修福之一端以行順志之大孝也獨不念太祖啓佑之顯謨乎洪武中有靈谷寺僧求施崇建佛宇者召而面諭之曰財非朕之已物乃農民膏血耳若以此而施爾必不蒙福而招愆其僧獻言佛法付之國王大臣復諭之曰所以付之者國人無有敢謗聽化流行非王臣則不可僧乃省而叩頭此見於御製遊新菴記可稽也陛下奈何不以節財法祖為孝而以勞民諛佛為孝乎夫作佛事之不預有司而動內帑固也然皇上躬祀山陵閲視壽宫與夫皇子皇女慶生一切充賞之需動至數萬則又輒取太倉之邊儲太僕之馬價所司執奏則諭以內帑缺乏委非得已何此獨缺乏而彼獨不乏也何於不得已者而已於得已者而不已也夫今之崇佛教者何嘗參及聖祖所標暗助皇綱之理不過藉口於普救衆生調風順雨而已昨者風霾異常經春不雨調順之效何在豈非剝膏脂以媚神不如修實政以格天哉皇上服食之菲上配神禹後宫之素下陋漢文海內稱儉德焉乃於佛事之作不加撙節至於內府外府之分當用而不用不當用而用之或非所以風遠邇而訓將來臣以為罷之便伏乞聖裁其四曰宫闈之禮夫風化必始於閨門而名分每嚴於嫡庶故春秋之義以並后匹嫡為亂本而漢臣爰盎却愼夫人之坐曰尊卑有序則上下和後世以為至論惟我聖祖深知此義曾諭侍臣曰朕觀往古深用為戒若不惑於聲色嚴宫闈之禁貴賤有體恩不掩義女寵之禍何由而生又命學士朱升等修女誡及古賢妃之事可為法者諭之曰治天下者修身為本正家為先始於謹夫婦帝后雖母儀天下不可使預政事至嬪嬙之屬不過備職事侍巾櫛若寵之太過恐驕恣犯分上下失序歷代宫闈政由內出未有不為禍本者夫內嬖惑人甚於鴆毒惟明主能察於未然大哉皇言所以慮萬世聖子神孫者至矣是故英宗皇帝顧命之日切切以定后妃名分為戒至嘉隆間詳定册封儀注皇后具服升坐皇妃行八拜禮是后妃之分嚴乎嚴乎不容一毫有所假借者乃往歲聖駕謁陵后妃隨輦聞諸衛士言遙望黃輦紅輦分道同行蓋黃輦惟皇后得乘而紅輦則諸皇妃從隨者也若果並驅名分烏在雖其事出偶爾非宫禁之常儀抑或舊時因仍非一旦之特起臣等俱不敢知但我皇上言稽祖訓動與天遊豈肯令宫闈之內有越禮踰分之非傳聞道路貽譏青史哉所有后妃相見行坐等禮竊謂當查照裁定永著為式庶幾宫居燕見有所持守閨門一肅聖敬日躋萬國四夷同此瞻仰不然則非民攸若非天攸訓近而有近戚怙寵之萌遠而有野史傳疑之謗且如近日皇貴妃之封雖奉旨曉諭事體大定而議者未巳也使諸臣天王聖明之嗟含忍以去國我皇上從諫如流之美掩抑而不光臣每思國事至此未嘗不痛恨於柄臣用事之日也蓋當皇上英沖踐阼之始一惟元輔之言是聽使為元輔者能常述祖言彛訓其嚴如彼閨闈關係其重如此則必有以定聖心於宥密炳睿照於幾先又何至有可疑之舉動致盈廷之議論哉且皇上獨不聞孝廟時事乎孝穆太后紀氏乃孝廟之生母而仁壽太皇太后周氏則其祖母二母皆妃也當仁壽之崩也大學士劉健等已上尊諡及照依大學士彭時所議祔葬祔廟之説矣惟孝廟之明乃曰事須師古末世鄙褻之事不足學又曰太皇太后鞠育朕躬恩德深厚朕何敢忘但一人之私情耳祖宗以來惟一帝一后今若並祔亂無紀極且孝穆太后朕生身母止尊稱為皇太后别祀於奉慈殿又曰先帝固重而祖宗之制為尤重於是革去尊諡只照健等議仍舊稱太皇太后别廟奉享夫彭時劉健成𢎞間所稱賢相也當日此舉可謂有功然臣猶惜其無能體孝宗克已復禮之深心而以宋家太后太妃之母號聞於上者此雖時勢未必可行而大臣以道事君援古亦有何過識者尚含有君無臣之慨焉夫孝廟以是待其生母與祖母自世俗而論似乎薄其所生然廟號孝宗名高一代則知聖人之孝貴禮而不貴情也伏望皇上思微漸之當防念閨閫之當肅勿使有幾微踰越形迹外揚啓觀聽之疑蹈叔季之陋乞查聖祖所修女誡及古賢妃行事原本頒之宫中令女師時常講解於皇妃御女之前俾各通曉此義以相佐帝后成其內治其於聖化不為小補伏乞聖裁其五曰朝廷之禮夫自古帝王曷嘗不以勤政典學為首務哉顧深宫決事非有公卿執事相與參商也典籍獨對非有賢士大夫可備顧問也即有天縱聖神之資豈能獨成雖日視朝御講容接臣下若可以待咨詢𢎞啓沃然一日之間不過片頃而又肅之以等威重之以糾儀君臣之情能通而忠藎之懷得盡者少矣我聖祖特為此慮故於大誥首篇以君臣同遊為開卷第一義而於早朝之外又御便殿聽政經筵之外乂御文華日講情分兩盡恩禮兼周無非欲其上下通蒙蔽絶開泰召和慮至深遠也皇上昔在沖年不免僅循故事今神睿日長斧藻日新乞於每日間御便殿會集內閣部院大臣及科道官凡關係應行重務未得勝畫或聖心已定就中恐有未盡者不妨從容訪問但有四方災異閭閻愁苦皆得詳究其有內外官員朝見赴任亦可兼訪時出天語分付以所宜行如遇奏本事體明白亦就時批答徑下所司如成祖諭廷臣以午後事簡有言可得從容如孝廟時召對徐溥劉健等故事則不出皇序不下堂階而明見萬里澤沛海隅矣乃若文華日講正辨論得詳之地如但取講官一口誦而已傴僂而前逡巡而退為益幾何謂當於前一日先送講章皇上覽閲之餘端默凝思有無裨益治道有無符合聖衷俟是日講畢諸臣咸令各陳所見得者非工失者非拙順者非美逆者非違不惟聖賢之微言奧旨可以旁通而諸臣之忠邪淺深亦可槩見皇上何憚而不為也雖然其要在於和顔色略儀文皇上雖臨下以莊不必其矜持之過也諸臣雖事上以敬可省其節目之煩也蓋便殿與正朝異日講與經筵異也又如正朝時玉音宣下近於聲歌此乃沖年所宜今但説明或傳旨無害也此雖小節而於穆穆皇皇之體稍不類臣是以敢并及之伏乞聖裁其六曰預教皇子之禮夫皇子生育深宫不見異物天性渾然完也然上未知社稷之重寄下不知稼穡之艱難雖聰明之盡亦必有左右侍從為之開導牖引而後聰明聖智日廣如必待其稍長出閣講學之日而後圖之計亦晚矣恭惟皇元子年已五齡智識漸長今日之蒙養乃異日之聖功使其所聞皆正言所見皆正事前後左右皆正人誰與為不正者則雖未離襁褓出講閣而聖人之體段已具矣古人保傅之教已不可復考臣以為簡內廷侍從之臣而已矣嘗稽我孝宗皇帝之在儲也始則有內官張敏廢后吳氏者維護於萬妃妒寵之日繼則又有東宫內官覃吉者儒雅端方通書史知大體竭誠輔導凡東宫一言一動必引之正所讀論語大學中庸諸書皆出口授暇則開説五府六部職掌與軍國重務及於民間農桑勤苦以至宫闈之內妃妾專寵階禍宦寺弄權蠧國一一情弊無不盡言以是孝宗自在東宫時聖德已聞於天下及其即位能開𢎞治十八年之太平巍然為一代令主是其效也其後武宗以幼沖嗣位所與遊者非馬永成谷大用則劉瑾魏彬之輩也其所馳逐者非擊毬走馬則俳優雜劇之戲也狎褻禮體蒙蔽主聰未幾流毒搢紳幾危社稷此內廷侍臣賢否得失之明驗也可以為鑒矣今之內廷豈無儒雅端方如覃吉者乎豈無通書史知大體如覃吉者乎豈無愛主愛國盡忠盡言如覃吉者乎精選而任用之在皇上加之意而已矣且皇上亦知近日內臣之可慮乎賢者固未嘗無而冒濫名器髙張氣焰者實繁有徒是不可不為之防也夫內官官有七等秩止四品祖宗制也今則不拘品制不論崇卑蟒衣玉帶輝映朝階飛魚鱗袍充斥道路至一切厰局衙門厮養狡童之輩稍效微勞輒覬非分是可輕畀之乎內官職在掃除不預外政祖宗制也今則事從中出不由部議大而王府之請封邊帥之升授小而雜流之傳奉錢糧之勒索無不視賄之多寡以為低昻則是太阿之柄倒持閹寺之手矣是又豈止一衣一帶之微而可視為細故乎伏乞敕下本部查照會典品級裁定服制仍曉諭大小宫寺勿承風而請乞太過勿怙寵而覬望非常勿從中而阻撓部權勿鳩黨而搖亂國是十俊之名不可有八黨之禍所當懲特命儒臣撰集古今中官善惡事迹為一傳付與翰林官教習使之各知忠主上愛身家保富貴之道皇上不時查訪擇其立心之端行誼之良者以次序升如無可録即服飾之賜亦不輕與蓋不特杜漸防微而其為此輩之福莫大焉如是而覃吉之賢不多見者未之有也其七曰公主下嫁之禮臣按易曰有夫婦而後有父子有父子而後有君臣又曰坤雖有美含之以從王事不敢成也地道也妻道也臣道也是夫之於婦如君之於臣父之於子一失則陰陽失軌再失則天壤易位故雖帝王之女下嫁匹夫而不敢不嚴也書稱堯釐降二女則戒之曰往欽哉詩詠王姬下嫁則曰曷不肅雍京房載湯嫁妹之詞曰陰從陽女順夫天地之義也往事汝夫必以禮義其教戒之如此秦不師古其後因之自是始以列侯尚公主使男事女陰易陽故王陽嘗條世務極指此為舛而長樂王回亦謂其弊至父母不敢畜其子舅姑不敢畜其婦皆有激而言之也我髙皇帝既定天下即稽古制創是禮公主先受醮戒至駙馬家與駙馬同謁先廟合卺之日駙馬公主相向皆兩拜其見舅姑行四拜禮舅姑坐受二拜答二拜其册文與公主曰既入某官之門恪遵婦道以奉舅姑閨門整肅內助長佳毋纍父母生成之恩其誥文與駙馬曰當堅夫道毋寵毋慢永肅其家以稱親親之意卓矣高皇即詩書所稱何以加焉沿習之久漸失其真如嘉靖間儀注則有公主坐受駙馬兩拜之禮見者已為駭異豈知今日尤倒置難言者乎入見舅姑則令舅姑行四拜禮而公主坐受兩拜是舅姑反下其婦也既詣香案之後又令駙馬行四拜禮公主止答兩拜是女婦反乘其夫也至於家庭之間則舅姑絶不相見公主誕辰反令其舅姑入賀拜於門外而公主南靣坐受所謂恪遵婦道以奉舅姑者何在乎駙馬入見名曰上朝稱曰天妃叩首階庭公主坐受所謂能堅夫道永肅其家者又何在乎惟其如是故各藩府聞之皆得效尤每郡君縣主出嫁則乘轎居前而儀賔之馬則隨其後凡上下轎乘必儀賔拜伏而後從事地方傳笑夫家竊耻雖有賢宗室而終莫反正者其風自京師始也昔宋時帝女下降皆升行以避舅姑英宗不平曰豈可以富貴之故屈人倫長幼之序亟詔有司革之至今史册以為美談伏乞敕諭本部刋行儀注一以髙皇所定會典所載為據并移文各藩府凡郡君縣君出嫁悉照品官納婦定式不得過自尊崇有傷倫化則天下之為夫婦者定而君君臣臣父父子子各止其所而理道昌矣其八曰遣官聽獄之禮嘗讀書至立政篇見周公之惓惓於成王者何其敬刑之至而任人之專也既曰文王罔攸兼於庶言庶獄庶愼又曰庶獄庶愼文王罔敢知於茲夫文王於獄知且不敢况於兼乎既曰文子文孫其勿誤於庶獄庶愼惟正是乂之又曰孺子王矣其勿誤於庶獄惟有司之牧夫蓋言庶獄尤重不付有司其免誤乎考之周禮大司寇以五刑糾萬民小司寇聽其獄訟未有遣官聽獄之説也在王制有之其曰大司寇以獄之成告於王王命三公參聽之此遣官聽獄之始或商制或周制雖不可知然三代之時有之無非以人命至重三公至公所以示其刑人於市與衆棄之之意而天子一毫不與焉耳我祖宗之制視此加重洪武間嘗令五府六部都察院通政司詹事府六科詳審罪辟洪熙間添差內閣學士雖不專遣定官而必以閣部大臣是亦命三公參聽之意當其時同寅協恭師師濟濟庶幾於文王之罔兼罔知者而未曾有內官之命也內官之命自正統十四年始考其時乃王振擅權之日而英廟北巡之秋也嗚呼是可為法乎其後英廟復辟於天順二年仍令三法司會多官審録永為定例蓋懲前日之誤書所謂其勿誤於庶獄者甚矣英廟之明且武也可以為萬世法矣夫內閣學士近臣也出自天子之命則禮有常尊三法司職守也臨以天子之使則分有當屈若內官獨非天子之命乎其命同其禮亦不得不同雖以閹寺之微而倨傲於儒紳之上至聽審之時生民之命懸於呼吸指顧間乃三法司堂官司屬之衆拱手而聽命於一夫彼其人誠賢也未甚害也不然則其視匹夫匹婦之生且死若秦越之不相關者但見有金豈見有人大司寇即有執爭不過十之一二耳雖失入者難遽定於一時凡應坐而失出者大抵賄也天顔咫尺無由造次則是無財者乃死而有財者得幸三法司為天子守三尺法天下其將謂何以言其禮固未可令衆庶見以言其事尤非所以示天下公且此輩賢者少不賢者多體統紀綱關係不細皇上何忍焉伏乞敕下該部遵照祖宗初制每當審録之期仍令內閣學士會同三法司逐一從公聽審然後定議具奏詳決其正統十四年故事不得復用永著為令夫閣臣之與三法司一體也事干大辟者平日皆得參議易明也持論無有不公用刑無有不當所以永綏和氣畢致諸祥壽國家命脈之要端在乎此伏乞聖裁其九曰京師搢紳往來之禮嘗讀古者士大夫相見禮何其委婉而重難曲為之儀而多為之飾也及考其平居遊處之際擇師而師擇友而友贄受而必反財通而惟稱在外無燕朋在國無私交名其名官其官長其長幼其幼既無繁文奪於外又無虛意設於內耳目專純心志寧一又何其為道易守而其為教易行也世教衰古禮廢士生不及周旋揖遜其間有志者惜之惟我國初時俗最近古士大夫崇德而尚齒以道義名節表儀後進朋友之間相呼以字相稱以官片紙可以通書方帕可以執贄庶幾龎朴之風蓋至於成𢎞之間猶有存者逮正嘉以來則漸漓矣然未甚也隆萬以來則漓甚矣然猶未若今日也其在今日何如哉富貴有可求則畔禮以隨俗勢利有可倚則違心而競進座主門生故事也隆以老師之號而舉主觀風有司提調皆得以效尤則師道喪久别通問常禮也重以白金之將至於依權附勢數十數百而不耻其無名則友誼亡年本幼也而呼之為兄行本叔也而呼之為伯何以待兄與伯乎是無長幼之倫也未天卿也而天卿之未師相也而師相之何以待天卿與師相乎是諂諛之極也一進士也需次經年費金纍百他日之官何從措補於是地方始有不勝其纍困者矣一館選也肄業三載費金近千他日進館何自支持於是門生始有難免其責備者矣朝覲饋遺之禁朝廷三令五申矣而其風愈甚風俗侈靡之戒禮部頒有條式矣而若罔聞知一郎官之遷轉非大事也謝恩謝部足矣候見於諸公卿之門墻至於賄閽人以僥幸一見豈敬長之禮當然乎下徇俗恐得罪於上也大學士之禮體至隆重也部寺會議足矣揖讓於百執事之流屬至於填門途而不容車馬豈吐餔之義如是乎上徇俗恐失禮於下也事不由乎舊章而惟據見行便宜禮不稽之儀注而求諸人情喜悅動不請教於先生長者而一依乎京師皂𨽻嗚呼今之為士者亦太勞矣今之風俗亦至於甚漓而不得不反矣夫士者民之倡而京師者四方之極也今縱不能復古禮豈可坐視其日渝而不救也説者謂國初之時如春成𢎞之間如夏正嘉之際如秋今其隆冬之候矣及今不返日落烏沈萬古如長夜不亦可深痛哉幸有聖天子鋭精惕厲於上二三閣部大臣相與寅恭圖回於下冬則必春夜則必晝天運循環無往不復占之氣化人事皆不容以不正者而亷耻之風可以漸長是以冒昧為皇上言之夫易俗移風使天下回心而嚮道道豈遠乎哉其十曰各省郡縣有司士夫往來之禮按孔子論政曰送往迎來今居中國絶交往無禮義則不可以為中國矣况夫驛遞星馳天子之命使也冠蓋相望天子之雋才也境內賢士大夫邦人之所矜式而國之紀也自中丞直指藩臬大夫以至郡邑長吏皆有地主之責風教之係而往來之禮又焉可一日而缺哉往者未行條鞭未議公費郡守以上一切取辦於州縣州縣長吏一切取辦於里甲此固小民所以坐困也今者條鞭行矣公費議矣然意未嘗不在州縣里甲也一切上官禮物不曰動該州官銀則曰動該縣無礙不知州縣庫貯何項為官銀無礙即有之能幾何而堪應一切之需也且州縣亦豈能神運鬼輸哉即不用里甲而亦未有不出於民者幸而上官原諒可以奉職無過一有不當輒爾狼藉於彈章不曰火耗加收則曰罰贖太重不知去此二者將何所出而上官之所謂無礙者何物哉嗟夫為仕於今亦已難矣好修拔俗之士其自持也有方道隆德盛之夫其應世也無迹此賢且聖者之事而非所望於中人也王者立法以維世而修其教以勸中人焉可無道以處之乎臣請先條公費之議而後及州縣之私夫自有條鞭則有公費非不詳乎其議也然額設甚少徴存州縣而上官又得以共之為州縣者既虞酬應之力不支為上官者又防州縣之議其後則有寧取之罰贖不取之公費寧厚責於州縣不挂迹於查盤者矣名為節省而實纍小民陽稱不染而陰牟大利在百姓既輸公費又出無名在官府既賦其公又利其私曷若明定其額各足其數而通行公費之為得也請自今議定州縣各百金孔道遞加至二百而止郡守二百金孔道遞加至三百而止藩臬兩司守巡各道各三百金孔道遞加至四百而止撫按各千五百金孔道遞加至三千而止各坐所屬分派永著為例凡一應下程酒席吉凶慶贈之禮皆在其中而均徭甲首原額之設不與焉上官不得以干預州縣州縣亦不得以過奉上官每歲帶徴閏銀各二十之一其官吏師生作缺俸糧柴馬徴存備補作正支銷撫按司道查府府查州縣撫按則互相稽查苟不過用即有私贈私厚之類悉置勿問必如是而後公費行可也夫公費不行則養廉無資欲以責各官之不欲是強之也公費既行則公私兩裕又欲如嚮者之交取於民是貨之也然則罰贖火耗是亦不可以已乎夫贖金之罰古所以待疑獄今則槩施矣然猶以為不得已而用之者也撫按司道寄之州縣州縣寄之庫藏禮待髙賢者少取容當道者多也窮乏得我者少厚賂津要者多也甚至有假饋送之名以肥囊橐相道里之便以遷有無者其為冠裳之玷亦甚矣今後除撫按查盤罪紙折色照例徴存解邉與還官入官贓及贓料變價等項徴銀貯庫外其餘詞訟罰贖不論撫按司道各郡州縣盡數折榖上倉其穀照依時價一隨土産所宜各處倉厫隨時修理各倉官攢加意優恤如遇價貴則賤出之以陳易新是不常平而常平也如遇飢荒則發賑之有備無患是不義倉而義倉也即如今歲江北大旱江南大水所在撫臣請蠲請賑又何憂之有嘗聞明君貴五穀而賤金玉國有九年之耕則有三年之蓄蓋此道也火耗之收所以折剩餘今則無餘矣然猶以為不得已而取之也一分不足而十之三矣又不足而十之五矣官得其一吏得其二反使小民得以有辭而當道不能曲庇則將何所辭其責是投匱未必便民反為官之纍也然則投匱非歟曰投匱何可非也投匱所以防經收之虐拆封所以稽經收之數夫既投匱矣經收不能為虐矣何必拆封但令報數可也况夫經收之收解也其費頗繁而百姓之應役也其差頗苦倘有餘剩即以補之仁經收也拆封則輸者有疑於官而火耗不敢不重不拆則輸者但足其數而經收不可以欺火耗絶而輸者如歸仁納戶也是一舉而兩得者也頃者柄臣用事慘刻成風有責報羡餘者矣此在州縣長吏且不可况朝廷之上乎嘗聞仁者以財發身王者藏富於民而不藏富於國蓋此道也夫火耗罰贖非美名也取則貪不取則廉至易辨也然中才之徒亦往往不能免焉豈故甘不潔之行以速清時之誅哉勢則然也今既有公費以恤其私又無誅求以亂其守則火耗罰贖亦可無染矣如是而又有迷不悛者撫按據此以定殿最銓曹據此以論黜陟更何説之辭前有所慕後有所避則如規出不得不圓矩出不得不方不特州縣無所媒其利即撫按以下郡守以上皆濯潔相孚光明相照人人無按劒之疑在在有羔羊之節矣豈待嚴貪墨之禁而後無黷吏哉然必先養之而後教之臣所以先條公費之議者此也邇者皇上下令禁餽遺革侈靡無所不至而又時逮墨吏至輦下送法司海內聞之宜乎改觀易聽矣而臣以為未得其本也古帝王之治不嚴而肅不殺而威其所操者本也如果臣言可採乞敕下吏部都察院通行省直撫按一體遵依先將應議公費通行半年以內具題發該部院轉行遵守其議則寧寬毋急寧增毋減寧為後日可繼毋為節省近名何者其給公者有限而利民者無窮也是經國慮民之大計也其十一曰議處宗藩之禮竊論當今天下財賦淮河以南四百萬供京師淮河以北八百萬供邊境而親王郡王將軍中尉宗女祿米則共八百七十萬有竒不惟倍於京師而且溢於邊境自古以來未有天潢之盛供億之繁如今日者也親王郡王祿米不多各有定額已無待議將軍中尉以下生息日廣財賦日詘有司難供各宗祿賜已經近日勘議亦既周悉無遺矣然皆於難處之時而為濟變之法也而不必以禮也法者人也隨時而可變禮者天也一定而不移屈於禮者以情拘於法者以力情與力之服人也不同則禮與法之為效也大異是不可以無辨也臣請得折衷於禮以助法之不及皇上試垂覽焉考嘉靖中翰林王曾有奏定限子女封爵之疏親王之子除襲封外許封五位郡王三將軍二中尉一親王之女許封其三王二將軍一中尉無或謂可行然既寢矣乃近奉勘議則謂難處者祿也非爵也不必限爵但宜限祿斷自郡王以下五世以外郡王除襲封其餘定以五位將軍四中尉三未滿者照額全支額外者通融均用其所生之女則除中尉無封外郡王四將軍三額外者亦聽各儀賔通融關領此其恩更寬而其法更備既無不受之爵亦無不沾之祿非不較然畫一也然猶所謂法也以臣愚見曷若照依服屬之遠近以為爵祿之降殺其更定也既與禮相合其要歸也又與法不相背非不任法也法自禮生者也不必限而不能不限可以無限爵亦可以無限祿者也且如始封郡王乃親王之子也其子封鎮國將軍者乃親王之孫輔國為曾孫奉國為玄孫中尉以下則無服矣至於二世郡王則親王之孫也三世四世郡王則親王之曾玄也至於四世則其為鎮國將軍者已於親王無服矣乃封爵與親王之孫同不亦過乎唐宋以來嗣王之禮已減初封况嗣而又嗣之庶安得與初封等也請於已封者照舊外自今日未請名封者為始一定親王之服屬以為降封之限制如初封郡王之子親王之孫也長子嗣郡王諸子為鎮國將軍如故二世郡王之子則親王之曾孫也長子嗣王諸子降封奉國將軍四世五世六世郡王之子則親王之無服孫也長子嗣王諸子降封中尉四世鎮國五世輔國六世奉國而止其郡王孫五世以下傳世遞降亦如之則法與情合爵與祿均既破宗室之羣疑適符祖宗之會典仁之至而義之盡也或曰奉國以後如何曰聖祖所定難遽議也此所以别於庶人也祿米止於二百而又本折兼支又照依近議應舉出仕則住支又有司之給未必盡全則不過古者一夫之受而已耳况將軍等祿一可以當四五中尉雖衆十亦不過二三則是省者常多而溢者常少即不多不少而亦恆足以相當祿爵皆可無限而恩義於是兩全所謂齊之以法不若齊之以禮者也其他槩從近議伏乞聖裁亦玉堂稿卷四
