body:
  text: 亦玉堂稿卷十明沈鯉撰明太子少保兵部尚書兼都察院右副都御史確庵魏公墓志銘萬歷丙申正月四日故大司馬確庵魏公卒涇陽里第厥嗣知觀以公門人牛侍御所為狀越數千里詣豫請銘曰公先子生平鮑叔也即不朽先子宜在公嗚呼士君子惟出處操持最兢兢耳至所稱才難尤在邊略公蓋兼有焉始公以留都大司農謝政家居適西北邊羽書旁午有詔推元老壯猶者往廷議以公名上起兵部尚書兼都察院右副都御史總督陜西三邊軍務公屢辭不獲則移書執政曰吾聞事君者量而後入不入而後量虜自欵貢來疆吏相襲苟安懼開邊釁而武備日不競此宋人積弱之漸也必我行者則罷欵議戰一大創虜去庶幾其可不然吾不敢以國家大計嘗試矣執政咸報書如公指公始就道時辛卯八月也公至固原虜酋明莊二部各擁衆數萬相繼擾邊公三戰三北之斬大酋一人他俘馘不可勝計上嘉公勳晉太子少保廕一子世錦衣衛千户錫豫蕃庶公方將舉頽邊軍事次第修復使中國常操勝算㑹明年寧夏逆賊哱氏戕一巡撫都御史一兵備副使以叛人心洶洶公顧若弗聞也日夜圖方略制賊要領言寧夏西北雄鎮士馬物力充牣其中而賊以負嵎此病在心腹非旦夕可取也然大要不出數月乃即日發二檄招安姑緩賊旋移檄各鎮徴兵餉而公自統大軍駐靈州以偏帥駐花馬鳴沙州諸處扼賊要害使不得渡河窺關內又分兵徇四十七城堡下賊者收復之以孤賊勢而賊且大括城中金帛婦女賄虜為援公曰此腹背受敵危道也則多發敢死士夜銜枚搗虜巢牽其反顧已兵餉四集則進師薄城下圍焉賊驍將哱雲中機銃死賊氣奪而城堅不可猝拔計惟決水灌之顧恐傷良民則築堤緣水道而實土塞城闉為浸城不灌城之計城中聞水至則懼且譟公曰此可以行間矣乃射書圍城中疑賊黨使自相圖居民亦多受公計為內應未幾賊首劉東暘果為其帳下所殺八月甲子夜城啓我師入哱氏闔室自焚死寧夏以平先是言官有議公逗遛者詔逮公問狀公之䇿賊固期以數月乃距城下月餘爾公已就逮一軍將吏皆號泣夾轂公曰諸吏士為國勞苦幕府籌邊不效固當中法既至對簿諸為公上書白寃者章滿公車公終不一言自明已而上感悟還公官歸里亦不録功廷議至今惜之公魁悟岸偉丈夫也平生慷慨功名明習邊事自為户部郎督餉宣府適敵騎薄城下城中如沸守者不知所出公戎衣乘城從容籌畫方略敵因遁去邊人皆大喜過望廷中以是推公擢光祿寺少卿尋拜都察院右僉都御史巡撫遼東遼有叛卒黃勇者數勾敵為邊患朝廷懸重賞購之不能得公至默而不問或以為言則曰勇本吾人嚮處置失宜故叛若撫而用之猶吾健兒也何購為勇聞之信則數雜市民入城乃閉閎而執之敵患以寧論功晉右副都御史尋入為兵部右侍郎改吏部轉左公操履端方其郎計部時有權璫為商人居間欲冒支芻餉巨萬大司農許之矣公趨而前曰豈其以百姓脂膏國家府庫為此輩潤囊槖耶執弗與大司農亦無以難公在光祿時松江輸白糧不糳當輸者罪執政以為言公不可再言再不可蓋公於執政門人也而守官若此嘉靖中分宜嚴公相欲改公郎吏部須一見公不見亦不果改蒲坂楊公總督薊遼欲假事推轂公公不肯受事再强之則云度支郎殿最有主者不敢當總督薦未幾楊公入為大司馬又欲得公為屬公固遜亦不果改其生平不干進類此新鄭高中𤣥先生與江陵張公同在政府俱以才雄一世鮮所推許顧交倚重公已二相中失歡而江陵欲得公為助心知與高至篤也乃設事嘗之曰吾頃微敲高公公謂如何蓋是時江陵私人已疏論高公矣公正色曰二公皆當世名賢又石交即有失自不難盡言相正敲之一字豈所敢聞江陵為改容謝焉無何高公䇿免百官嚴班在廷相視以目公獨大言曰上冲齡踐祚首逐一顧命大臣豈正始事且此詔出何人手草不可不明示百官衆為凛然朝罷更要九卿詣江陵所江陵稱病謝客高公遂行當是時江陵以師保朝委裘與馮璫表裏用事道路皆三緘其口公獨敢撩虎鬚天下聞而壯之未幾晉南京都察院右都御史未行而有列白簡者詔褫公新命以侍郎還里又數年江陵公敗乃起公為南京户部侍郎其時言路大闢游談之勢重有羣擊執政家事者上意頗動諸府部大臣合疏保留次及南都九列署題至公公曰不可大臣進退取自上裁保留豈裁之自上乎且大臣與言官爭辨亦何其無大體也諸公皆服其言顧重違宰執意相視首鼠公奮筆書疏尾曰此自出魏某不可無與諸公諸公乃不復言保留事公之不詭隨蓋如此公嘗著四禮儀式每事秉禮而行先後居喪六年不涉足中門事兄如父視族黨如其手足鄉人有望之援手者輒量力與義各重輕賑給之無不滿意去而自處則甚約蓋秦俗以商販為業即士類不諱言獨公有拔葵斷織之風焉以故歿之日里人皆家臨巷哭尸祝於社其修之家者已豫哉公諱學曾字惟貫確庵别號也十四為紫陽諸生嘉靖丙午舉於鄉後六年成進士初授户部浙江司主事歷員外郎郎中至今官所學主於誠故生平立身行已於家於國一以貫之有本者如是矣先世自咸陽徙涇陽傳至髙祖鑑有隱德曾祖禎泰安州判祖琫父守潔俱以公貴纍贈南京都察院右都御史王母趙母何俱贈夫人配任繼李亦贈封如母子男四享年七十二卒恩恤與易名諸典猶未備然士論固人人與之矣公文宗司馬子長書宗晉俱得其逸趣所著涇陽志遼陽奏議詩文集若干卷嗚呼公出處大節與素所操持侃直不阿固巋然古大臣風烈矣西陲之勳赫然而不能究其志他何論悲哉為之銘曰於維魏公人今心古孝友張仲吉甫文武出車三捷戎功召虎所至矢忠王事靡盬直已若弦沈幾類弩國是一言有懷必吐避謗居東人歌破斧左史右圖蕭然環堵三讓就徴先盟後祖出處大凡隆中畎畝吁嗟乎三五以還兼才罕覩公果何修超倫邁伍維公孕靈太華天姥兼之學問淵源東土蓋昔孔門傳者曽魯公取其確毋欺自許人惟一誠即天可補昔在嵩髙生申及甫一以正直為周碩輔公邁往聞而踵芳武匪我諛公實公行譜明資政大夫吏部尚書贈榮祿大夫太子太保諡莊敏栗庵宋公墓志銘栗庵宋公以萬歷辛卯四月十有三日辛京邸同官以聞天子震悼曰嗚呼宰惟朕股肱天不憖遺以輔豫一人所司其考恤典議上賜祭二壇贈太子太保諡莊敏遣官護喪歸以中書舍人典葬事廕一子入胄監稱備物矣公之子治􅯤將以丁酉仲春葬於三陵之陽奉少司冦吕公狀請豫志而銘之豫與公生同里仕同朝相知獨深墓中石非豫銘而誰按狀公諱纁字伯敬世歸德人蓋微子之裔也曽王父處士貴配李王父瑾配劉考霓配靳繼劉郭三世俱有隱德王父以下皆以公貴纍贈資政大夫户部尚書配皆太夫人公昆弟三皆靳出公其季也幼即穎敏異凡兒六歲就外傅勤誦習不好弄總角事靳太夫人以孝聞侍疾昕夕不離側居喪備禮如成人壬子舉於鄉游南太學丙辰第南宫己未入對成進士筮仕永平府推官以平允稱嘗視遵化邑篆拊循有方流亡復業邑人思之召入為山東道監察御史出按關西抗疏論中貴人不法事中貴人肅然憚之相戒斂避乙丑按應天弭節抵部即召吏民諭曰豫兹奉命來實寧謐汝匪束濕揚沸戾汝今與父老約毋武斷猾賊毋犯科作奸毋持吏短長怙終故縱者無宥其有一眚偶觸吾網者吾祝而解之已而法行惠覃吏民肅且懷焉隆慶改元按山西冦屠石州三晉戒嚴關吏捕生冦七十七人奏當斬公詳鞫之有漢人為寇所掠者三十有三人具其寃狀得釋又大盜李九經擁衆據山出沒抄掠有司莫敢問公召賊曹掾窮其黨盡勦捕焉庚午擢順天府丞尋拜右僉都御史巡撫保定畿南長安孔道冠蓋旁午公送迎饋問如禮而止曰吾不能朘民膏以媚過客也春秋兩防嚴飭守備邊圉晏然調度軍需單思區畫歲省可三萬及裁罷冗兵亦歲省數萬司農為之稍寬㑹江陵相當國意多相左公遂引疾歸家居十年兩臺纍疏交薦癸未復起為保定巡撫時值大荒先賑貸而後上聞尋晉南京户部右侍郎改北轉左總督倉場平兌法汰冗資鉏常例嚴稽核儲餉之弊為之一清上閲視壽宫命守朝陽門賜金幣者再丙戌晉户部尚書其年江北數省方數千里水旱相仍死者枕藉或議開礦公曰是利藪亦禍藪也或議鬻官公曰是利府亦弊府也疏請發內帑金遣使行賑留漕粟减糶以平市價及他條陳優恤都城事宜上虛心允納所拯救為多以扈從上陵賜麒麟衣己丑考績贈三世如公官廕一子入胄監庚寅改吏部尚書公承寬弛之後勵精任事塞幸途絶請託釐宿蠧清選法即姻族里閈不少假以私郎吏凛凛奉行銓省大振未幾以勞成疾疏乞骸骨者五上溫㫖固留遣近侍存視以病亟聞乃豫告而公遂不起矣士大夫識與不識聞公訃咸欷歔流涕至為罷宴公為人莊慎端和老成敏練朝章政體指掌可陳而執矩守繩無少縱舍議論不為虛恢而深識遠見非淺謀可及部政精勤嚴正細大必親於百司論奏顧多持重不輕擬覆得大臣體請告家居鍵關却掃足迹不及公門日惟種蒔花竹畜法書圖繪朝夕披覽客有欲干以私者輒飲之醇酒不得言至里人有極寃無告者又密為白吏不使知也商丘故缺志長吏請公纂之稱信史焉配朱氏封夫人子二治以諸生廕官生仕至刑部員外郎􅯤以諸生廕恩生吁嗟公乎進而矢節奉公有大臣之略退而惇德化俗有先進之風豈非天所篤生以應國家之運與豫雖與比肩事主以德業相砥礪而不逮遠甚乃今老矣而與聞國政顧蔑與協寅恭也詎能無羊舌之悲哉聊著其大都而系之以銘曰閼伯之土氏以國分疇食舊德歷世有聞邈矣太宰允武允文以敏成政以莊事君三朝元德式應風雲天胡不憖俾集厥勳大河之涘巋然斯墳掩珠埋璧其光有煴史銘爾坎以詔無垠明中議大夫通政使司右通政元澤韓公墓志銘公諱楫字伯通余同年進士也同年惟同館皆稱字故余今猶謂伯通云伯通上世本揚人國初有鎮西衛百户傑者實生旭旭擢蒲州守禦所副千户生鑑鑑擢蘭州衛指揮僉事生清遂世襲指揮僉事守蒲州以官為家蓋自清以上俱用武功顯清弟澤始為郡諸生兼有文事亢閥焉澤之子曰霐霐二子長曰玻贈徴仕郎工科右給事中配薛贈孺人季曰瓚封徴仕郎刑科給事中配王贈孺人伯通季出也後於長故長季並得遘貤恩蓋異數也年舞象即能屬古文詞五易師各治一經又五年為郡諸生與同里張文毅公並有才名嘗共讀道旁碑一過目輒互相覆誦無遺人傳異之嘉靖壬子以禮經膺鄉薦乙丑成進士改翰林院庶吉士時髙文端公為館師授業伯通不屑屑文藝自見惟日討古今典制斟酌異同期可為當世大用文端公深器重之隆慶丁卯授刑科給事中上君道三劄曰勵志勤政𢎞知大略謂聖明新政宜上法隆古懸象魏綜核吏治時宣召大臣面賜咨訪用恢張聖德上皆嘉納自是每視朝獨早伯通益感奮知遇再請復午朝召對儀且數白執政公論道經邦之臣也宜日在人主左右責難陳善自牖格心不宜第小小補救與庶官同當事者不能用其秋虜薄薊鎮破石汾上防禦七略曰遴才重權體士修守懲玩勸功招擕俱有裨邊務而招攜則専主用間諜豐賞犒佯降虜以誘我逋逃尤切中肯窽未幾虜酋俺答果縛我叛人欵塞上撫臣王襄毅公以封貢請則又條八議贊行之力排諸異議者封議始定時施靖土司亦互相讐殺撫鎮官馳檄請勘又請勦則曰此不可以制虜之法制之也彼自相攻殺乃其常我坐守漁人之功而可矣何可輕為彼開邊釁久之而敵亦自定人服其識戊辰轉工科右給事中請告庚午起兵科改吏科轉左旋擢為都給事中時六科𨽻胥惟吏垣受餼獨豐則借以偵詗外事也伯通笑語其寮友曰言官欲張膽明目發攄正論第僅憑若輩舌吻耶為即夕罷之已又曰春秋先自治而後治人今六科升轉太驟則人懷苟且之心司屬改科道太頻則人趨奔競之路未可云先自治也因建言論資論望人服其公王親不得任京秩原非有著令也以無人敢言乃遂使老成閲歷之士棄置為溝中之斷者往往而是不無可惜伯通請酌量其間苟親者已物故即屬籍可去矣自是乃苛禁漸寬辛未同校士南宫得劉臺為舉首以直諌著節又首舉薛公瑄從祀孔廟皆有關世風犖犖者吏垣雖領袖六科而計吏乃其專責也伯通曰吏治修而天下無事矣乃當大計畢即請拔治效異等者增秩賜金以章有德又劾一按察使當分宜柄國時為比部郎曽阻遏楊忠愍藥餌欲瘐死獄中暴白其罪士論快之又言問刑官擊斷之慘浮於貪墨請懲酷與懲貪並重因著為令又請敕銓部於大臣請告乞休者必酌量年力議覆去留不宜衰朽充位撫按官薦舉失實者罰有中道改節者許首發原免皆有關吏治最切者若其他因事納忠侃侃正論不茹不吐總歸於扶陽抑隂顯忠遂良於人才臧否隆汙民生理亂之數若燭照數計矣人稱伯通為勤思憂職識治體要伯通亦何負言責哉惟伯通性伉直不喜為諧世之術每封事一上人人惴恐不能不以此徴怨而又當是時相國者三人俱以才自負頗不相能伯通顧兩出於其門未幾一罷一沒其一當事則有憾也由是伯通雖循例遷太常少卿提督四夷館又稍遷謄黃右通政未幾遂出為陜西布政司右參議又旋即以考功法署不謹罷矣或又言伯通在事日曽駁寢玉田伯襲爵事當事者甚器重之猶欲籠致為已用而伯通浩然歸不一言報謝當事者始大恚欲乘勘病疏文致以罪賴解救得免而卒揮斥於外且削籍焉伯通素潔清自好不輕取豫在科時曽有為巨璫當死者致重賂居間伯通不一正目視既罷歸家徒四壁躬自耕牧當事者聞而笑之曰韓生薄參議不為乃一貧至此耶蓋猶以不受籠致銜之也伯通行止有常度與人處不得其一惰容一媟語居家用禮法自衛不畜媵不置器玩不與人妄交游不私干有司忠孝之節出於天性當穆皇不豫憂形於色聞稍間則不勝色喜居家聞朝政善否亦然門無雜賔案無冗牘惟歲讀二十一史必匝於上下數千年興替得失有味乎其言之也其遇有忠賢淪躓權貴鴟張者輒憤不能平為拍案大呌或勸覽二氏書則笑而弗屑尤篤於友愛睦宗族拯人於厄為德內外莫可紀述萬歷丙申子國史編修爌滿考得請復內秩致仕已進階中議大夫乙已中秋猶對客引滿比薄暮就寢捐館矣詩所謂眉夀無害者非耶年七十有八所著有宦學初稿諌垣奏議諌垣紀事立朝紀事凡若干卷論事摛詞俱爾雅疏鬯讀之可想見其人元配傅贈孺人早世繼祁封孺人晉恭人以勤佐內政子二煥貢生次即編修爌女二適千户張亷州學生王𢎞謨孫男四曽孫一先是傅孺人祁恭人之葬也伯通已先自為志納壙中及是編修君兩兄弟卜以丁未某月日奉伯通柩合葬於南山之阡因函狀千里外謁余為志與銘余知伯通深而尤惜其用之不究也其何忍無言乃志而銘之曰世有偉人流行坎止進欲有為退不失已我思其人尚克見之矯矯韓公殆其庶幾著名斗魁揚芬天祿拜職掖垣為帝耳目盟心登對辰告逺猷國章民隱吏治兵籌其最大者曰補衮職維后克艱匪臣沽直晉躋華顯式答忠勤方依日月俄失風雲舍之則藏不容何病施於有家是亦為政貽榖哲𦙍恩賁褒綸而臧而熾不謂不辰卒歲優游倐然觀化儷彼良儔相從幽舍史筆有述家乘足徴九原可作不愧斯銘明太子少保工部尚書諡肅敏容庵辛公墓志銘襄城辛公當萬歷甲申丙戌間為御史大夫歷南北臺稱望臣赫赫矣㑹有所不可去去六歲詔起南刑部尚書俄又改北工部公疏辭四五俱未得請忽遘疾卒里第蓋癸巳二月二十六日也明年甲午公之子啓元將以蠟月二十三日奉公柩安厝於某原詣余請銘余惟公受上深知訃聞特考稽群議豫諡肅敏足不朽矣又安用不文之詞為倘謂余與公同鄉習知公乎則總其生平行事疏所謂肅敏大凡者使事核有徴亦未為贅辭也按狀公諱自修字子吉别號慎軒晚更號容庵國初有諱仲良者自真定曲陽徙河南襄城生友敬友敬生贈户部主事至善至善生贈監察御史謙謙生福建按察司副使訪訪生溉溉生絳州學正繼先公父也溉繼先俱贈兵部右侍郎公生有異質甫三歲絳州公弄膝上指壁間文字口授數百言第一過輒成誦越數月舉以問復誦如初後十有二年游邑校每試輒冠諸生又三年已酉舉於鄉未辨也明年與計偕始三加又六年丙辰成進士釋褐山西陽曲令己未免絳州公之喪補浙之海寧二邑俱疲劇難治公隨俗調劑威惠大行壬戌以循良高第徴拜吏科給事中歷右轉左乙丑晉禮科都給事所擘畫糾舉俱國家大政與大姦慝有力者而所條宗藩名封婚禮議尤多為肅皇帝采納著為令丙寅遷太僕少卿請告里居凡數載中外推轂者聲相和戊寅起應天府丞庚辰遷大理少卿歷光祿卿尋擢都察院右僉都御史巡撫畿以南諸郡所至俱芟奸剔蠧綱紀肅然尤極意恤民岩懲貪墨簡戎伍飭邊圉卓有實效上勞之金帛壬午召入為大理寺卿每讞訊多所平反其時大司冦與其屬見謂形已至逢嗔怒公終執不變癸未晉兵部右侍郎轉左少司馬故無所事事公督武學署京營協理清戎知貼黃俱隨事振刷大司馬倚公如左右手甲申轉南京都察院右都御史掌院事時南都法紀久壞俗尚奢靡而官方刓弊不可校公至則首發一御史濫括贖鍰者被逮論戍人自是不寒而栗而異時奢靡餘習與市豪壟斷亦漸衰止踰年都察院左都御史缺廷論兩推皆不及公上兩絀其所推者而問曰向執法南臺者豈不真御史大夫乎卒命公公感上知遇益鋭意振紀綱肅吏治起弊維風如在南臺㑹六載大計吏有桀黠者自知為公論不容夜欵公求庇公辭意不溫其人恚遂比其曹偶宣謗言乃遂有蜚語聞上上不得已竟豫公告乘傳歸時丁亥三月也公歸隱具茨之山築一圃讀書其中足鮮及城市市廛三畝田中所入足糊口而已終不求益獨語及濟世利物移風易俗事則竭蹶而趨之若渴也居嘗裒先民遺行可針艾末俗者為一鄉雅言導鄉人崇儉新學宫創尊經閣出所得海內之典籍陳其中使諸生綜博者有考焉輸粟哺邑人飢餓者歲賑宗族與諸生之貧者及婚葬不能自給者以為常性嚴重事執大體不隨俗俯仰在畿南時適均田令下執政者喜速效為一切約期殿最之諸路皆爭先報竣公獨不可故畿內履畝獨稱詳核而民不知擾其肅敏之槩若此上以賜諡蓋名允其實哉始公病且革猶强起為伯氏執紼卒以身徇得年僅六十有二配黃氏封淑人子啓元以廕游太學次養元先公卒墓在城西三里上惜公不盡用遣官致賻庀窀穸贈太子少保備禮稱終始焉嗚呼語有云善治者不視天下之理亂視紀綱斯言也豈為今設乎余往濫秩宗觸時事嘗奏振紀綱謹名分禁奢靡諸疏其說頗具而助余行之者絶少時公掌臺憲獨慨然謂是誠在我遂移檄內外諸司督趣實效人莫敢後焉假令公不去去且復來余所言豈終置庋上飽蠧魚已耶今公歿吾無與為質矣乃灑淚為銘曰人有神氣國有紀綱紀綱不振神氣不揚猗與辛公雅識治體從政所先立綱陳紀自厥筮仕以至列卿如弦之直如石之貞秉憲南臺一懲貪墨狐兔宵藏豹虎晝匿帝鑒忠鯁有詔歸朝握符環視無以踰堯公感上知矢心不二臺柏霜嚴風裁日熾余時典禮謬有疏陳公助行之三令五申羊腸中起而射含沙齎志於國為政於家公業未究公事可師後式公者視此銘辭明戶部尚書王公墓志銘司徒王公立朝伉直不阿遇事必殫竭赤悃惟毖惟慎天下服其忠既以母太夫人春秋髙陳情乞歸不以三公易一日之養天下稱其孝家食二十年登於大耋天下猶咨嗟嘆惜以為夀不滿其德而位不究其才訃聞天子震悼詔加恤贈賜祭三命將作治兆於生榮死哀備矣是宜表之隧道以諗來者蓋王氏纓黻相望以人文甲海岱間其由諸城徙新城也自公髙祖諱貴始其樂施好義隂行德以亢其宗也自曽祖諱伍始以明經起家自潁川教授諱麟始逮公考貴州參議公諱重光益昌以熾參議公六子皆貴公其仲也諱之垣字爾式别號見峯母劉安人嘉靖戊午舉於鄉壬戌成進士為荆州李郡無寃獄至其抑遼藩之橫械其黨惡者十四人麗重法遼藩欲甘心焉弗顧也為給諫疏保國先安民備邊先責實天子嘉之尋以言切直奪俸者再不為沮天子亦更思其忠於所進聖功圖與基命録皆宣付史館劾誠意伯世延不法執政者為緩頰不得言官某以罪謫戍執政欲還之格於公又不得當國者修隙故相人不敢出一語公侃然言朝廷待大臣自有體事遂寢執政者積不堪思報公未有隙也循資遷太僕少卿未三月又遷鴻臚卿蓋隂抑之也而公無愠色上新御大寶公條議典禮俱酌於故實而當於人心迄今為畫一之法尋歷大理寺左右少卿序當開府則格採珠之令清中官之匿市租者以寬平民又數年始擢都察院右副都御史巡撫湖廣吏治一新民懷其惠不動聲色而法行如流景王故宫火守者承當道風㫖誣及府寮為昭雪之詔捕妖人曽先監司察其疑似者煅煉成獄以自為功公劾去監司卒得白己卯報政受三代贈廕庚辰晉户部右侍郎協理戎政明年轉左提督倉場壬午再滿考再受三代誥乃晉户部尚書時上勵精圖治倚注方殷公念諸昆季俱宦游四方太夫人時倚閭而望乃陳情省覲遂以病告而撫按薦牘交於公車竟堅卧不出可謂能循老氏止足之戒矣修忠勤祠祀太僕公以祀田之餘贍姻婭周閭里其他賑窘恤孤繕橋梁施藥餌歲以為常位極尊膴而出入里閈恂恂如也晚嬰末疾始勉乘筍輿然猶過里門必下諸子姪率其訓布衣疏屩綽有萬石君之風焉蓋自戊午壬戌後諸子弟擢巍科者十餘人布列于史館臺諫方伯監司部郎守令者所在以能官著稱而伯子司馬象乾勛名尤著蓋禀公成畫居多焉一日端坐儼然而逝得年七十有八元配于夫人繼路夫人子男三皆于夫人出長即象乾總督川湖貴軍務都察院右都御史兼兵部左侍郎余辛未分校所取士也次象賁户部廣西司員外郎次象晉甲辰進士中書科中書舍人女三銘曰天翊皇明覽德碩輔爍為駿猷蜚則鴻羽洗寃七澤排闥九閽虓藩鷙悍虎决其蹯四歷諫垣五更卿寺逆鱗屢嬰鞅掌罔避匪艱拾級夷猶處錞兩讓制閫異彼齗齗翼翼畿輔公來作尹城狐彌伏澤鴻是軫荆員孔長建牙殿邦芟剃大憝遑恤其哤湘夢德洋峴衡功阜帝曰爾庸來豫先後董戎主計國均所依將母來諗返厥初衣一辭而退三命而俯萬石素風公作之萬先志遹追來許用昌式榖以似長發其祥徴才王氏如探崑圃玉屑瑶華溢不勝賈桓桓司馬勛著鼎彞季子繽紛車發其榰懿哉我公寧表東土還視方輿猗誰與伍申降嵩嶽說騎箕尾遺烈未央百代有煒贈奉政大夫兗州府同知默齊蔡公墓志銘余諸生時則聞當世有默齊蔡公九賢之裔近在浮弋已而同己酉賢書相得歡甚顧數謁南宫數罷歸即一二場擬冠多士讀至五䇿愕然不敢録肅皇帝乙丑余愧公如劉蕡維時相國者雅相器重公蓋拂衣卻彌子之請也余益重公能屬曽閔之行克倡先世之學云戊辰奉母命出令江華以經術潤吏治建言裁駐華通判及倉巡庚午署永州府兼零陵江華二邑事壬申考湖南治平第一癸酉兩臺交疏卓異擬擢右秩以江陵抑加靖州守銜調令寧遠是年冬入覲上安邊四事己卯補海州子毅中太史始領鄉薦公偕計僑寓雲居寺入都城則藉沐陽令舍令竊笑之江陵客徐某諷使乞內曰余垂槖而來一切問遺不能具乃為此駔儈行耶且余蚤為客所欲為寧尚淹於此客銜之而去擢丞兗州尋調臨洮乞休丁亥飲於鄉海剛峰李漸菴諸君子賦勇退難老卷自南都函贈之己丑季秋六日卒年七十又二癸卯以太史進階奉政大夫持狀來請銘余以五十年莫逆友啓狀不能讀讀亦不能竟嗚呼余何以銘公哉公名光字汝謙默齊其别號也世本光州人唐乾寧中有入閩為建陽令者生九賢公文肅公裔也勝國至元中避地籍饒之萬年文昭公還閩留南軒公居饒南軒生茂英有隱德誓不仕元英生正原原生斌篤志力行修先世之業天順中司光山教鐸光士嚮學自斌始遂仍籍光以季子鳯翹貴贈承德郎鳯翹即中𤣥相國所傳顯德先生者公父也季宜人以毅皇帝戊寅誕公於光故以名髫年授孝經曰人生惟此耳顯德與文成論良知力行不合從旁贊之曰能行孰不是知文成異之侍顯德在華亭坐華亭曰兒心何處曰天上地下皆我心也華亭詫歎十有五補博士弟子員即篤志正學從淮川王公遊比以孝廉卒業南雍日與耿天臺友弟子從者日益衆楊太宰夙知公即以邊才除江華令華當陷沒後原野丘墟公拮据撫招而民浸聚勸助而地浸闢葺補而廬浸增節嗇而儲浸裕鼓舞而士浸馴顧欿然曰未也華所急兵耳裁胥役食募若干清軍餉侵漁募若干報撥運羡金歲千有五百募若干且請於上不追罪隱羡者建五丈樓俯七十營而臂指使之居然湖南一保障而撫化猺夷以互市來者為嚴剽敓之禁諸猺率千餘户來歸治以戎索而不賦其田故事學糧折色半於邑公條議易之通省以為式俗不舉女十男九無室公於保甲中飭連坐法生齒日益繁祝虎虎匿祝泉泉涌若神勞豈弟者寧故饒於華而海襟喉江淮利魚鹽軍屯農畝錯出棊置倭復時時乘汛揚波公躬節儉舉三老孝弟曰毋令寧習於淫也弛禁平法復鴻雁講魚麗夷舶不敢近稍近輒就禽曰毋令海中於倭也公之治華也古田巨盜犯錦田所我師敗績歸化夷不能禦公援桴而鼓之馘渠魁潘汝泗等制府上其功天子賜金幣風示邊吏比調寧以計典在都華大錫洞復亂集諸路兵駐零陵恫疑虛喝制府日三檄趣公至則走使十輩促入畫便宜公曰若屬無遠志易與耳不足缺斧斨請單騎往諭衆咸危疑咋縮公遣客某開示禍福徐裼裘躍馬詣賊營賊熟視曰公至矣夜拔營遁公自十五志學以及考終慨然以斯文為已任所至闡道明德而經濟之才運之如指掌所至建書院羣諸生而教之以身心性命之㫖既賦歸田避俗東河棐几琴書朋儕文酒泊如也生平交游如文成存齊廬山鶴川每㑹必旬餘方罷若天臺伯仲近在麻城則約㑹於楚豫之交歲月共相切劘居恆寡嗜善導引乙酉一病劇甚太史移齡䖍禱七日夜公夢至人飲以玉盞覺而茗芬襲吻又五年夢奠雲竦之舍曰毅兒移齡期已届余於世已矣死不可復生然生生者不死治具别子姓姻婭束帶酬家廟朗吟曰九月霜寒鴈未歸諸子輩環侍問以家政笑而不答徐曰山頭一片白雲飛端坐而逝諸生旅請祀於鄉耆老旅請祀於社遠近頌慕如一口所著有諭民夷詩中興頌物感論書院三志寧遠新志光山新志行於世配胡氏繼何氏贈封俱宜人子五敬中雲南府判一元貢生毅中翰林院檢討亨中以諸生鎮撫信陽衛俱何宜人出則中邑學生側室郭氏出女五孫二十銘曰伊洛淪漣接汝潢波搖雲漢倬為章馮乘冷道儼河陽長鯨授首小弧降單騎入營冦角崩兼金曄曄出尚方靈泉忽涌於菟藏淮隂汛息東海康民肥槖空譽不揚滋蘭樹蕙競幽芳碩果不留衆何望先生之風未渠央山嵽嵲兮水渺茫明光祿大夫柱國太子太保都察院左都御史贈少保一齊溫公墓志銘明萬歷丁未閏六月初三日故都察院掌院事左都御史溫公考終於三原里第訃聞上悼失良弼輟朝一日詔大宗伯議恤典特加祭至九壇大冡宰議贈官官少保大司空議營葬遣光祿少卿余啓元往蒞事尋易名於生榮死哀備具矣公之孤豫知猶以隧道之石不可無銘也不惜重繭千里即余謀余與公同舉進士而生平石交也烏可辭按狀溫以邑為氏世傳溫公造之裔而譜牒無可考斷自元興齊公為始祖興齊公後有諱思敬者生二子伯曰顔仲曰良顔生公髙祖昌昌配安生公曽祖勉勉配劉生公祖淮淮配曹生朝鳯配王公之父母也自曽祖以下俱贈以公官配俱贈一品夫人公諱純字希文一齊其號也方垂髫即凝重寡言笑稍長頴悟絶倫淮海孫文恭公以精一一貫之學與為仁之㫖傳其衣鉢曰吾道在兹矣年二十六舉三秦鄉試第一明年乙丑成進士釋褐夀光令夀光山東巖邑也俗刁悍難治又適有巨盜馬天保等縱橫蹂踐公至密計擒之不煩一鏃乃復闢草萊勸耕織定冠婚喪祭儀式導邑人勤儉而厚其風俗未幾以治行第一徴拜户科給事中尋轉吏科晉兵科都給事中凡三載所建白不可勝計而諫草所存者則有修實政以熙庶績通章奏以隆泰交議京營文武提督以贊廟謨裁决者亦遂為永制大司禮陳洪為所生乞恩公劾其非法邊疆總督有無處而饋者公直發其事而昭雪故司諌沈鍊獄士林尤灑然稱快將擢卿二適俺答納欵求邊開馬市時首揆為髙文襄公以為可乘此閒暇以修吾邊備且將許之而公為髙公之門人獨抗疏言以堂堂中國與虜為購徒損國威弛邊備長將吏偷安之習必不可許乃出為湖廣布政司參政人多有為公不平者公獨無幾微見顔面曰患不能盡職耳官內外何擇焉公至楚藩署司篆數月積羡金無算毫不肯私楚武岡王謀繼大宗而使人賄公公峻却之乃不敢復言尋請告歸里文襄公既謝事乃復起河南布政司參政分守南陽南陽令有為宗人齮齕者公折以大義宗人皆唯唯退尋計禽大盜段武等散其餘黨境內以寧甲戌升太僕少卿提督東路馬政改太常少卿提督四夷館升光祿卿上大婚節省無名之費不可數計授中大夫轉太常卿適江陵相公不欲為三年之喪公與諸部寺規以大義江陵公不說公請告歸建學一草堂讀書課士嘗閉關靜思至不知晷刻蚤暮一夕而恍然有悟與天臺耿公語耿公大竒之而以書寄江陵亟稱其所得如是李漸菴公亦以為言而江陵終不釋逮江陵公歿始起太常卿轉大理加通議大夫尋升兵部右侍郎巡撫浙江浙當兵民兩變之後公至著齊民要書奬忠義褒孝廉禁淫祀而又改漕折減織造修陂塘興利除其積蠧人情欣然便焉冠軍團操㑹城者距防汛所在既相遠而往來擾民又多虛糜公帑稍欲更易汰其老弱則怒目而起公設計移之且不明示裁減而疾病物故者不更補自是乃九營併而為七兵民於以相安浙故有楊任諸姓其先以方公孝孺相與有連坐纍及今人情為積憤久矣公疏請開釋焉丁亥改户部右侍郎尋升都察院右都御史總督倉場則請停新增供應劾監督主事王某不職諸屬吏皆肅然奉法母艱除起南京吏部尚書主癸已京察人服其公贈公歿居廬三年朝一溢米夕一溢米不羣立不旅行鄉人之覩其容色有為泣下者戊戌起都察院左都御史掌院事秉國成者為四明沈公公雖每事不依阿及有所咨訪必殫竭忠赤惟恐不盡焉嘗請下考選命請停礦稅請寬釋被逮諸臣疏十餘上俱不報乃約諸大臣叩閽待命上震怒諸大臣皆曰無太激公毅然請行衆隨之伏闕大哭自己及申上遣中官怒問曰誰為首公慨然對曰臣純也為社稷生靈計不敢愛死上知其無他亦不罪也時建儲之命久不下公抗疏屢請每請必齊宿露禱冀有感格或至出涕壬寅閏二月上違和忽罷礦稅釋幽繫下行取考選之命中外欣然公慮有中變則與大司農陳公渠大冡宰李公戴謀即日頒詔天下而大司冦蕭嶽峰公獨以出幽繫俟再請明日上體安果收回成命獨私喜大司冦而深怒奉行諸臣乃罷大司農為民四陽之月日有食之獄中劉九經抗疏指陳時政有七月南山皇甫卿士語侵及當事而九經秦人也於是當事者疑公不可解未幾乃妖書四布以動搖國本為言省臣為當事腹心者遂抗疏激上怒詔有隱匿罪人者族訐報者賞千金侯萬户遠邇騷動人人不寒而栗公與余宅密授意巡捕參將陳汝忠發健卒圍之數層五城兵馬指揮劉文藻等亦各遣兵番圍繞夜聚而曉散人人為余二人危之蓋當事者欲迫公與余令恐懼自裁余二人飽食穩卧自如耳賴天子聖明俱以得免公於是乞休當事者即因以揮之去公出春明門行李蕭然諸士紳餞送者皆咨嗟太息舉二疏以相况公歸約里中髙年為耆英㑹族屬待公舉火者數十人婚嫁者數十人設義田百畝立大宗小宗廟以時致祭著雅樂創尊經文昌閣修李衛公祠其他不可勝紀公惻隱滿腔胸次悠然超乎物外而乃一日疽發凥以卒公不留意於詩文而所為未嘗不工文步趨馬遷詩學少陵今其書所傳者除歷官疏草學一堂全集則又有少陵一得大婚禮彚紀其他所旁通如天文地理風角占候諸家亦皆有精詣術師反有不知者公不以為貴也終之年六十有九配李繼楊再繼宋俱贈一品夫人先公葬西郊賜兆公自為志矣子三豫知次知自知銘曰西嶽降神篤生甫申聞道淮南精一傳真知行妙合反躬實踐忠清正直溫而能斷三犯時宰拂袖歸田斑衣膝下樂而忘年三起田間南北總憲秉正嫉邪秋霜日鑑定䇿國本羽翼商山功成身退鴻漸九天得正而斃馬鬛崇封子孫千億永大厥宗明光祿大夫柱國少傅兼太子太傅吏部尚書建極殿大學士贈太傅諡文懿趙公神道碑銘余故與文懿趙公同館相昵今公已矣余繼公而濫密勿蕭規具在倣佛乎如見其人也公諱某字某别號濲陽系出宋清獻公自衢遷金華之蘭溪代有顯者傳至公曽大父年成化乙未進士除行人至水部郎以忤中貴棄官年生晨晨生賢三世皆以公貴纍贈光祿大夫柱國少傅兼太子太傅吏部尚書建極殿大學士配皆一品夫人公之生也夫人夢日華繞室始能吾伊章句即負大志贈公程督最嚴弱冠補諸生督學雷公得公文即以公輔期之登己酉鄉薦困公車者二十年下帷苦學有司罕得覿其面戊辰舉南宫㑹試莊皇帝臨軒手拔公第三人授翰林院編修己巳修世廟實録辛未分校禮闈尋册封吉藩癸酉充經筵展書官教習內書堂仍預修穆廟實録晉侍讀今上即位江陵相頗專恣公疏言紀録自史臣職掌請罷政府總裁以防專擅江陵相銜之亡何奪情事起諸疏論江陵者俱廷杖謫戍而編修吳趙二公疏語尤峻公懼不測糾同舍者七人詣江陵公所舉綱常大義反覆譬解江陵無所容身至欲引佩刀自裁而二公亦下廷杖時公直起居乃復詣政府請諸疏付史局存萬世公議江陵相益怒甚竟以星變考察出公廣東按察司副使公被命即行抵任攝臬篆隨事盡職曽不以遷客介意而江陵憾未釋尋又以辛巳京察再謫公閒住公歸而結廬於靈洞山下自稱六虛主人㑹江陵敗南北臺省交章薦公起解州同知擢南太僕寺丞尋改南國子司業甲申轉右諭德掌南京翰林院事復轉左諭德春坊修玉牒丙戌再校禮闈擢南京國子監祭酒戊子轉少詹事兼翰林院侍讀學士掌府事己丑晉南京吏部侍郎公感上知遇首上保聖躬疏要在屏酒色戒逸豫臨講幄接大臣清心寡欲以承天眷語甚切至無何改吏部左侍郎兼翰林院侍讀學士辛卯首揆申公致政上特㫖簡公以禮部尚尚兼東閣大學士入參機務時太倉王公歸覲公與山隂王公同心輔政壬辰春山隂公亦抗疏去國適新建張公召未至公獨肩樞管以精白醇謹贊上英明之治其大者西平劉哱東復朝鮮歸王子皆以片言折盈庭之議成不世之功時上久不視朝乃因獻西夏捷請御門受俘上從之是日賜召對稱先生不名退而進孫思邈真德秀衛生二歌以申保聖躬疏指上嘉納癸巳春太倉王公應召至㑹羣臣請册立愈急上密問王公中宫尚宜子三皇子姑並封以待若何羣臣皆力爭以為不可公乘間疏言皇上既有待嫡之意請為中宫修交泰之禮以祈髙禖自當叶應必時下並封則當優異皇長子以明定分不報越數月復請乘來歲春命元子出閣講學行册立冠婚禮上覽奏不言然心固韙之未幾乃遂有出閣之命中外欣然公之力也先是每廷推大寮銓部必先詣政府詢所欲用公曰此天官冡宰之職也吾何敢預焉自是乃絶不預聞公仍大書二銘於政事堂一曰以威福歸主上以事權還六卿以請託辭親友以公論付臺諫一曰積誠以事主上潔已以風庶官折節以下忠賢黜私以絶憸佞嗟夫公相業在此矣時邊備久廢將士習偷安自佚公勸上用重典按諸失事者自是乃旗壘生色未幾有鎮武之捷效首虜至五百餘級獲錙重無算上嘉大將功欲裂地封之公復執祖制為不可上乃止初朝鮮為日本請封廷議未一上怒言者齟齬責大司馬不任事公從容言彼中情形豫難遙斷請下督臣議樞臣覆議取自上裁上從之於是議者與覆議者皆謂封之便㑹倭使至乃許封焉已而日本反覆封事壞言者及公公乞骸骨上降手札遣中使諭公公感泣未幾仁聖皇太后崩扶病强哭臨成禮歸遂稱篤疏七上皆䝉溫㫖慰留尋再遣鴻臚寺宣諭政府傳諭不得已乃出然非其志矣蓋公虛心觀時直已守道無固我壬辰以前事權在已和衷在列雖身居攝而運籌帷幄靡不奏功乙未以後門户漸分攻訐日熾公主必退適兩宫三殿先後災皆引漢䇿免故事自劾已復以年至乞休病乞休每輒鍵關數月月疏三四上而言者乃又以矯飾論公公求去益力上特㫖趣公出公終無出意㑹遼東事急贊畫與撫臣相訐語侵二輔或出國或在政府虛無人乃不得已一出調停其間事定復堅卧不起蓋自戊戌至辛丑凡四年乞身之疏九十餘上上勉留彌篤賜金幣酒米遣御醫診視及鴻臚中使宣諭月常再四公感上隆恩每對客未嘗不簌簌淚下曰臣病且死即未死敢忘國事以負主眷乃力疾草疏請罷𣙜稅請册立東宫請簡輔臣等又以曹侍御直諫坐死屢疏申救己亥冬屬當讞决中外為侍御懼不免公疏力解言甚切至上寤特為停刑蓋公以精誠朴忠受知於上每覽奏無不動容雖或有不得已而姑聽者有逆耳不盡聽而曲賜優答者終不至默默遂已也癸巳敘寧夏功進太子太保廕一子中書舍人丙申敘甘肅功加少保改吏部尚書進武英殿大學士丁酉敘延綏功晉少傅兼太子太傅建極殿大學士廕一子尚寶司丞俱賜銀幣最後歷敘諸功特轉中極殿加少師兼太子太師並支二俸各廕一子賜銀幣公五疏懇辭不允公不得已第勉承雲南一廕餘皆辭免而自丙申以一考賜宴於禮部廕一子尚寶寺丞及六年九年秩滿皆不敢上聞矣其謹畏若此辛丑九月十二日夜大星隕西南遠近震駭明日公歿若日華之兆相終始應者訃聞上驚悼降手詔若曰天乎胡奪我良弼之速也為輟朝一日賜賻銀二百兩紵絲二表裏及布米香燭賜諡文懿諭祭三壇遣行人護櫬歸某官庀窀穸給水衡錢俱視舊典有加公襟度疏雅不立畛域與人處杯酒從容歡然道故舊比問及朝事則徐以他言亂之人莫窺其喜怒之色其為文汪洋爾雅類其為人雖卧病猶吟咏不輟所著有四游稿及伏枕越吟寄懷八咏讀者想見其髙雅而悲其志焉嘗築臺清獻公祠傍榜曰告天示不忘本蓋公歷官三十餘年所積祿盡出為買山之費於田廬無所益其校士禮闈再為國子監司業祭酒一時士出公門下者甚衆公第與莊言德業絶不以借援曲庇喣喣為恩士多顧化至於矯者欲借公為名巧者欲排公貢諛或至有操戈入室者公閉閣思過而已居嘗語人曰無心立心無事行事無權處權乃聖賢作用嗟夫公所以上結主知下鎮物情處機穽戈鋋之衝而卒能明保其身者有以也病且革猶力疾草疏請行册立禮請罷礦稅簡閣臣用言官目送疏發而後屬纊蓋古稱尸諫者已公生嘉靖甲申三月十三日距辛丑為七十八年配方氏贈一品夫人生四子長即尚寶丞鳯梧次鳯翀刑部陜西司郎中次鳯威兩淮運副皆方出次鳯閣側室沈出女四孫男十九人餘詳志狀中不具載銘曰趙自清獻姑蔑始基爰徙濲水纍葉集釐篤生太傅應期名世射䇿天人唱名雲麗載筆詞林正笏朝端身荷綱常秉義摧奸既斥嶺表復竄邊際公憂則違邱園是賁隂曀既消衆正彚征詔起東山公樂則行再陟詞垣洊歷九列帝曰直臣作豫尹說初攝端揆集思陳謨三韓興滅西夏獻俘既專樞管彌廣忠益內明外順已正物格權歸一人職還六卿為霖為楫何功何名門可設羅心則如水毁不為怒譽不為喜荆棘漸繁讒言高張公思避路百疏不忘眷自宸衷手詔慰諭中使絡繹牢醴無數曰無豫棄曰惟汝為天語彌溫公志靡移感激涕零何以報主一息尚存有懷必吐所忠遺奏史直尸諫帝為動容隆恩靡間厥恩維何恤典是隆建本置輔獨鑒公忠生順死安哀榮終始公神在天公業在史坊如斧如賜兆冥棲於萬斯年川嶽與齊明贈資政大夫兵部尚書故慶府右長史棘亭王公神道碑銘王氏自琅琊太原兩望之後散布於天下代興地著咸有聞人顯庸於世廣平之有王氏蓋北宗之支自河東而徙者也廣平之滋大自尚書懷棘公淵源建樹自封尚書棘亭公始棘亭公諱允武字德毅幼端敏能屬文行誼惇謹有度名重河北文日益竒而亦用是不偶明經入太學庚戌謁選天官太宰蜀夏公異之除江西南康府通判南康地瘠而通判總一郡之儲纍歲所負十七公內絶包苴外無所假借相緩急而時其催科一年賦乃盡起部使者奏最㑹閩浙連創於倭廣西狼兵奉詔往援所至驛騷道出南康人情恟懼公時攝守諭衆曰狼兵即悍寧無將帥寧弗畏法耶乃移檄與帥約曰天子以爾兵勝固徴不戢孰謂勝也成師以出而卒以不戢持此欲安歸乎且兵譁以犒耳吾犒豐且時而譁者弗息何帥之為請以法聞上矣帥雅憚公名檄至戒其下曰清直翁果不可犯也已而公所治犒師具無不饒辦狼兵大喜而去市里晏然機兵以月糧缺訟萬年令於臺臺使下讞者不能平兵遂鼓衆謀亂郡城晝閉公適以他事至直指徐公喜曰非王倅不能了此趣召公往訊獄具坐令朘刻而究鼓亂者正法郡賴以安直指益竒公即移署萬年除前弊政數十事反寃獄株連纍歲不决者居六月以考績行民攀泣塞道肖像立碑頌焉入都署上考還郡數月兩臺復檄視景德鎮陶務景德仰供尚方器被天下而磚埴之家且不讐費權豪稍侵牟之以故陶户日瘁而器窳不中程公至悉為均節而禁外蠧之窟穴者商民工作為之一變庚申擢兩淮都轉鹽運副使淮鹺夙號利藪官者多以染指致纍公持己益峻羣商秋毫無所與揚州監生某家世素封以事逮獄死長子戇騃少子楫黠甚矯父命逼殺長者而據其室長子婦薛訟之楫大出金錢賄解獄反坐薛薛請就公讞公竟得楫殺兄狀論死揚人以為神明時都御史某倚分宜相核天下鹽政所至責賂無算淮商醵金數萬以待其來公聞怒曰諸商賂即王某賂天下寧有媚人王某哉禁一無所餽都御史大恚署公左官遷慶府長史竟中以老疾罷時年五十七耳公歸槖中蕭然抵舍田不加於舊布衣疏食足跡不入城市課子明農之外一無所問居二年以疾卒於家以尚書公貴纍贈資政大夫兵部尚書配都氏先卒纍贈夫人繼趙氏封太夫人子二女一孫男四孫女二姻婭皆名族詳志狀中公天性孝友內行純備居官清介操持凛不可犯而存心平恕事有干重辟及士類罹訟者必詳審三四惟恐失入及臨大事關地方興廢民間利病則毅然任之即忤上官遺身纍不為動也前宗伯余馮二公表志其墓已悉邑令陳公又採公行事入邑乘中兹不具載謹識其大者銘曰衛陽鴻儒金玉其相含華耀穎蹈員履方絶調知希長才位下戢志賢關䇿名别駕惠藹如春明兼照夜赤子乂安神姦顧化賢媛協德宜厥家人發祥哲嗣流慶無垠三命崇階九京殊錫汗青有光彤管丕式淮水作禎原阡用即追琢馨香垂之罔極明封奉直大夫户部雲南清吏司員外郎次泉李公神道碑銘封户部員外郎次泉李公者今總漕都察院右副都御史道甫父也公葬踰十有四年而道甫至今官法得樹石神道乃自淮上緘書來徴言按公諱某字德潤次泉其别號也生不好弄初業儒不就乃棄去業賈然非其好也嘗入市市布四得八歸知其人誤也不及飯走還之又道拾遺金五懸諸門以待遺者毫無所隱是時公正貧尤人所難云無何道甫成進士授户部主事部商多里人不無望公居間公一切謝絶之南樂魏侍御允貞言事侵執政禍且不測時道甫部俸滿再考旦暮遷矣乃發憤上書救之得俱謫或逆公懟公怡然曰侍御不負朝廷若不負侍御余亦能不負若已迎侍御勞之曰行矣自愛不意兒曹得附君子之後也魏常謂為道甫易為其父難道甫以是聲益大起纍遷觀察已改督學三晉公益匿跡燕市疏食布裳依然寒素時時步行里巷中人莫識之喜談古今忠臣義士賢豪曠逹之致晚讀宋儒語録欣然有合嘗語道甫曰吾生平兢兢不敢為虧心事以求不得罪於天罰今益有味乎先儒之言也蓋其所契悟深矣方道甫督學時一日念公心動即棄官歸歸甫三月而公捐館舍屬纊語不及家事第云毋厚葬我骨毋以貴人之辭諛我墓其見超世俗類如此生平孝友篤至事伯父母如父母伯兄妹如兄妹終身猶一日而又好行其德困者周之死者槥之余初以道甫知公今益以公知道甫是父是子所從來矣娶朱宜人有孝德雅稱公配生子三長即道甫名三才矯矯直節古所稱社稷臣也有子如是是謂不死公固不喜諛如九原可作當亦信余言非諛也志表碑傳載家世與生卒月日已詳兹不贅銘曰李自秦遷籍燕軍閥世無顯人有俟而發其發伊何中丞道甫疇其啓之曰有賢父洵美封公賈能市義返布歸金糠秕世利或謂公癡公聞逾喜終窶且貧我道蓋是嚮慕稱說惟孝與忠道甫敬承步武龍逢慷慨抗疏以救言者而得左官公無愠也謂以祿養無寧以善而行而志毋我顧戀道甫泰然直聲蔚起荐歷中丞嚮用未巳國有重臣公訓是式霖雨天下公之遺德載德於躬食報於子刻詩豐碑垂千萬紀亦玉堂稿卷十
