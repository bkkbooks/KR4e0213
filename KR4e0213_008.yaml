body:
  text: 亦玉堂稿卷八明沈鯉撰社倉議一有司之積榖備賑也自公廪外則又有社倉一法固均以為民也然就兩者較之則社倉有實惠而公廪顧反有不及者何也蓋當其積貯之時而已寓賑恤之地也請得究言之公廪率不過一二所社倉則四門四關各有建置積之多方備之無窮而輸散不越境其便一公廩者官自為之也其勢獨社倉者官與民合而為之也其勢分分則共其力於衆獨則總其勞於已衆力易舉獨任難周則任獨不如任衆其便二公賑必須憑里排舉報而里排諸人皆素以漁獵自資者也報者未必貧貧者未必賑反使公家積貯徒以惠奸則賑輸具文耳社倉有殷實公正衆所推服者為有司分理其事而又有賢士大夫可備咨訪故本社居民孰貧孰否孰上孰次一一皆有真見粒粒皆有實惠也其便三公賑必須按里排次第較凶歉甚否逐一審問有司或有他務相妨則勢又不能速及曠日持久遂使枵腹垂斃之民日需次逆旅之舍而所得不足以償費至有垂槖以歸或不及一饜以死者可哀也社賑則各濟各方隨投隨給其周之若燭照而豫之如取攜其便四公賑不免有盤撥轉運之煩有需索使用之費有斗斛髙下之分有推挽負戴之勞而社賑則悉無此纍其便五公廪一二而饑民喁喁待賑者常千萬計駢肩纍足沴氣薰蒸疫癘不免或更有他虞亦不可知社賑則分局各濟散而不聚自不患此其便六公廪必上棟下宇有磚瓦木石之費有透風重簷之設而雨雪薄簷易於沾濡鳥雀緣空易於剝啄倉鼠穴牆易於圮壞則又必歲時修葺費且不資况榖既入倉陳陳相因則紅腐而不可食出而晒晾之則遞晒遞減且有因緣為奸利者而社倉則狀若圓囷所需惟草木泥芭無磚瓦木石之費日色易透故不煩晒晾無重簷故鳥雀難入倉四周皆時有人跡故鼠不為耗其便七民俗之日以澆漓也如逝波之東下而不可復反也社倉既立則里閈共為有無必藹然有同室之義一體之情焉蓋不但緩急相周即百姓親睦民德歸厚亦且由此其便八人情不能無公私今令於國中曰吾勸輸備賑出爾私藏而公諸同邑不相識之人非甚倜儻誰肯應之惟各社有倉各勸其社之居民家道殷實者各自為備出其餘以待昆弟親戚之急人必不能恝然而荒年賑濟惟在此方之人得用之不以泛及其他且輸者有時而貧亦反自取給焉此民情之所欲也因而導之當令下如流水其便九夫是九者惟社賑有之而公賑殊不然吾固曰社倉有實惠公廪顧反不如也社倉議二倉以社名則非獨有司之事也蓋所在居人均與有責焉傳曰未有上好仁而下不好義者也今吾邑侯為吾邑賑荒計既肫肫若此矣豈鄉士大夫與吾民有力者自為其桑梓身家乃不能好義以終其事與吾知其必不然蓋里中士大夫有富於財者未有不結社飲酒以一日之樂糜小民終歲之費也未有不窮奢治具集水陸之珍强客屬厭而客謝不能不止也未有不盛飾山池臺館魚鳥花竹聲容耳目之玩而費纍千金不惜也未有不以其鼠壤棄餘委諸無用而明以資盜隂以損福也諸如此類費何可勝計吾不敢謂諸君之盡然間亦有不免焉者倘稍裁百分一以輸之社廪備荒年賑濟而起人溝壑之中不過斗斛中一粒而遂能施仁義以行德化無用為有用諸君何憚不為且既名為士大夫讀書明道理當思天下饑由已饑顧乃於同室之困不少置念凶年饑歲家有餘資廪有餘糧僮僕溫飽而目覩鄉井餓夫枕藉溝壑焉則亦與凡民何異此無論隂隲暗虧觖望難釋第人皆有不忍人之心豈以吾輩號士大夫反不能善推其心以為鄉閭倡耶即條陳民間疾苦以請命於邑大夫亦吾輩責况今邑侯不待片言先自軫恤厪思善後之策欲使吾父老子弟長無凍餒吾輩有不感激踴躍相率應命者非夫矣諸君必不爾也乃若環邑居民其間有力者不嘗有結社攢錢隨㑹講經為奸人籠取乎不嘗有修寺建塔鑄佛塑神望南海走東岱跋涉道路足重繭而不惜乎不嘗有齊僧飯道建醮設壇為游食供糗糒而自謂修因果積福田乎夫此數者皆無益之事而奸人誑惑之輒竭蹶恐後積榖備賑本有益之事而邑大夫惓惓焉乃趦趄不前此何以說也夫神明正直非可私媚所福祐者必是善人為善人行善事無大於濟人利物濟人利物無過於凶年饑歲盂飯可當斗粟諸君何故不為而乃營營焉役役焉求之於茫昧杳冥之中吾為諸君大惑之夫公輸苦浩繁而社輸多寡隨意公輸有程督有稽核有罪繫而社輸緩急自便賠纍無虞且自積自備雖為人亦為已也貧富何常吾今日出有餘以濟人安知他日不人濟我以不足也惟願諸君各承邑大夫教令而導揚其波澤以贊成盛舉焉社倉議三以蓋藏論一邑則邑人有富者有貧者有非貧非富而衣食有餘者大約不出此三等矣貧者不能積富者之輸榖備賑也則以為貧人積其非貧非富者安積乎積之家則不免侈於用而奪於姑可已之費將如何而可蓋嘗見里中小民有結社積錢者或三五十或百貯之一所及歲杪始出而瓜分之亦各如所輸數夫其積而分分如其所積非有加多也然不以存之家而為是紛紛者誠恐其侈於用而奪於姑可已之費也故為是以自制而不厭其煩此小民積錢之一策也豫欲推此意以積粟於社凡非貧非富而衣食有餘者月輸粟一斗儲社庾計歲輸一石二斗時愈久積粟愈富值荒歲亦各如所輸之數還歸之如今之歲終分錢者此亦小民積粟之一策也不睹夫撲滿之為器小器也狀渾淪惟一口口僅可容一錢滿積之不能逾三百然可入不可出必撲而毁之而後可得用吾今欲小民積粟於社者蓋亦以社倉為撲滿而取諸寄也用人議我皇上臨御以來孜孜於用人圖治一時之治效可覩已近三五年職官多有不補臣愚誠不知聖意所在顧惟我太祖髙皇帝神聖開天稽古定制由內逹外無處不設有該管衙門由大及小無一不付與應得執事非徒以備員而已也總之皆精神心思所寓而治天下之大經大法也由此則治不由此則亂二百餘年聖神繼作無不率由者匪但前事之不忘實惟成憲之當守也臣請得一一熟慮之蓋在內五府六部與各卿寺衙門逐日奉有欽依隨即發行天下一有壅滯則後來文案堆積相仍不免誤事故今五府有掌印官必有僉書六部有尚書必有左右侍郎又各有屬官分理其餘卿寺亦莫不然蓋本源之地無壅而可周流不滯也而又特遣巡撫都御史安撫人民巡按監察御史紏發奸弊俱要職也乃今常經年不補而九卿衙門或有正無二或有二無正居常鞅掌易以稽遲臨急乏人且相那借纍朝以來人材寥落未有若此者此今時在內景象也外省都布按三司或主甲兵或主錢榖或主刑名各為一職猶恐不遍又設為分守分巡與各兵備以分理三司之事使一擔衆負易以舉行險阻幽深無不周遍亦承流於上宣化於下缺一不可者若復付與别道兼攝或至連數百里之外以相遙制勢豈能及蓋各省地方常踰千里守巡兵備分布彈壓者不過數人而又有入覲行者入賀行者有新舊交代日久不至者其現在五六人猶復不備將彈壓可得而遍乎蓋地濶則控馭難周而盜賊竊發事繁則耳目難遍而吏胥為奸守巡道胡可缺也守巡而下則各府知府比之司道事體尤專乃今亦處處懸缺姑委之佐二署掌夫知府惟位尊望重故能表率所屬使遵奉約束無敢有慢政虐民者佐二倅職也其屬乃州縣正官能使見嚴憚稱師帥乎矧復有非其境土而攝者其視官傳舍而已矣既視官如傳舍豈復能視人之事如已事乎撫人子如己子乎為人守藏能惜其財如己之財乎其圖易以塞責者不任其難其取辦於目前者不顧其後縱小小辦治亦目前了事而已官民情隔父母赤子判然為二此今時在外景象也夫內不備則源塞外不備則流壅塞且壅則不能有潤澤及民天下安得而治此用人圖治法祖第一事而臣愚諄諄言之也雖然此論其常也有急於此者海內之承平久矣當此差繁賦重之時豈無弄兵潢池者而所在無官孰與簡兵孰與儲餉孰與繕城隍圖戰守以備不虞隂雨至而後為計其有及乎且朝廷每遣使必設副二以行一時一事猶兢兢若此也矧其有常職有常事以稱代天工凝庶績者可若是草草乎如謂省官省費官可不備也則歷年以來裁冗員者不遺餘力矣詎復有可省者乎富人之家田廬稍斥猶多署臧獲廣招佃人以為已分理於下誠恐其家之不治而地有遺利也豈有天下國家者而可惜此小費乎孟子曰不信仁賢則國空虛國無政事則亂夫官惜費則國無仁賢矣無仁賢則無政事亂且滋起所憂方大可視為小小者哉伏願皇上法祖建官舉逸修廢俾仁賢濟濟在列則臣任其勞君享其逸天下可無為而治矣故臣愚以用人為當今第一議行政議臣惟天不言而天子代之君有時恭默不言而臣下代之總謂天言天言者天命天討之所自出也蓋綦重已祖宗朝面决政事一切章奏例應批答者隨奏隨答隨答隨下無留難也及皇祖世宗皇帝深居靜攝始不面决政事乃其時臣下之所禀承機務無不振舉者則恃此章奏一脈為可通君臣上下之情也而國家大政事即在此矣夫章奏即政事停章奏即停政事也緩章奏是緩政事也皇上試稽覽載籍上下古今歷數其興亡治亂曽無有政事而可以為國者乎皇祖雖深居大內而章奏批答疾如風雨其精神何嘗一日不運於天下故其時雖不面决事而庶政修舉亦自與臨朝稱制者不殊兹所以無害於嘉靖中興之治也假令皇祖末年不廢臨御則久道成化宜不止此皇上祇知其倦勤之迹不求其勵精之志毋亦有未盡者乎臣反復思維一念隱憂有不勝杞人之慮者蓋凡政事中有利害所當興除人才所當進退材藝所欲馳騁忠藎所欲發攄國是所由鎮定機宜所由剖斷者莫不取决於渙號之一頒惟留中不報常後時則利有當興者不興害有當革者不革賢能當陟者不陟愚不肖當黜者不黜明作者無以見能尸素者得以藏拙懷忠藎之意者鬱於心胸奉奔走之職者困於羈絏此當事之臣之所甚苦也是故國是有盈庭之議非早奉宸斷不明軍機在反掌之間非立承斧斷不决諸如此類一有濡滯將九重德意弗宣且遂為衮職之闕者亦何但臣下之不能盡職也夫人情需則易疑留中者曰何為而留緩發者曰何為而緩其設為不必然之慮而妄揣一人之意指者無不至也此甚非盛世之所宜有也三五之隆庶事以康如四時之序森乎不爽惟後之優柔不斷者乃多有廢而不舉之政皇上聰明睿知乾綱獨攬本毅然大有為之君顧徒以章奏稽留使咸熙之績有遜於堯舜之世此臣心所大不安也故竊以行政為急焉屯田議自􅀢錯建言募民耕邊以實塞下此屯田之始也是後趙充國屯西域劉馥鄧艾屯江淮曹操屯許昌羊祜屯襄漢孔明屯渭水郭汾陽屯河中韓世忠屯金陵成祖用前人遺策相循不廢故居者無輸將之勞而戰者無待哺之困屯田之制蓋深得寓兵於農之意焉而足餉之長策莫善於此矣我國家倣古遺意創為良法盡天下設衛盡衛所置屯大要守者什三耕者什七卒有警急朝發夕至是於守禦之中而享耕穫之利其法又視古尤備焉顧法行既久寖失初意則不能無弊是以屯田之尺籍徒在而三軍之枵腹無裨整肅振舉之策在今日誠不可不講也請先述末流之弊而後及處之之法可乎蓋古之屯者惟自為生養之計而不以貽憂於國也其有事而食也民未嘗取之於官其無事而耕也官未嘗斂之於民上不勞而下安之所以久行而不廢也乃今耕而入粟者有交納遷轉之煩戍而得食者有關支遲留之弊雖視夫千里餽糧者有不同而吏緣為奸人滋多事逋負荒蕪之端從兹起矣夫國家之養兵恆患於食之難給也彼誠可以無饑但不厪吾慮亦足矣而何必與之計升斗之贏以滋弊乎此屯之壞於租稅者一也古之屯者阡陌相連上下常數千里耕者之從事其間初未嘗有異處也今國家之制星散置屯本以從人情之便為常稔之圖而一軍之名或跨數墟一墟之田或分數處勢不能以相兼則舍逺圖近亦人情之所必至者彼近而易及者固享其收入之利而逺而難及者安得無汙萊之迹乎以此而日甚一日欲田之不拋而荒食之不因而虛者無是也此屯之壞於分土者二也古之屯者有屯而後有食軍之視屯若輜重然不可使一日去我也今屯之始也雜於民田而疆埸之别易紊逮其久也又任其自棄而盜鬻之禁不嚴以故賣者易售買者易行輾轉相尋田之去其主人也非一日之積矣此屯之壞也又由經界混而法之不立三也夫法之壞也非立法之初使然也蓋其始也起於端緒之煩而其既也成於因循之過法安得而不壞也是故君子之為法也不貴煩而貴簡不便於寬也而便於嚴蓋煩則弊端易生而簡則有畫一之規寬則法紀易弛而嚴則有難犯之勢為今日慮亦惟簡與嚴之為尚耳所謂簡與嚴者有復舊之議有更新之法二者固不能以相兼也愚請得而備言之彼屯田原額轉相貿易其為時非一世而所歷非一人矣今欲於盜買者則奪而歸之於軍是已往者享其利而見業殊有所不堪也此不可不為之處也竊計置田之家三年可以足直又二年而獲利半之請下令於民凡佃種軍屯者限五年還官而自今仍鬻者必治以重罪則屯額之舊可稍稍復集矣夫然後參之舊冊更為清造除各衛各所之屯總為一册而各軍之屯又注其四至而人給一冊軍有更代則此冊與俱而私相授受者亦庶幾其鮮矣至於每屯百頃則申命武職一員專理其事必時而耕穫正而疆理兼之以拊揗練習之務而提督於上者必為之嚴法禁時巡行以考課之所部者治則與勝敵同賞所部者否則與失律同罰必信必果無少貸焉行之既久而屯有不修者鮮矣然此固就事論事以紓目前之急復成法之舊耳若既補偏救弊而立為經久之法非盡易往昔之轍而大有更張不可也何也星散置屯本以從人便而其卒也乃民田易混而盜鬻之弊叢生焉此疆界之煩為之耳如於守城之處以環城之四周者為屯屯之外始民田焉守邊之處以沿邊一帶者為屯屯之外始民田焉則不惟耕守之勢便而界限分明彼此遼邈私賣之端無自起矣况附近之田多常稔之田乎三分守城七分屯種固通融之計也然而城守者無事之日多宜可以從事於耕而邊塞之區𤇺燧時警道里遼曠欲安心於畎畝之中亦難矣竊謂沿邉之處宜每卒僉正卒一人守邊副卒一人守屯使守在外者無內顧之憂而耕在內者無外擾之患內外耕守之間有相倚為命者矣田之有上上下下也槩而豫之未辨也愚竊謂江南之田屬常稔者人五十畝足矣江以北者宜少加之乃邊塞之地則多瘠少腴非百畝不足以贍一年之養也辨其肥磽而制之多寡則人安而荒棄者鮮矣凡此皆法之簡而易守者也以易守之法而專之以責成之人申之以嚴飭之令則孰以苦吾法撓吾法哉故曰為今日慮簡與嚴而已矣雖然屯田與鹽法相表裏者也自守支之說行則商人不樂於開中納銀之例起則塞下不能有積粟屯田之易廢而難久者率以鹽法之不能為之輔也講屯政者宜於斯致意焉鹽法考自管子有鹽策之議而後世宗之於是乎𣙜鹽有令理鹽有官漢唐以來咸賴之以足國籌邊既卓卓有明效矣宋熙寧時令商人輸粟芻塞下而以江湖淮浙之鹽給其直而加厚之以故商賈樂於趨利而不辭奔走之勞軍餉恃以取給而無勞轉輸之費信所謂飛挽神運而一時足邊之䇿蓋莫有善於此者我朝循用其法而召商中納著而為令非百世不可易之道乎今考天下行鹽之處為轉運司者六為提舉司者七國初嘗設有竈丁著有圖籍授以鹵地給以草場償以工本而又復及於其家所以恤竈丁者誠甚厚也比鹽成而當開中之時則量所在之粟芻貴賤與道途之險易逺邇折中為例而出榜召商在洪武時每鹽一引不過納銀八分永樂時亦輸粟二斗五升而已本一而息恆六七倍之所以利商人者誠甚漙也夫竈丁得所則人斯力於趨事而財出有不匱之源商利居多則人咸樂於中納而國計有常資之利鹽法之行於國初者固無以議為矣其在於今乃私鹽橫溢而官鹽遂阻商人中納日寡而邊徼之利賴益微者豈方今之邊事與昔異乎將今日之人情與昔異乎抑時異勢殊而祖宗之法可行於昔者不可以行於今乎吾知其有不然矣且倚頓一匹夫耳尚能以鹽之利而致富不資况以天下之全力而總天下之利權有可以求之而不得者否也劉晏理財於唐在當時諸凡之費取給鹽法者過半今獨以之濟邊而顧有所不足者否也愚因此而考究其故蓋亦法制之更張太過漸已非祖宗之初而目前之小利是急不思為經久之計耳自今論之鹽有常股有存積常股七分存積三分固例也然商人樂存積之易效既以趨赴而爭先而常股之守支於場者至有沒其身而妻子代之則商人固苦於支給之難矣洪武永樂間納銀納粟之亷者非徒以委利於商正所以厚吾三軍之士也成化以來漸增而至於八錢則商人苦於規利之難矣又其甚也勢要占奪賣窩買窩有報中之難例外勸借加耗私增有輸納之難守候查盤關領勘合有逗留之難私鹽既賤官鹽遂壅有發賣之難有此數難此商人之所不樂於中納而邊計之由以日虛為今日計在惠竈以開其源通商以導其流而欲講通商惠竈之法則正鹽之價不可不減也餘鹽之直不可不給也支掣之期不可不信也留難侵漁之弊不可不革也無用之鈔不可不償之以足其直也常股存積之法不可不融之以歸於一也而數者之中則清餘鹽減正價者其要也何也鹽法之不行者以私販之壅而私販所以恆多者則餘鹽之有以叢其弊也蓋貧竈苦於不給既每以所得之餘而亷其價以竊鬻人情樂於趨便又恆詩有餘之家而易其私以圖其亷則私者安得而不盛官者安得而不壅也今欲於餘鹽而厚之當念夫正鹽之工本至給鈔二貫五百何如其厚也彼有其鹽則以正而視其餘亦可也欲於正價而減之則又思祖宗八分二斗之例何如其微也今雖不能多損之以幾於昔亦以少取之以不至於今也如是則正鹽之價輕既有以利乎商人而餘鹽之盡收又有以利乎貧竈將私販之自息而公法之自行也或曰國家之財用常苦不足雖欲於竈丁之餘鹽而厚之又安所取給也愚曰鹽之所在利之所在鹽誠無窮而利何患其未廣也今者理有國之賦而不求其大端不酌其久逺惟區區與細民爭刀錐之利計尺寸之贏所得者少所失者衆朝四暮三孰寡孰多哉故理之有道則常股之鹽可隨足不必又存積也况此速則彼將益滯也法之不壅則商人之利亦吾之利不必較錙銖也况商困則國亦困也此正價之所以當減而餘鹽之不可不清也雖然又有說焉國家之召商中納者本以資芻餉輦運也今行之既久而寖失其初守運司上納之例而不循沿邊糴買之規則轉輸之勞吾猶任之雖歲時開中徒與商人為日中之市而已矣假令三軍之士脫巾而一呼或近塞之區水旱之相仍縱府有餘錢而枵腹者無資也豈祖宗初意哉通乎此說則雜買之規不可不復其舊而屯田之法勿諉之難行而莫之講也兵食論何以足兵兵貴責實何以足食食先崇儉夫兵無實則虛虛則不武食不儉則耗耗則難繼如是而徒聚兵無益徒日加賦無益也是故實與儉其兵食之上務而籌國之善策乎三代逺無論已姑自後世談之嬴秦僻處一隅而以六國之形勢與之度衆而較力則秦彈丸小耳然秦人開關延敵而六國之師咸縮足而不敢西向卒以成蠶食之謀豈不以秦民之强悍武勇為可恃而六國之旅有不可為衆者哉君子曰觀秦與六國之勢可以知兵矣漢文當瘡痍新定之餘而尤勤勤於蠲民田租之詔在經用疑為不足而其時府藏所積乃陳不可食朽不可較富極矣至於孝武承纍世之蓄息而益之以桑孔之𣙜算所入視文帝時又百倍而天下之嗷嗷而待哺者何急也豈曩之薄征者固有餘而今之厚斂者乃不足哉君子曰觀漢文帝之世可以知食矣是以司國計者使兵之可用如秦足也而不必如六國之衆使食之制用如漢文足也而不必如桑孔之謀彼不强之兵猶無兵也是操鉛刀而使之割不節之食猶無食也是注之上而漏其下也夫荷戈候敵蟻聚於邊疆而負挽供國者相屬於道路在我師未為不盛而取之不為不密也而核其實則無制之兵無能之將與夫聞戰而股栗者過半矣以此而驅之使戰詎非割之以鉛刀乎公家之食既巳多冗而土木之修錫豫之濫且歲無虛日吾不知其誰給也以此而制國之用不得謂上注而下漏乎嗚呼操鉛刀者曽不足以斷腐朽而注漏盂者竟不足以存一勺善救弊者亦在乎反之而已矣責其實而使之有用補其漏而使之不涸固所以反之之道也不嘗見凡民之情乎夫以富人之室率子弟而禦侮侮未有不可禦者也如其招鄉鄰之衆而助之則敵得操其戈入其室矣小民之家畀之十金已寬然有餘比其家之愈饒欲之愈侈而其用反索然窮矣不知其兵之不武而惟曰徴兵之不衆不反其用之不儉而獨憂制用之不足者皆此類也胡為乎不反而圖之也說者曰時有今昔則財有豐耗風氣有南北則人情有勇怯以古凖今以勇較怯者泥也非通論也愚曰不然人之勇怯財之豐耗終不以秦越殊狀今昔異形也昔項籍以吳中子弟渡江而橫行天下劉晏以淮揚一隅供國而國用常足亦可見兵無南北惟其練賦無多寡惟其節不練之兵不節之用雖盡聚天下之兵以為伍而盡用末世之法以括財亦何補於富强之計哉故曰善救弊者亦在乎反之而已矣雖然兵與食非二物也兵之多冗食之耗也蘇子嘗曰養兵十萬五萬人可去也廪之十年則是五年為無益之費也故世無冗兵亦無冗食而天下無事則所謂兵者特不忘戰焉而已矣有太平之略者其尚於根本圖之論京營兵制古稱天下雖安忘戰必危武備之在天下甚不可一日不講也而况都邑定鼎之地為諸夏根本之係乎在西漢之興也有南北軍羽林之制唐有府兵宋有禁兵雖世代不同盛衰互異而其創制立法則均之有居重馭輕之規强幹弱枝之義也我國家自成祖都燕深惟逺慮所定兵制在畿內者既已視諸郡為實而其在輦轂之下又視夫千里之內為重焉考之立國之初𨽻在五軍都督府者止四十八衛至永樂初年始增而七十二衛矣時乃設五軍營以統將士三千營以司寶纛令旗神樞營以司神鎗火器而復選附京諸省與中都大寧等衛之官軍使更畨入役以充營伍是為三大營也三大營之制內衛京師外備征調已赫然雄天下矣景泰初年復用本兵尚書于肅愍公議以為各營將卒自為號令不相統紀而兵不識將將不識兵非同心一體之義也於是選諸營之精壯者十萬分十大營而設重臣以總統之其不在選者為老家軍至成化間又增置二營而十二團營之制於兹備矣今考其制大小相維重輕相制如一綱之舉乎衆目何其整也無事則聚而練之以壯國威卒有徴發則隨其多寡而以次撥用不待遴選於臨事之時而莫非其桓桓而孔武者何其豫也以此而守則神氣以壯可以遏不靖之萌以此而戰則我武維揚可以底膚功之奏祖宗之睿謀逺算信已超軼乎往代而良平復出無容其更張之見矣獨以承平既久則紀律易弛玩愒相沿而凋敝遂甚十二團營之制非不晏然猶昔也而今之號稱精鋭者與昔之老家奚别焉名存而實不副識微君子徒以為有存羊之意而已矣自非大有振刷何以起積衰之勢瘳沈痼之疾乎然欲起而瘳之亦不必破成規而别立一制度也即今之名而求得其實以復乎往昔之舊焉其幾也實者何曰軍實之不可不核也肄習之不可不精也士氣之不可不培也綜理之不可不核也如是而又專責成擇閫帥修此六者故全也夫團營之軍未嘗不備曷為而又實之當核也蓋古者兵農合一有所發也各推其家之壯者以為兵是以兵無不勇之夫而國有常伸之氣其在於今則强者耕弱者戍矣富者傭而市井者代之矣望之雖蟻附而雲屯而物色其人則黃口之童斑白之老與夫尫羸而憔悴者過半矣此昔人所謂養兵十萬五萬人可去也若之何而可以弗核也今將限之以年以方壯而籍以始衰而代驗之以狀以驍勇而進以衰弱而黜如選士之於鄉社惟恐比之匪人以為民殘也不亦可乎團練之法歲時不廢曷為而又肄習之必精也蓋古之教民戰也教之以親上死長之義則作民氣也教之以攻殺擊刺之方則作民勇也夫是以上無虛文下無廢業而兵之不可制勝者否也其在於今則訓練徒勤如羣兒環聚而戲亦祗為故事而已矣昔人所謂戰不教之民而棄之者今日是也若之何而可以弗精也今將使列團營者五十有隊非徒長之也將使有道者一人焉申之以忠信長上之訓使之見敵則奮然而有怒心將使諳兵法者一人焉譬之以古昔制勝之略如所謂背水囊沙之類者使平居皆曉然而知將意又將使慣武藝者一人焉教之以衝鋒破敵之要如今之所謂鎗手者使之習尚武勇樂於戰鬬如秦風之賦無衣焉以試其勇必可以投石而超距以程其藝必可以百步而貫革汲汲然如嚴父之誨其子弟惟恐其或失之惰以貽厥家聲之墜也不亦可乎不然則孫武以婦人而習陳不可以取信於闔廬矣至如國家之養兵歲糜百萬不可謂不厚而士氣之所以不揚者非其養之而未至惟其有以奪之也何也養兵本以耀武也而今乃纍之以畚鍤之役籍兵本以為國也而今則執御於豪貴之門又其甚也則廪餼之賜從而勒之且從而侵漁之者衆矣昔謂未戰養其氣將戰養其力者恐不如是之輕且易也以此驅民於戰方將有以疇昔之苦而報怨者安望其為勇敢之倡乎故曰士氣之不可不培者此也國家之綜武纖悉備具不可謂不周而軍實之所以不充者非其慮之有不精惟其有以弛之也何也戎馬中國之長技豫之而不復究其肥瘦故馬多欵段之迹對壘全恃乎甲兵有之而不以驗其虛實故兵多鈍朽之器又其甚也則貧人傭焉以市利而弓矢戈㦸之類有終於不蓄者矣古云器械不利以其卒豫敵者今日是也以此而驅民於戰所謂縛孟賁之手而女子勝之者安望其全師之績乎故曰綜理之不可不核者此也夫綜理核則兵有所恃矣士氣培則兵無不揚矣肄習精則兵皆有教矣軍實核則兵無僞名矣四者備而補偏救弊之政亦庶乎得其槩矣然愚聞軍政之修明也分而理之者偏裨之責統而一之者專閫之寄今以文吏而論庶官分列於外太宰課其殿最而黜陟行焉此上不勞而下之所以無廢事也今團營之兵自一隊以至千萬既各有主之者矣獨不如文吏之專意以責其成功乎又嘗觀為天下者擇一相相道得而萬國理天下之大固以一人而重也今以十二營之兵而屬之一將以提督之亦億兆之命宗社之休戚係之矣獨不可致其謹如卜相者之甚難乎此愚所以又有專責成擇閫帥之說也夫責成之必專非可以嘗試而漫為之也以一營而論有十千之數矣為大將者誠以甲乙十千編立名號選武職才幹者如前四事悉以委之又從而稽之所部者稱則與勝敵同賞所部者否則與敗績同罰必信必嚴無少貸焉行之既久將有各自為戰各自為守者也不愈於今日之徒練而無益哉閫帥之當擇不必重臣而後可勝其任也古名將誠難得而文武百官之衆四海九州之廣不可以無才誣之矣誠為之廣詢博採如國初之徐公逹近代之王公守仁其人則不計崇卑不問文武而閫以外者悉以委之吾知當今之天下一將相而表裏之無難也奈何以主將為細務哉亦玉堂稿卷八
